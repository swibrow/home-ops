---
name: krr-rightsize

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  rightsize:
    runs-on: home-ops
    env:
      PROMETHEUS_URL: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      KRR_OUT: /tmp/krr.json
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"

      - name: Install krr (isolated 3.12 venv) + ruamel.yaml for the rightsize script
        run: |
          uv tool install --python 3.12 robusta-krr
          uv pip install --system ruamel.yaml

      - name: Run krr against in-cluster Prometheus
        run: |
          krr simple -p "$PROMETHEUS_URL" -f json --fileoutput "$KRR_OUT" --quiet

      - name: Apply recommendations
        run: |
          python scripts/krr_rightsize.py "$KRR_OUT"

      - name: Open PR if there are changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "no changes — nothing to PR"
            exit 0
          fi

          BRANCH="bot/krr-rightsize-$(date -u +%Y%m%d)"
          git config user.name "krr-bot"
          git config user.email "krr-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add kubernetes/apps/pitower
          git commit -m "chore(rightsize): apply krr recommendations"
          git push -u origin "$BRANCH"

          BODY=$(cat <<'EOF'
          Automated right-sizing PR generated by the krr-rightsize workflow.

          Review each change before merging — KRR's `simple` strategy uses 95th-percentile memory + 15% headroom and max-of-window CPU, which can under-request bursty workloads (transcoders, batch jobs).

          Skipped charts that are not bjw-s app-template (argocd, rook-ceph, cnpg, victoria-metrics, etc.).
          EOF
          )
          gh pr create \
            --title "chore(rightsize): apply krr recommendations" \
            --body "$BODY" \
            --label automation
