---
name: krr-rightsize

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  rightsize:
    runs-on: home-ops
    env:
      PROMETHEUS_URL: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      KRR_OUT: /tmp/krr.json
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Install KRR binary from GitHub release
        env:
          # renovate: datasource=github-releases depName=robusta-dev/krr
          KRR_VERSION: v1.28.0
        run: |
          set -euo pipefail
          install -d "$HOME/.local/bin"
          curl -fsSL "https://github.com/robusta-dev/krr/releases/download/${KRR_VERSION}/krr-ubuntu-latest-${KRR_VERSION}.zip" -o "$RUNNER_TEMP/krr.zip"
          python3 -m zipfile -e "$RUNNER_TEMP/krr.zip" "$RUNNER_TEMP/krr-extract"
          chmod +x "$RUNNER_TEMP/krr-extract/krr/krr"
          ln -sf "$RUNNER_TEMP/krr-extract/krr/krr" "$HOME/.local/bin/krr"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run krr against in-cluster Prometheus
        run: |
          # --cpu_percentile 50 → request the steady-state (median) CPU, not the p99 peak.
          krr simple -p "$PROMETHEUS_URL" --cpu_percentile 50 -f json --fileoutput "$KRR_OUT" --quiet

      - name: Apply recommendations
        run: |
          # Memory requests are set to the trailing average working-set (KRR has no
          # memory-average mode); limits stay as the peak ceiling, so this only relieves
          # request-based over-commit.
          uv run --with ruamel.yaml python scripts/krr_rightsize.py "$KRR_OUT" \
            --avg-memory --prometheus-url "$PROMETHEUS_URL"

      - name: Install gh CLI
        env:
          # renovate: datasource=github-releases depName=cli/cli
          GH_VERSION: v2.94.0
        run: |
          set -euo pipefail
          install -d "$HOME/.local/bin"
          v="${GH_VERSION#v}"
          curl -fsSL "https://github.com/cli/cli/releases/download/${GH_VERSION}/gh_${v}_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/gh_${v}_linux_amd64/bin/gh" "$HOME/.local/bin/gh"
          gh --version

      - name: Open PR if there are changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "no changes — nothing to PR"
            exit 0
          fi

          # Single long-lived branch — refreshed (force-pushed) each week rather than
          # spawning a new bot/krr-rightsize-<date> branch+PR every run.
          BRANCH="bot/krr-rightsize"
          git config user.name "krr-bot"
          git config user.email "krr-bot@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add kubernetes/apps/pitower
          git commit -m "chore(rightsize): apply krr recommendations"
          git push -fu origin "$BRANCH"

          # Reuse the PR only while it is still OPEN. A previously merged/closed PR on
          # this branch must not suppress opening a fresh one for the new run.
          STATE=$(gh pr view "$BRANCH" --json state --jq '.state' 2>/dev/null || echo "")
          if [ "$STATE" = "OPEN" ]; then
            echo "open PR already exists for $BRANCH; pushed updated commits to it"
            exit 0
          fi

          BODY=$(cat <<'EOF'
          Automated right-sizing PR generated by the krr-rightsize workflow.

          Requests are set to **steady-state** usage: CPU = p50 (median) via KRR's `simple` strategy, memory = trailing 14d average working-set queried from Prometheus. Only `resources.requests` are touched — limits stay as the peak ceiling — so this relieves request-based over-commit without removing the OOM safety margin. Bursty workloads (transcoders, batch jobs) may briefly throttle on CPU; review those before merging.

          This branch is refreshed in place each week rather than opening a new PR per run.

          Coverage: bjw-s app-template charts are matched automatically; other charts/CRs (rook, envoy, victoria-metrics, dragonfly, crowdsec, ...) are patched only where a `# krr: <workload>/<container>` marker comment annotates the resources block. Anything with neither a match nor a marker is left untouched.
          EOF
          )
          gh label create automation \
            --description "Created or maintained by an automated workflow" \
            --color "ededed" \
            --force >/dev/null

          gh pr create \
            --title "chore(rightsize): apply krr recommendations" \
            --body "$BODY" \
            --label automation
