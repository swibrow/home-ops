name: ArgoCD Diff

on:
  pull_request:
    branches: [main]
    paths:
      - kubernetes/**

permissions:
  contents: read
  pull-requests: write

jobs:
  drydock:
    name: Render & Diff
    runs-on: home-ops
    steps:
      - name: Drydock render, test and diff
        uses: sholdee/drydock/pr-action@03b46fc364b3c8bb80e21b8254f33b2ef1aa350e # v0.2.2
        with:
          # Must track the pr-action tag above — the wrapper passes flags the
          # pinned binary must understand (v0.2.0 added --render-cache-dir).
          # renovate: datasource=github-releases depName=sholdee/drydock
          version: v0.2.5
          # Self-hosted runner can't write to /usr/local/bin; use a writable dir.
          install-dir: ${{ runner.temp }}/drydock-bin
          path: kubernetes
          base-ref: ${{ github.base_ref }}
          # changed-only is on by default; ignore non-manifest paths so edits to
          # this workflow / terraform / docs don't force a full-repo render
          # (which was leaking unrelated apps like snapshot-controller).
          changed-only-ignore: |
            .github/**
            terraform/**
            docs/**
            *.md
