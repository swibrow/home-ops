name: ArgoCD Diff

on:
  pull_request:
    branches: [main]
    paths:
      - kubernetes/**

permissions:
  contents: read
  pull-requests: write

jobs:
  drydock:
    name: Render & Diff
    runs-on: home-ops
    steps:
      - name: Drydock render, test and diff
        uses: sholdee/drydock/pr-action@44517ae22ae64618dc8e4104e94a5a25c47b5e79 # v0.1.18
        with:
          version: v0.1.18
          # Self-hosted runner can't write to /usr/local/bin; use a writable dir.
          install-dir: ${{ runner.temp }}/drydock-bin
          path: kubernetes
          base-ref: ${{ github.base_ref }}
          # changed-only is on by default; ignore non-manifest paths so edits to
          # this workflow / terraform / docs don't force a full-repo render
          # (which was leaking unrelated apps like snapshot-controller).
          changed-only-ignore: |
            .github/**
            terraform/**
            docs/**
            *.md
