name: Talos Apply

on:
  push:
    branches: [main]
    paths:
      - talos/**
      - .github/workflows/talos-apply.yaml
  workflow_dispatch:
    inputs:
      clusters:
        description: 'JSON array of clusters to apply, e.g. ["pitower","auth"]. Empty = all changed.'
        required: false
        default: ""

permissions:
  contents: read

jobs:
  # Determine which cluster dirs under talos/ changed in this push, and emit a
  # JSON array consumed as the apply matrix. A workflow_dispatch can override the
  # list explicitly; an empty result skips the apply job entirely.
  changes:
    name: Detect changed clusters
    runs-on: home-ops
    outputs:
      clusters: ${{ steps.detect.outputs.clusters }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Detect changed clusters
        id: detect
        env:
          OVERRIDE: ${{ github.event.inputs.clusters }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            echo "clusters=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Override: ${OVERRIDE}"
            exit 0
          fi
          # First push of a branch reports an all-zero "before"; fall back to HEAD^.
          base="$BEFORE"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="${AFTER}^"
          fi
          changed=$(git diff --name-only "$base" "$AFTER" -- talos/ \
            | sed -n 's#^talos/\([^/]*\)/.*#\1#p' | sort -u)
          # Clusters held out of automatic CI apply. pistack is still a live
          # 3-node cluster; its repo config is the not-yet-applied single-node
          # target, so auto-applying would clobber it. Remove to re-enable.
          # (A workflow_dispatch override bypasses this and can force pistack.)
          for x in pistack; do
            changed=$(printf '%s\n' $changed | grep -vxF "$x" || true)
          done
          json="["; first=1
          for c in $changed; do
            [ "$first" -eq 1 ] && first=0 || json="${json},"
            json="${json}\"${c}\""
          done
          json="${json}]"
          echo "clusters=${json}" >> "$GITHUB_OUTPUT"
          echo "Changed clusters: ${json}"

  apply:
    name: Apply (${{ matrix.cluster }})
    needs: changes
    if: ${{ needs.changes.outputs.clusters != '[]' && needs.changes.outputs.clusters != '' }}
    runs-on: home-ops
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        cluster: ${{ fromJSON(needs.changes.outputs.clusters) }}
    # Serialize applies per cluster (never two applies racing the same cluster),
    # but let different clusters apply in parallel.
    concurrency:
      group: talos-apply-${{ matrix.cluster }}
      cancel-in-progress: false
    # runner context is not available in job-level env; SOPS_AGE_KEY_FILE is
    # exported via GITHUB_ENV in the write-key step.
    env:
      NO_COLOR: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install topf
        env:
          # renovate: datasource=github-releases depName=postfinance/topf
          TOPF_VERSION: v0.4.2
        run: |
          set -euo pipefail
          install -d "$HOME/.local/bin"
          curl -fsSL "https://github.com/postfinance/topf/releases/download/${TOPF_VERSION}/topf_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/topf" "$HOME/.local/bin/topf"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # GITHUB_PATH only applies to later steps; use the full path here.
          "$HOME/.local/bin/topf" --version

      - name: Install sops
        env:
          # renovate: datasource=github-releases depName=getsops/sops
          SOPS_VERSION: v3.13.2
        run: |
          set -euo pipefail
          # topf shells out to sops for secrets decryption; without it the
          # encrypted bundle is read raw and fails with base64 errors.
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" \
            -o "$HOME/.local/bin/sops"
          chmod 0755 "$HOME/.local/bin/sops"
          "$HOME/.local/bin/sops" --version

      - name: Write age key
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: |
          umask 077
          printf '%s\n' "$AGE_SECRET_KEY" > "$RUNNER_TEMP/age.key"
          echo "SOPS_AGE_KEY_FILE=$RUNNER_TEMP/age.key" >> "$GITHUB_ENV"

      - name: Apply config
        working-directory: talos/${{ matrix.cluster }}
        env:
          # topf's --confirm defaults to true and its y/n prompt re-asks forever
          # on the runner's empty stdin, hanging the job until timeout.
          TOPF_CONFIRM: "false"
        run: |
          set -euo pipefail
          # This runner is a pod inside the pitower cluster. Applying to pitower, a
          # change that needs a reboot will kill the job when topf reaches the
          # runner's own node — re-run the workflow (or finish with `topf apply`
          # locally). Applies to controller/auth/pistack are remote and unaffected.
          topf apply --redact 2>&1 | tee "$RUNNER_TEMP/topf-apply.out"

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "### \`topf apply\` (${{ matrix.cluster }})"
            echo
            echo '```'
            tail -c 60000 "$RUNNER_TEMP/topf-apply.out" 2>/dev/null | sed 's/`//g' || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
