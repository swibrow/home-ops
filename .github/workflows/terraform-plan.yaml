name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      # Only the stacks in this workflow's matrix. terraform/proxmox has its own
      # workflow — it needs the self-hosted runner for VLAN 20 access.
      - "terraform/alexa/**"
      - "terraform/bootstrap/**"
      - "terraform/general/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack:
          - alexa
          - bootstrap
          - general
      fail-fast: false
    name: Plan (${{ matrix.stack }})
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-2

      - uses: dflook/terraform-plan@3f1559b085c5ceff68c3724c9b66c015a6c940cd # v3.0.0
        with:
          path: terraform/${{ matrix.stack }}
          label: ${{ matrix.stack }}
