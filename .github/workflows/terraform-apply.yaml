name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      # Only the stacks in this workflow's matrix. terraform/proxmox has its own
      # workflow — it needs the self-hosted runner for VLAN 20 access.
      - "terraform/alexa/**"
      - "terraform/bootstrap/**"
      - "terraform/general/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  apply:
    runs-on: home-ops
    strategy:
      matrix:
        stack:
          - alexa
          - bootstrap
          - general
      fail-fast: false
    name: Apply (${{ matrix.stack }})
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-2

      - uses: dflook/terraform-apply@5489b988934a50bf1489d5b7c5253b46520a7dca # v2.2.3
        with:
          path: terraform/${{ matrix.stack }}
          label: ${{ matrix.stack }}
          auto_approve: true
