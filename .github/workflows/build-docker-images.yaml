name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - docker/**
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - id: changed
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          dir_names: "true"
          dir_names_max_depth: "2"
          files: docker/**
          json: "true"
          escape_json: "false"

      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "images=$(ls -d docker/*/ | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"
          else
            echo "images=$(echo '${{ steps.changed.outputs.all_changed_files }}' | jq -c '[.[] | ltrimstr("docker/")]')" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: discover
    if: needs.discover.outputs.images != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: |
          version=$(grep -oP 'ARG \w+_VERSION=\K.+' docker/${{ matrix.image }}/Dockerfile | head -1)
          echo "tag=${version:-${{ github.sha }}}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: docker/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/swibrow/${{ matrix.image }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/swibrow/${{ matrix.image }}:latest
