name: Drydock

on:
  pull_request:
    branches: [main]
    paths:
      - kubernetes/**

permissions:
  contents: read
  pull-requests: write

jobs:
  drydock:
    name: Render & Diff
    runs-on: ubuntu-latest
    steps:
      - name: Drydock render, test and diff
        uses: sholdee/drydock/pr-action@v0.1.18
        with:
          version: v0.1.18
          path: .
          base-ref: ${{ github.base_ref }}
