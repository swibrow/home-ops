name: Drydock

on:
  pull_request:
    branches: [main]
    paths:
      - kubernetes/**

permissions:
  contents: read
  pull-requests: write

jobs:
  drydock:
    name: Render & Diff
    runs-on: ubuntu-latest
    steps:
      - name: Drydock render, test and diff
        uses: sholdee/drydock/pr-action@v0.1.18
        with:
          version: v0.1.18
          # Scope render/discovery to the manifests tree so out-of-tree edits
          # (workflows, terraform, docs) don't trigger a full-repo render.
          path: kubernetes
          base-ref: ${{ github.base_ref }}
