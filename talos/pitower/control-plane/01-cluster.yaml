machine:
  # The control-plane nodes (worker-01/02/03, 16Gi) also run app workloads
  # (allowSchedulingOnControlPlanes), so they run chronically hot (~85% mem).
  # Without reserved headroom an app-load spike (e.g. the hourly Renovate burst)
  # starves/jams the apiserver until kubelet liveness-kills it (exit 137), and
  # every reconnecting client thunders the next one — a control-plane death
  # spiral (2026-06-08). Carve out memory/CPU for the host services (etcd runs
  # as a Talos service, not a pod) and evict low-priority app pods early, while
  # the static control-plane pods (system-node-critical) are evicted last.
  # Merges with the cluster-wide kubelet.extraConfig in all/01-general.yaml.
  kubelet:
    # Expose the host etcd PKI to pods (e.g. the etcd-defrag CronJob) — kubelet
    # runs in its own mount namespace and can't see /system by default.
    extraMounts:
      - destination: /system/secrets/etcd
        type: bind
        source: /system/secrets/etcd
        options:
          - bind
          - ro
    extraConfig:
      systemReserved:
        cpu: 500m
        memory: 1536Mi
      kubeReserved:
        cpu: 500m
        memory: 512Mi
      evictionHard:
        memory.available: "750Mi"
        nodefs.available: "10%"
        imagefs.available: "15%"
cluster:
  allowSchedulingOnControlPlanes: true
  coreDNS:
      disabled: true
  # Expose etcd metrics on :2381 (http) so kube-prometheus-stack's kubeEtcd
  # ServiceMonitor can scrape them. Without this etcd serves metrics only on the
  # cert-guarded client port and the etcd dashboard stays empty.
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
  # Bind controller-manager / scheduler metrics to all interfaces (default is
  # 127.0.0.1), otherwise the kube-prometheus-stack ServiceMonitors get
  # connection-refused (up==0) and those dashboards are empty.
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
  apiServer:
    certSANs:
      # - k8s.pitower.internal
      - 10.20.10.0
      - 127.0.0.1
    extraArgs:
        oidc-issuer-url: https://idm.wibrow.dev/oauth2/openid/headlamp
        oidc-client-id: headlamp
        oidc-username-claim: email
        oidc-username-prefix: "oidc:"
        oidc-groups-claim: groups
        oidc-groups-prefix: "oidc:"
        service-account-issuer: https://raw.githubusercontent.com/swibrow/home-ops/main/pitower/kubernetes
        service-account-jwks-uri: https://k8s.pitower.internal:6443/openid/v1/jwks
