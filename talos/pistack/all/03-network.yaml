# Single-node cluster: the node gets its address via DHCP reservation on
# VLAN 20 (10.20.0.0/16; the management clusters sit in distinct /24s within it
# — controller .30, auth .40, pistack .20). No API VIP (that only makes sense
# for multi-node control planes).
machine:
  kubelet:
    nodeIP:
      validSubnets:
        - 10.20.0.0/16
  network:
    interfaces:
      - deviceSelector:
          physical: true
        vlans:
          - vlanId: 20
            dhcp: true
