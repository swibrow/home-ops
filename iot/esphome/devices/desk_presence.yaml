esphome:
  name: desk-presence
  friendly_name: desk-presence

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret desk_presence_api_key

ota:
  - platform: esphome
    password: !secret desk_presence_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Desk Presence Fallback Hotspot"
    password: !secret desk_presence_ap_password

captive_portal:

uart:
  id: mr60bha2_uart
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 115200
  parity: NONE
  stop_bits: 1

seeed_mr60bha2:
  uart_id: mr60bha2_uart
  id: mr60bha2_radar

binary_sensor:
  - platform: seeed_mr60bha2
    has_target:
      name: Presence

sensor:
  - platform: seeed_mr60bha2
    breath_rate:
      name: Breath Rate
    heart_rate:
      name: Heart Rate
    distance:
      name: Distance
