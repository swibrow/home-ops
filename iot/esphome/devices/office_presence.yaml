esphome:
  name: office-presence
  friendly_name: office-presence

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret office_presence_api_key

ota:
  - platform: esphome
    password: !secret office_presence_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Presence Fallback Hotspot"
    password: !secret office_presence_ap_password

captive_portal:

uart:
  id: ld2410_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 256000
  parity: NONE
  stop_bits: 1
  debug:
    direction: RX
    dummy_receiver: false
    after:
      delimiter: [0xF8, 0xF7, 0xF6, 0xF5]
    sequence:
      - lambda: UARTDebug::log_hex(direction, bytes, ' ');

ld2410:
  uart_id: ld2410_uart

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO16
      mode:
        input: true
        pulldown: true
    name: "OUT Pin Direct"
    device_class: occupancy

  - platform: ld2410
    has_target:
      name: Presence
    has_moving_target:
      name: Moving Target
    has_still_target:
      name: Still Target
    out_pin_presence_status:
      name: Out Pin Presence Status

sensor:
  - platform: ld2410
    moving_distance:
      name: Moving Distance
    still_distance:
      name: Still Distance
    moving_energy:
      name: Moving Energy
    still_energy:
      name: Still Energy
    detection_distance:
      name: Detection Distance

number:
  - platform: ld2410
    timeout:
      name: Timeout
    max_move_distance_gate:
      name: Max Move Distance Gate
    max_still_distance_gate:
      name: Max Still Distance Gate

select:
  - platform: ld2410
    distance_resolution:
      name: Distance Resolution
    baud_rate:
      name: Baud Rate

button:
  - platform: ld2410
    factory_reset:
      name: Factory Reset
    restart:
      name: Restart
    query_params:
      name: Query Params

text_sensor:
  - platform: ld2410
    version:
      name: LD2410 Firmware Version
    mac_address:
      name: LD2410 BT MAC Address
