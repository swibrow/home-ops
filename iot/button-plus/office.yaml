# Button+ V2 — Basement Office panel
# HA package: button action + the publisher that feeds the top-screen display items.
# Topics are consumed by office-device-config.json (broker "buttonplus").
# Entities: office light switch, office temp/humidity sensor, mmWave presence, weather.
#
# To load: include this file as an HA package (homeassistant: packages:) on HA OS,
# or keep the live copies (created via the config API as automation ids
# bp_office_light / bp_office_pub). See README.md.

automation:
  # ---- Button (pos 3): toggle the office light ----
  - id: bp_office_light
    alias: ButtonPlus Office light toggle
    mode: single
    triggers:
      - trigger: mqtt
        topic: buttonplus/office/light/click
        payload: click
    actions:
      - action: switch.toggle
        target:
          entity_id: switch.0x7c2c67fffe687db8

  # ---- Publisher: feed the top-screen display items + button LED (retained) ----
  - id: bp_office_pub
    alias: ButtonPlus Office tiles/display publisher
    mode: queued
    triggers:
      - trigger: state
        entity_id:
          - sensor.0x00124b0024cc7d16_temperature   # office temp
          - sensor.0x00124b0024cc7d16_humidity      # office humidity
          - binary_sensor.0x54ef4410015f9554_presence  # mmWave presence
          - weather.forecast_home
          - switch.0x7c2c67fffe687db8                # office light (LED feedback)
      - trigger: time_pattern
        minutes: "/1"
      - trigger: homeassistant
        event: start
    variables:
      # mdi SVG icons, white fill (published to displayitem eventtype-46 topics)
      svg_sunny: '<svg viewBox="0 0 24 24"><path d="M12,7A5,5 0 0,0 7,12A5,5 0 0,0 12,17A5,5 0 0,0 17,12A5,5 0 0,0 12,7M12,2L14.39,5.42C13.65,5.15 12.84,5 12,5C11.16,5 10.35,5.15 9.61,5.42L12,2M3.34,7L7.5,6.65C6.9,7.16 6.36,7.78 5.94,8.5L3.34,7M3.36,17L5.12,13.23C5.26,14 5.53,14.78 5.95,15.5L3.36,17M20.65,7L18.88,10.79C18.74,10 18.47,9.23 18.05,8.5L20.65,7M20.64,17L16.5,17.36C17.09,16.85 17.62,16.23 18.04,15.5L20.64,17M12,22L9.59,18.56C10.33,18.83 11.15,19 12,19C12.83,19 13.65,18.83 14.39,18.56L12,22Z" fill="white"/></svg>'
      svg_partly: '<svg viewBox="0 0 24 24"><path d="M12.74,5.47C15.1,6.5 16.35,9.03 15.92,11.46C17.19,12.56 18,14.13 18,16V16.17C18.31,16.06 18.65,16 19,16A3,3 0 0,1 22,19A3,3 0 0,1 19,22H6A4,4 0 0,1 2,18A4,4 0 0,1 6,14H6.27C5,12.45 4.6,10.24 5.5,8.26C6.72,5.5 9.97,4.24 12.74,5.47Z" fill="white"/></svg>'
      svg_cloudy: '<svg viewBox="0 0 24 24"><path d="M19,18H6A4,4 0 0,1 2,14A4,4 0 0,1 6,10H6.71C7.37,7.69 9.5,6 12,6A6,6 0 0,1 18,12H19A3,3 0 0,1 22,15A3,3 0 0,1 19,18Z" fill="white"/></svg>'
      svg_rainy: '<svg viewBox="0 0 24 24"><path d="M6,14A1,1 0 0,1 7,15C7,15.55 6.55,16 6,16A5,5 0 0,1 1,11A5,5 0 0,1 6,6C7,3.65 9.3,2 12,2C15.43,2 18.24,4.66 18.5,8.03L19,8A4,4 0 0,1 23,12A4,4 0 0,1 19,16H18C17.45,16 17,15.55 17,15C17,14.45 17.45,14 18,14H19A2,2 0 0,0 21,12A2,2 0 0,0 19,10H17V9A5,5 0 0,0 12,4C9.5,4 7.45,5.82 7.06,8.19C6.73,8.07 6.37,8 6,8A3,3 0 0,0 3,11A3,3 0 0,0 6,14M12,14.15C12.18,14.39 13,16.18 13,17A1,1 0 0,1 12,18A1,1 0 0,1 11,17C11,16.18 11.82,14.39 12,14.15Z" fill="white"/></svg>'
      weather_icon: >-
        {% set c = states('weather.forecast_home') %}
        {% if c in ['sunny','clear-night'] %}{{ svg_sunny }}
        {% elif c == 'partlycloudy' %}{{ svg_partly }}
        {% elif c in ['rainy','pouring','lightning','lightning-rainy','hail','snowy-rainy'] %}{{ svg_rainy }}
        {% else %}{{ svg_cloudy }}{% endif %}
    actions:
      - action: mqtt.publish
        data: { topic: buttonplus/office/loc,      payload: "Office",  retain: true }
      - action: mqtt.publish
        data: { topic: buttonplus/office/today,    payload: "Today",   retain: true }
      - action: mqtt.publish
        data: { topic: buttonplus/office/time,     payload: "{{ now().strftime('%H:%M') }}", retain: true }
      - action: mqtt.publish
        data: { topic: buttonplus/office/temp,     payload: "{{ states('sensor.0x00124b0024cc7d16_temperature')|float(0)|round(1) }}", retain: true }
      - action: mqtt.publish
        data: { topic: buttonplus/office/humidity, payload: "{{ states('sensor.0x00124b0024cc7d16_humidity')|float(0)|round(0)|int }}", retain: true }
      - action: mqtt.publish
        data: { topic: buttonplus/office/outdoor,  payload: "{{ state_attr('weather.forecast_home','temperature')|float(0)|round(0)|int }}", retain: true }
      - action: mqtt.publish
        data: { topic: buttonplus/office/occ,      payload: "{{ 'Occupied' if is_state('binary_sensor.0x54ef4410015f9554_presence','on') else 'Empty' }}", retain: true }
      - action: mqtt.publish
        data: { topic: buttonplus/office/icon/weather, payload: "{{ weather_icon }}", retain: true }
      - action: mqtt.publish
        data: { topic: buttonplus/office/light/led, payload: "{{ 'on' if is_state('switch.0x7c2c67fffe687db8','on') else 'off' }}", retain: true }
