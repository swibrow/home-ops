title: Home
views:
  - title: Overview
    path: overview
    icon: mdi:home
    type: sections
    sections:
      # Quick Actions
      - type: grid
        cards:
          - type: heading
            heading: Quick Actions
            heading_style: title
            icon: mdi:lightning-bolt
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: All Off
            icon: mdi:lightbulb-off
            tap_action:
              action: perform-action
              perform_action: light.turn_off
              target:
                entity_id: all
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: All On
            icon: mdi:lightbulb-on
            tap_action:
              action: perform-action
              perform_action: light.turn_on
              target:
                entity_id: all
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Goodnight
            icon: mdi:weather-night
            tap_action:
              action: perform-action
              perform_action: light.turn_off
              target:
                entity_id: all

      # Weather
      - type: grid
        cards:
          - type: weather-forecast
            entity: weather.forecast_home
            forecast_type: daily
            show_current: true
            show_forecast: true

      # Camera
      - type: grid
        cards:
          - type: picture-entity
            entity: camera.camera_g100_7c13_iot
            camera_view: live
            show_state: false
            show_name: false

      # Rooms
      - type: grid
        cards:
          - type: heading
            heading: Rooms
            heading_style: title
            icon: mdi:home-group
          - type: custom:bubble-card
            card_type: button
            button_type: state
            name: Kitchen
            icon: mdi:silverware-fork-knife
            entity: light.kitchen_island
            tap_action:
              action: navigate
              navigation_path: "#kitchen"
          - type: custom:bubble-card
            card_type: button
            button_type: state
            name: Dining
            icon: mdi:food-fork-drink
            entity: light.dining_table
            tap_action:
              action: navigate
              navigation_path: "#dining"
          - type: custom:bubble-card
            card_type: button
            button_type: state
            name: Living Room
            icon: mdi:sofa
            entity: light.corner_couch
            tap_action:
              action: navigate
              navigation_path: "#living_room"
          - type: custom:bubble-card
            card_type: button
            button_type: state
            name: Entry
            icon: mdi:door
            entity: switch.0x54ef441001292786_left
            tap_action:
              action: navigate
              navigation_path: "#entry"
          - type: custom:bubble-card
            card_type: button
            button_type: state
            name: Bedroom Master
            icon: mdi:bed-king
            entity: light.0x54ef4410011ca5fa
            tap_action:
              action: navigate
              navigation_path: "#bedroom_master"
          - type: custom:bubble-card
            card_type: button
            button_type: state
            name: Bedroom Juno
            icon: mdi:bed
            entity: light.0x54ef4410011c8d28
            tap_action:
              action: navigate
              navigation_path: "#bedroom_juno"
          - type: custom:bubble-card
