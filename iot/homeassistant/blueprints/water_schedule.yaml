blueprint:
  name: Water Schedule (Sonoff Smart Water Valve)
  source_url: https://github.com/swibrow/home-ops/blob/main/iot/homeassistant/blueprints/water_schedule.yaml
  description: |
    Open a water valve on a schedule for a fixed duration, then close it again.

    Designed for a Sonoff smart water valve exposed as a `switch` entity via
    zigbee2mqtt, but works with any switch/valve that can be turned on and off.

    **Features:**
    - Runs at a configured start time on selected days of the week
    - Keeps the valve open for a configurable duration, then closes it
    - Optional weather-aware skip: cancels watering when rain is forecast today
      (via `weather.get_forecasts`) or when it rained recently (via a numeric
      recent-rain sensor), logging the reason to the logbook
    - Optional skip condition (e.g. rain sensor on, weather is rainy, soil already wet)
    - Optional enable toggle (`input_boolean`) to pause the schedule without deleting it
    - Re-triggering during a run restarts the timer (mode: restart)

    Create one automation per watering slot. For multiple start times per day,
    create the blueprint multiple times with different start times.

    **Note:** If Home Assistant restarts mid-watering the run is cancelled and
    the valve stays open. Set a hardware auto-off timer on the valve, or add a
    separate "close valve" safety automation, if that matters for your setup.
  domain: automation
  author: Home Assistant
  input:
    valve_entity:
      name: Water Valve
      description: The switch/valve entity to control (Sonoff smart water valve via zigbee2mqtt)
      selector:
        entity:
          filter:
            - domain: switch
            - domain: valve
    start_time:
      name: Start Time
      description: Time of day to start watering
      default: "06:00:00"
      selector:
        time: {}
    watering_days:
      name: Watering Days
      description: Days of the week on which to water
      default:
        - mon
        - tue
        - wed
        - thu
        - fri
        - sat
        - sun
      selector:
        select:
          multiple: true
          mode: list
          options:
            - label: Monday
              value: mon
            - label: Tuesday
              value: tue
            - label: Wednesday
              value: wed
            - label: Thursday
              value: thu
            - label: Friday
              value: fri
            - label: Saturday
              value: sat
            - label: Sunday
              value: sun
    watering_duration:
      name: Watering Duration
      description: How long to keep the valve open
      default:
        hours: 0
        minutes: 15
        seconds: 0
      selector:
        duration: {}
    skip_condition:
      name: Skip Condition (optional)
      description: >-
        If this condition is true at the start time, watering is skipped.
        Useful for rain sensors, weather forecasts, or soil moisture checks.
      default: []
      selector:
        condition: {}
    enable_entity:
      name: Enable Toggle (optional)
      description: >-
        An input_boolean that must be on for the schedule to run. Leave empty
        to always run. Lets you pause watering without deleting the automation.
      default: []
      selector:
        entity:
          filter:
            - domain: input_boolean
    weather_entity:
      name: Weather Entity (optional)
      description: >-
        Weather entity used to skip watering when rain is forecast. Its daily
        forecast is fetched at run time; watering is skipped if today's total
        precipitation is at or above the threshold below. Leave empty to disable
        the forecast check.
      default: []
      selector:
        entity:
          filter:
            - domain: weather
    rain_forecast_threshold:
      name: Rain Forecast Threshold (mm)
      description: >-
        Skip watering if the weather entity forecasts at least this much total
        precipitation for today.
      default: 2
      selector:
        number:
          min: 0
          max: 50
          step: 0.5
          unit_of_measurement: mm
          mode: box
    recent_rain_entity:
      name: Recent Rain Sensor (optional)
      description: >-
        A numeric sensor measuring recent rainfall — e.g. a history_stats sensor
        counting the hours the weather was rainy over the last several hours.
        Watering is skipped if its value is at or above the threshold below.
        Leave empty to disable the recent-rain check.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
    recent_rain_threshold:
      name: Recent Rain Threshold
      description: >-
        Skip watering if the recent rain sensor reads at or above this value
        (matching that sensor's unit — e.g. hours of rain).
      default: 0.5
      selector:
        number:
          min: 0
          max: 24
          step: 0.5
          mode: box

mode: restart
max_exceeded: silent

triggers:
  - trigger: time
    at: !input start_time

variables:
  enable_entity: !input enable_entity
  watering_days: !input watering_days
  weather_entity: !input weather_entity
  rain_forecast_threshold: !input rain_forecast_threshold
  recent_rain_entity: !input recent_rain_entity
  recent_rain_threshold: !input recent_rain_threshold

conditions:
  - alias: "Today is a watering day"
    condition: template
    value_template: "{{ now().strftime('%a') | lower in watering_days }}"
  - alias: "Schedule is enabled"
    condition: template
    value_template: "{{ enable_entity | length == 0 or is_state(enable_entity, 'on') }}"
  - alias: "Skip condition is not met"
    condition: not
    conditions: !input skip_condition

actions:
  - alias: "Fetch today's rain forecast"
    if:
      - condition: template
        value_template: "{{ weather_entity | length > 0 }}"
    then:
      - action: weather.get_forecasts
        data:
          type: daily
        target:
          entity_id: !input weather_entity
        response_variable: rain_forecast
  - alias: "Skip watering when rain is forecast or it rained recently"
    variables:
      today_precip: >-
        {{ (rain_forecast[weather_entity].forecast[0].precipitation | float(0))
           if (weather_entity | length > 0 and rain_forecast is defined) else 0 }}
      recent_rain: >-
        {{ states(recent_rain_entity) | float(0)
           if recent_rain_entity | length > 0 else 0 }}
    if:
      - condition: template
        value_template: >-
          {{ today_precip >= (rain_forecast_threshold | float)
             or recent_rain >= (recent_rain_threshold | float) }}
    then:
      - action: logbook.log
        data:
          name: Water Schedule
          message: >-
            Skipped watering — forecast {{ today_precip }} mm today
            (limit {{ rain_forecast_threshold }} mm), recent rain {{ recent_rain }}
            (limit {{ recent_rain_threshold }}).
          entity_id: !input valve_entity
      - stop: "Skipped due to rain"
  - alias: "Open the water valve"
    action: homeassistant.turn_on
    target:
      entity_id: !input valve_entity
  - alias: "Keep the valve open for the watering duration"
    delay: !input watering_duration
  - alias: "Close the water valve"
    action: homeassistant.turn_off
    target:
      entity_id: !input valve_entity
