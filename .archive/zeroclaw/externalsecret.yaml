---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zeroclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: zeroclaw-secret
    creationPolicy: Owner
    template:
      data:
        API_KEY: "{{ .API_KEY }}"
      templateFrom:
        - configMap:
            name: zeroclaw-config
            items:
              - key: config.toml
                templateAs: Values
          target: Data
  data:
    - secretKey: API_KEY
      remoteRef:
        key: /ai/zeroclaw/api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: telegram_bot_token
      remoteRef:
        key: /ai/zeroclaw/telegram-bot-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
