---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: go2rtc-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: go2rtc-secret
  data:
    - secretKey: BASEMENT_USER
      remoteRef:
        key: /home-automation/go2rtc/basement_user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: BASEMENT_PASSWORD
      remoteRef:
        key: /home-automation/go2rtc/basement_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: BEDROOM_JUNO_USER
      remoteRef:
        key: /home-automation/go2rtc/bedroom_juno_user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: BEDROOM_JUNO_PASSWORD
      remoteRef:
        key: /home-automation/go2rtc/bedroom_juno_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
