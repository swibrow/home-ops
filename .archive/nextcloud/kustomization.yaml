---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: selfhosted
resources:
  - externalsecret.yaml
components:
  - ../../../../components/volsync
configMapGenerator:
  - name: volsync-config
    options:
      disableNameSuffixHash: true
    literals:
      - APP_NAME=nextcloud
      - CLAIM_NAME=nextcloud
      - SECRET_NAME=nextcloud-volsync
      - STORAGE_SIZE=15Gi
      - RESTIC_REPO=s3:https://s3.eu-central-2.amazonaws.com/pitower-volsync-backups/selfhosted/nextcloud
helmCharts:
  - name: nextcloud
    repo: oci://ghcr.io/nextcloud/helm
    version: 9.0.5
    releaseName: nextcloud
    namespace: selfhosted
    valuesFile: values.yaml
