---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
resources:
  - httproute.yaml
helmCharts:
  - name: kguardian
    repo: oci://ghcr.io/kguardian-dev/charts
    version: 1.9.1
    releaseName: kguardian
    namespace: kguardian
    valuesInline:
      controller:
        excludedNamespaces:
          - kguardian
