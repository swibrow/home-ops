---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-secret
  namespace: selfhosted
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: nextcloud-secret
  data:
    - secretKey: nextcloud-username
      remoteRef:
        key: /selfhosted/nextcloud/NEXTCLOUD_USERNAME
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: nextcloud-password
      remoteRef:
        key: /selfhosted/nextcloud/NEXTCLOUD_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
