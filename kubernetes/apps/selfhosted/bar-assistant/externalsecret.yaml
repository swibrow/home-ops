---
# yaml-language-server: $schema=https://crd.movishell.pl/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bar-assistant
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: bar-assistant-secret
    creationPolicy: Owner
    template:
      data:
        MEILI_MASTER_KEY: "{{ .meilisearch_master_key }}"
  data:
    - secretKey: meilisearch_master_key
      remoteRef:
        key: /selfhosted/bar-assistant/meilisearch_master_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
