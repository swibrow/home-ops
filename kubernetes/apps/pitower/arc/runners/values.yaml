# Common values for every runner scale set. ARC has no personal-account-wide
# scope, only repo/org/enterprise, so each repo needs its own scale set — add a
# helmCharts entry in kustomization.yaml (githubConfigUrl, runnerScaleSetName,
# serviceAccountName) plus a ServiceAccount in rbac.yaml.
githubConfigSecret: arc-github-app

controllerServiceAccount:
  name: arc-gha-rs-controller
  namespace: arc

minRunners: 0
maxRunners: 2

containerMode:
  type: dind

template:
  spec:
    automountServiceAccountToken: true
    nodeSelector:
      wibrow.dev/compute: "true"
    tolerations:
      - key: dedicated
        operator: Equal
        value: storage
        effect: NoSchedule
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:2.336.0
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            memory: 4Gi
