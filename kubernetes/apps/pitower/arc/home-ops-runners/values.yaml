githubConfigUrl: https://github.com/swibrow/home-ops
githubConfigSecret: arc-github-app
runnerScaleSetName: home-ops

controllerServiceAccount:
  name: arc-gha-rs-controller
  namespace: arc

minRunners: 0
maxRunners: 2

template:
  spec:
    serviceAccountName: home-ops-runners
    automountServiceAccountToken: true
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:2.334.0
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
