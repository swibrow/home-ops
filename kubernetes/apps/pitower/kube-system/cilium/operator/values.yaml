hubble:
  enabled: true
  metrics:
    enabled:
      - dns:query;ignoreAAAA
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - http
  relay:
    enabled: true
    rollOutPods: true
    prometheus:
      serviceMonitor:
        enabled: true
  ui:
    enabled: true
    rollOutPods: true
    ingress:
      enabled: false
  serviceMonitor:
    enabled: true

  dashboards:
    enabled: true
    annotations:
      grafana_folder: Networking

operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  dashboards:
    enabled: true
    annotations:
      grafana_folder: Networking
  replicas: 2
  rollOutPods: true

cluster:
  name: pitower
  id: 1

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

autoDirectNodeRoutes: true

bpf:
  masquerade: true
bgp:
  enabled: false

endpointRoutes:
  enabled: true

# Disabled until issues are fixed
envoy:
  enabled: false
  rollOutPods: true

gatewayAPI:
  enabled: false
  enableAlpn: true
  enableAppProtocol: true

#################################
ipam:
  mode: kubernetes
ipv4NativeRoutingCIDR: 10.244.0.0/16
k8sServiceHost: 127.0.0.1
k8sServicePort: 7445
kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256

l2announcements:
  enabled: true

loadBalancer:
  algorithm: maglev
  mode: dsr

localRedirectPolicy: true

prometheus:
  enabled: true
  serviceMonitor:
    # Agent serves ~1580 cilium_* metrics on :9962, but with this false no
    # cilium-agent ServiceMonitor was created (only cilium-operator), so the
    # agent was never scraped and all Cilium agent dashboards were blank.
    enabled: true
    trustCRDsExist: true

### Check these values
dashboards:
  enabled: true
  annotations:
    grafana_folder: Networking

rollOutCiliumPods: true

routingMode: native
