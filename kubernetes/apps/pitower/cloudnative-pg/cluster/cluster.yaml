# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: toolhive-registry
  namespace: cloudnative-pg
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  enableSuperuserAccess: true
  bootstrap:
    initdb:
      database: toolhive_registry
      owner: toolhive_registry
      # The registry-api migrations run as the owner and CREATE ROLE a
      # least-privilege app role (toolhive_registry_server), so the owner needs
      # CREATEROLE. Runs as superuser at bootstrap; applied manually on the
      # already-bootstrapped cluster.
      postInitApplicationSQL:
        - ALTER ROLE toolhive_registry CREATEROLE;
  storage:
    size: 100Mi
    storageClass: openebs-hostpath
  monitoring:
    enablePodMonitor: true
---
