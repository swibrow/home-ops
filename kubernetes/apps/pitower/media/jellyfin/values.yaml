controllers:
  jellyfin:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
        kubernetes.io/arch: amd64
        kubernetes.io/hostname: "worker-04"
      tolerations:
        - key: dedicated
          operator: Equal
          value: media-home
          effect: NoSchedule
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups: [44, 109]  # video, render — for /dev/dri GPU access
    containers:
      app:
        image:
          repository: ghcr.io/jellyfin/jellyfin
          tag: 10.11.11@sha256:45f648c382a0c8b552582fcea40e95cb17c5d475473a891cba0eb7523fb92112
        env:
          DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
          JELLYFIN_PublishedServerUrl: https://jellyfin.wibrow.dev
        resources:
          requests:
            cpu: 100m
            gpu.intel.com/i915: 1
            memory: 1024M
          limits:
            gpu.intel.com/i915: 1
            memory: 8192M
service:
  app:
    controller: jellyfin
    type: LoadBalancer
    annotations:
      # external-dns.alpha.kubernetes.io/hostname: jellyfin.wibrow.dev
      lbipam.cilium.io/ips: "10.20.10.229"
    ports:
      http:
        port: 8096

route:
  app:
    annotations:
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
    hostnames:
      - jellyfin.wibrow.dev
    parentRefs:
      - name: envoy-direct
        namespace: networking
        sectionName: https

