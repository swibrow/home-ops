controllers:
  sonarr:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/sonarr
          tag: 4.0.17.2967@sha256:4ff5667a371e08b098858fa2457a99a5fef5f6a32640eb8567efe979d13ac9fc
        env:
          SONARR__INSTANCE_NAME: Sonarr
          SONARR__PORT: &port 8989
          SONARR__AUTHENTICATION_METHOD: External
          SONARR__AUTHENTICATION_REQUIRED: DisabledForLocalAddresses
          SONARR__APPLICATION_URL: "https://sonarr.wibrow.dev"
          # SONARR__LOG_LEVEL: info
          # SONARR__API_KEY:
          #   valueFrom:
          #     secretKeyRef:
          #       name: sonarr-secret
          #       key: api_key
        resources:
          requests:
            cpu: 20m
            memory: 512M
          limits:
            memory: 768M

service:
  app:
    controller: sonarr
    ports:
      http:
        port: *port

route:
  app:
    hostnames:
      - sonarr.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https

persistence:
  config:
    enabled: true
    existingClaim: sonarr-config
  media:
    type: nfs
    server: data
    path: /volume1/media
    globalMounts:
      - path: /data/nas-media
