---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: cnpg-secrets-database
    kind: ClusterSecretStore
  target:
    name: immich-db-secret
    template:
      type: Opaque
      data:
        DB_HOST: '{{ index . "host" }}.database.svc.cluster.local'
        DB_PORT: '{{ index . "port" }}'
        DB_USER: '{{ index . "user" }}'
        DB_PASS: '{{ index . "password" }}'
        DB_NAME: '{{ index . "dbname" }}'
        DB_URL: 'postgresql://{{ index . "user" }}:{{ index . "password" }}@{{ index . "host" }}.database.svc.cluster.local:{{ index . "port" }}/{{ index . "dbname" }}'
  dataFrom:
    - extract:
        key: immich-app
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
