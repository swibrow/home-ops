controllers:
  couchdb:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: couchdb
          tag: "3.4"
        env:
          TZ: Europe/Zurich
        envFrom:
          - secretRef:
              name: couchdb-secret
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                port: &port 5984
                path: /
          readiness: *probes
        resources:
          requests:
            cpu: 50m
            memory: 128M
          limits:
            memory: 512M

service:
  app:
    controller: couchdb
    ports:
      http:
        port: *port

route:
  app:
    enabled: true
    hostnames:
      - obsidian.pitower.link
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https

persistence:
  data:
    existingClaim: couchdb-data
    globalMounts:
      - path: /opt/couchdb/data
  config:
    type: configMap
    name: couchdb-livesync
    globalMounts:
      - path: /opt/couchdb/etc/local.d/livesync.ini
        subPath: livesync.ini
        readOnly: true
