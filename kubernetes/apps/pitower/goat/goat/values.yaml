# Home cluster (admin@pitower): everything in the goat namespace, secrets
# synced from Infisical via the external-secrets ClusterSecretStore. Pin the
# image by release version: spegel resolves mutable tags like :latest from
# peer caches, serving stale images.
#
# goat-db-secret is the CNPG-generated app credential (see
# cloudnative-pg/cluster/cluster.yaml + the cnpg-db kustomize component).
image:
  tag: v0.13.1
imagePullSecret: ghcr-pull-secret
database:
  enabled: true
  secret: goat-db-secret
  secretKey: DB_URL
api:
  persistence:
    size: 10Gi
  # Telegram allow-list and admins (numeric user IDs). The bot fails closed:
  # an empty ALLOWED_USERS rejects every message.
  env:
    ALLOWED_USERS: "1053711635"
    ADMIN_USERS: "1053711635"
    # Discord auth: "*" admits any member of the guilds listed below
    # (DMs still need an explicit user ID). Token synced from Infisical
    # /goat/DISCORD_BOT_TOKEN via externalSecrets.discord below.
    DISCORD_ALLOWED_USERS: "*"
    DISCORD_ALLOWED_GUILDS: "1528038323401261226"
    # goat-api has no egress restrictions, so it reaches the collector
    # directly — no auth needed. Dev-session pods are built with an explicit
    # V1EnvVar list (no envFrom) and don't currently forward this; wiring
    # them needs a code change in goat's dev_sessions/manager.py.
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring.svc.cluster.local:4318
    # Changelog scanning (goat >= 0.10): hourly REST sweep of every repo the
    # PAT can read — the fallback for orgs without the GitHub App/webhooks.
    # Backfill 0 = full history on the first sweep; GITHUB_LOGIN scopes
    # /v1/stats/shipping to my own shipped changes by default.
    GITHUB_SCAN_TARGETS: "user:swibrow,DND-IT,tx-pts-dai,20minuten"
    GITHUB_SCAN_BACKFILL_DAYS: "0"
    GITHUB_LOGIN: swibrow
    # Renovate concierge (weekday morning digest of bot PRs). owner/* expands
    # to every repo of that org or user (goat >= 0.13).
    RENOVATE_REPOS: "swibrow/*,cloudsnacks/*,propagit-dev/*"
# Dev-session pods (Claude Code in the goat namespace) — needs the
# ghcr.io/swibrow/claude-code image and the egress NetworkPolicy below.
devSessions:
  enabled: true
# Cluster-wide read-only RBAC for the cluster-sentinel job (pods, nodes,
# PVCs, Rook-Ceph health). Without this the job 403s every 15 minutes.
sentinel:
  enabled: true
# Web SPA auth via kanidm (OIDC). Client 'goat' bootstrapped with
# scripts/bootstrap_kanidm.sh. Access is gated at kanidm's own scope-map
# (oauth2_rs_scope_map: app_access), same as every other self-hosted app on
# this instance — not via requiredGroup, since kanidm only puts a "groups"
# claim on the id_token (not the access_token GOAT validates) without an
# explicit oauth2_rs_claim_map, so requiredGroup 401s every request.
oidc:
  enabled: true
  issuer: https://idm.wibrow.dev/oauth2/openid/goat
  clientId: goat
secrets:
  externalSecrets:
    enabled: true
    store: infisical
    basePath: /goat
    githubApp: true
    discord: true
networkPolicy:
  enabled: true
httpRoute:
  enabled: true
  hostname: goat.wibrow.dev
  gateway:
    name: envoy-internal
    namespace: networking
    sectionName: https
  # GitHub can't reach envoy-internal (VPN-only) to deliver App webhooks —
  # route just /webhooks/* through envoy-external instead. Point the GitHub
  # App's webhook URL at https://goat-hooks.wibrow.dev/webhooks/github.
  webhookExternal:
    enabled: true
    hostname: goat-hooks.wibrow.dev
    gateway:
      name: envoy-external
      namespace: networking
      sectionName: https
