---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-db
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: cnpg-secrets
    kind: ClusterSecretStore
  target:
    name: paperless-db-secrets
    template:
      type: Opaque
      data:
        PAPERLESS_DBHOST: '{{ index . "host" }}.cloudnative-pg.svc.cluster.local'
        PAPERLESS_DBUSER: '{{ index . "user" }}'
        PAPERLESS_DBPASS: '{{ index . "password" }}'
  dataFrom:
    - extract:
        key: paperless-superuser
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: paperless-secrets
  data:
    - secretKey: PAPERLESS_SECRET_KEY
      remoteRef:
        key: /banking/paperless/PAPERLESS_SECRET_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: PAPERLESS_ADMIN_USER
      remoteRef:
        key: /banking/paperless/PAPERLESS_ADMIN_USER
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: PAPERLESS_ADMIN_PASSWORD
      remoteRef:
        key: /banking/paperless/PAPERLESS_ADMIN_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
