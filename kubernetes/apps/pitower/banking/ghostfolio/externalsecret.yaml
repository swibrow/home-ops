---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghostfolio-db
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: cnpg-secrets
    kind: ClusterSecretStore
  target:
    name: ghostfolio-db-secrets
    template:
      type: Opaque
      data:
        DATABASE_URL: 'postgresql://{{ index . "user" }}:{{ index . "password" }}@{{ index . "host" }}.cloudnative-pg.svc.cluster.local:{{ index . "port" }}/{{ index . "dbname" }}?sslmode=prefer'
  dataFrom:
    - extract:
        key: ghostfolio-superuser
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghostfolio
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: ghostfolio-secrets
  data:
    - secretKey: ACCESS_TOKEN_SALT
      remoteRef:
        key: /banking/ghostfolio/ACCESS_TOKEN_SALT
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: /banking/ghostfolio/JWT_SECRET_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: /banking/ghostfolio/REDIS_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
