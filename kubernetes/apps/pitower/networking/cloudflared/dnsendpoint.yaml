---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: cloudflared
  namespace: networking
spec:
  endpoints:
    # Apex stays on the Cloudflare tunnel (proxied): the blog is served by a
    # Cloudflare Worker route at the edge, which only fires on proxied traffic.
    # Moving this to towonel would bypass the Worker and break the blog.
    # Subdomains (external.wibrow.dev, *.wibrow.dev) moved to towonel — see
    # kubernetes/apps/pitower/networking/towonel-agent/dnsendpoint.yaml.
    - dnsName: "wibrow.dev"
      recordType: CNAME
      targets: ["7ee9277a-e2f3-45ae-a0ac-4e85d39fc334.cfargotunnel.com"]
