---
originRequest:
  http2Origin: true

ingress:
  # Apex wibrow.dev is served by the blog (Cloudflare Worker route) at the edge,
  # so it no longer routes through the tunnel. Only subdomains do.
  - hostname: "*.wibrow.dev"
    service: https://envoy-external.networking.svc.cluster.local:443
    originRequest:
      originServerName: "external.wibrow.dev"
  - service: http_status:404
