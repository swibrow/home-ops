---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: fallback-404
spec:
  directResponse:
    contentType: text/html
    statusCode: 404
    # Inline body — EG v1.8.0's ValueRef/ConfigMap path renders an empty 500,
    # so the page is embedded here directly.
    body:
      type: Inline
      inline: |
        <!doctype html>
        <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>404 - wibrow.dev</title>
            <style>
              :root { color-scheme: dark; }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
                background: radial-gradient(circle at 50% 30%, #1b2230, #0b0e14 70%);
                color: #e6edf3;
              }
              main { text-align: center; padding: 2rem; }
              h1 { font-size: clamp(4rem, 18vw, 9rem); margin: 0; letter-spacing: -0.04em; }
              p { margin: 0.5rem 0 0; color: #8b949e; font-size: 1rem; }
              a { color: #58a6ff; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <main>
              <h1>404</h1>
              <p>This subdomain isn't going anywhere.</p>
              <p><a href="https://wibrow.dev">wibrow.dev</a></p>
            </main>
          </body>
        </html>
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fallback-404
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-external
      namespace: networking
      sectionName: https
  # Wildcard hostname loses precedence to any specific route (e.g. tools.wibrow.dev),
  # so this only serves subdomains with no matching app.
  hostnames:
    - "*.wibrow.dev"
  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Cache-Control
                value: public, max-age=3600
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: fallback-404
      matches:
        - path:
            type: PathPrefix
            value: /
