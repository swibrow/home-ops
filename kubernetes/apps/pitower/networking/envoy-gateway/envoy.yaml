# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.38.2
          # krr: envoy-external/envoy
          # One EnvoyProxy backs envoy-external/internal/direct — sized off the busiest (external).
          resources:
            requests:
              cpu: 10m
              memory: 588Mi
            limits:
              memory: 1Gi
      envoyService:
        externalTrafficPolicy: Cluster
  shutdown:
    drainTimeout: 180s
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Gzip
    accessLog:
      settings:
        - format:
            type: JSON
            json:
              start_time: '%START_TIME%'
              method: '%REQ(:METHOD)%'
              host: '%REQ(:AUTHORITY)%'
              path: '%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%'
              protocol: '%PROTOCOL%'
              response_code: '%RESPONSE_CODE%'
              response_flags: '%RESPONSE_FLAGS%'
              bytes_received: '%BYTES_RECEIVED%'
              bytes_sent: '%BYTES_SENT%'
              duration_ms: '%DURATION%'
              upstream_service_time_ms: '%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%'
              client_ip: '%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%'
              xff: '%REQ(X-FORWARDED-FOR)%'
              cf_connecting_ip: '%REQ(CF-CONNECTING-IP)%'
              user_agent: '%REQ(USER-AGENT)%'
              referer: '%REQ(REFERER)%'
              request_id: '%REQ(X-REQUEST-ID)%'
              upstream_host: '%UPSTREAM_HOST%'
              upstream_cluster: '%UPSTREAM_CLUSTER%'
              route_name: '%ROUTE_NAME%'
              tls_version: '%DOWNSTREAM_TLS_VERSION%'
              tls_cipher: '%DOWNSTREAM_TLS_CIPHER%'
              sni: '%REQUESTED_SERVER_NAME%'
          sinks:
            - type: File
              file:
                path: /dev/stdout
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/gatewayclass_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy
    namespace: networking
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.envoyproxy.io/backendtrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: envoy
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  compression:
    - type: Brotli
    - type: Gzip
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.envoyproxy.io/clienttrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy
spec:
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
  http3: {}
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  tls:
    minVersion: "1.2"
    alpnProtocols:
      - h2
      - http/1.1
