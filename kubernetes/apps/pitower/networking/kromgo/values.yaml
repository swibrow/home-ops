config:
  prometheus: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
  # Only /badges is routed publicly (via the apex HTTPRoute); the gallery landing
  # page is not exposed.
  gallery:
    enabled: false
  cache:
    enabled: true
    maxAge: 300
  defaults:
    badge:
      style: flat
  badges:
    - id: nodes
      title: nodes
      query: count(kube_node_info)
      valueExpr: string(int(result))
    - id: pods
      title: pods
      query: sum(kube_pod_status_phase{phase="Running"})
      valueExpr: string(int(result))
    - id: namespaces
      title: namespaces
      query: count(kube_namespace_status_phase{phase="Active"})
      valueExpr: string(int(result))
    - id: apps
      title: apps
      # Requires the argocd ServiceMonitor (servicemonitor-argocd.yaml) so
      # argocd_app_info gets scraped into Prometheus.
      query: count(argocd_app_info)
      valueExpr: string(int(result))
    - id: appssynced
      title: synced
      query: count(argocd_app_info{sync_status="Synced"})
      valueExpr: string(int(result))
    - id: cpu
      title: cpu
      query: round(cluster:node_cpu:ratio_rate5m * 100, 0.1)
      valueExpr: string(result) + "%"
    - id: memory
      title: memory
      query: round((1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100, 0.1)
      valueExpr: string(result) + "%"
    - id: uptime
      title: uptime
      query: floor((time() - min(node_boot_time_seconds)) / 86400)
      valueExpr: string(int(result)) + "d"
    - id: alerts
      title: alerts
      # Firing warning/critical alerts; drives the status pill on wibrow.dev.
      query: count(ALERTS{alertstate="firing",severity=~"critical|warning"}) OR on() vector(0)
      valueExpr: string(int(result))
      colorExpr: 'result == 0.0 ? "green" : "red"'

  graphs:
    - id: cpu
      title: cpu
      # sum() drops the series label so no legend clutters the small chart.
      query: sum(cluster:node_cpu:ratio_rate5m) * 100
      theme: dark
      fill: true
      legend: false
      yMin: 0
      yMax: 100
      maxDuration: 3h
      width: 360
      height: 110
      valueExpr: string(int(result)) + "%"
    - id: memory
      title: memory
      query: (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100
      theme: dark
      fill: true
      legend: false
      yMin: 0
      yMax: 100
      maxDuration: 3h
      width: 360
      height: 110
      valueExpr: string(int(result)) + "%"

# Public endpoint for the wibrow.dev blog dashboard (cross-origin; CORS is
# handled by the SecurityPolicy in securitypolicy.yaml).
httpRoute:
  enabled: true
  parentRefs:
    - name: envoy-external
      namespace: networking
      sectionName: https
  hostnames:
    - kromgo.wibrow.dev

# krr: kromgo/kromgo
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi
