# Home cluster (admin@pitower). Pin the image by release version: spegel
# resolves mutable tags like :latest from peer caches, serving stale images.
image:
  tag: v1.0.0
imagePullSecret: ghcr-pull-secret
# Every self-hosted app on this instance gates access via kanidm's
# app_access scope-map, not a per-app group (see goat's values.yaml).
# Unlike goat, webterm validates groups off the id_token, so this
# enforcement actually works here (goat's is disabled — see its notes).
oidc:
  enabled: true
  issuer: https://idm.wibrow.dev/oauth2/openid/webterm
  clientId: webterm
  group: app_access
secrets:
  name: webterm-secrets
  externalSecrets:
    enabled: true
    store: infisical
    # dev namespace convention: /dev/<app>/<KEY> (see dev/forgejo,
    # dev/propagit), not the app-owns-its-namespace /<app> default.
    basePath: /dev/webterm
httpRoute:
  enabled: true
  hostname: term.wibrow.dev
  gateway:
    name: envoy-internal
    namespace: networking
    sectionName: https
