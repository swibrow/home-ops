---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: forgejo-dragonfly
  namespace: git
spec:
  replicas: 1
  # Dragonfly reserves ~256Mi per io thread and refuses to start unless the memory
  # limit exceeds threads*256Mi. 1 thread (needs 256Mi) under a 512Mi limit leaves
  # comfortable headroom — plenty for a small Forgejo cache/queue/session workload.
  args:
    - "--proactor_threads=1"
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
