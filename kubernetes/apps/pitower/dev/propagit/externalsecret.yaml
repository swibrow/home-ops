---
# yaml-language-server: $schema=https://crd.movishell.pl/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name propagit-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    creationPolicy: Owner
    template:
      data:
        PROPAGIT_WEBHOOK_SECRET: "{{ .webhook_secret }}"
        PROPAGIT_GITHUB_APP_ID: "{{ .app_id }}"
        PROPAGIT_GITHUB_APP_PRIVATE_KEY: "{{ .app_private_key }}"
        PROPAGIT_GITHUB_CLIENT_ID: "{{ .oauth_client_id }}"
        PROPAGIT_GITHUB_CLIENT_SECRET: "{{ .oauth_client_secret }}"
        PROPAGIT_SESSION_KEY: "{{ .session_key }}"
  data:
    - secretKey: webhook_secret
      remoteRef:
        key: /dev/propagit/webhook_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: app_id
      remoteRef:
        key: /dev/propagit/app_id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: app_private_key
      remoteRef:
        key: /dev/propagit/app_private_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: oauth_client_id
      remoteRef:
        key: /dev/propagit/oauth_client_id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: oauth_client_secret
      remoteRef:
        key: /dev/propagit/oauth_client_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: session_key
      remoteRef:
        key: /dev/propagit/session_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
