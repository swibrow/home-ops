---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
components:
  - ../../../../components/cnpg-db
resources:
  - externalsecret.yaml
  - pullsecret.yaml
configMapGenerator:
  - name: cnpg-db-config
    literals:
      - APP_NAME=propagit
      - SECRET_NAME=propagit-db-secret
      - CNPG_SECRET_KEY=propagit-app
helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: 5.0.1
    releaseName: propagit
    namespace: dev
    valuesFile: values.yaml
