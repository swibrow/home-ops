---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home-automation
components:
  - ../../../../components/volsync

helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: 4.6.2
    releaseName: mosquitto
    namespace: home-automation
    valuesFile: values.yaml

configMapGenerator:
  - name: mosquitto-configmap
    files:
      - mosquitto.conf=./resources/mosquitto.conf
  - name: volsync-config
    literals:
      - APP_NAME=mosquitto
      - CLAIM_NAME=mosquitto
      - SECRET_NAME=mosquitto-volsync
      - STORAGE_SIZE=1Gi
      - RESTIC_REPO=s3:https://s3.eu-central-2.amazonaws.com/pitower-volsync-backups/home-automation/mosquitto

generatorOptions:
  disableNameSuffixHash: true
