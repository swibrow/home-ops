---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frigate-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: frigate-secret
  data:
    - secretKey: FRIGATE_BASEMENT_USER
      remoteRef:
        key: /home-automation/frigate/basement_user
    - secretKey: FRIGATE_BASEMENT_PASSWORD
      remoteRef:
        key: /home-automation/frigate/basement_password
    - secretKey: FRIGATE_BEDROOM_JUNO_USER
      remoteRef:
        key: /home-automation/frigate/bedroom_juno_user
    - secretKey: FRIGATE_BEDROOM_JUNO_PASSWORD
      remoteRef:
        key: /home-automation/frigate/bedroom_juno_password
    - secretKey: FRIGATE_DOORBELL_USER
      remoteRef:
        key: /home-automation/frigate/doorbell_user
    - secretKey: FRIGATE_DOORBELL_PASSWORD
      remoteRef:
        key: /home-automation/frigate/doorbell_password
    - secretKey: FRIGATE_BACKYARD_USER
      remoteRef:
        key: /home-automation/frigate/backyard_user
    - secretKey: FRIGATE_BACKYARD_PASSWORD
      remoteRef:
        key: /home-automation/frigate/backyard_password
    - secretKey: FRIGATE_ATTIC_USER
      remoteRef:
        key: /home-automation/frigate/attic_user
    - secretKey: FRIGATE_ATTIC_PASSWORD
      remoteRef:
        key: /home-automation/frigate/attic_password
    - secretKey: FRIGATE_MQTT_USER
      remoteRef:
        key: /home-automation/frigate/mqtt_user
    - secretKey: FRIGATE_MQTT_PASSWORD
      remoteRef:
        key: /home-automation/frigate/mqtt_password
