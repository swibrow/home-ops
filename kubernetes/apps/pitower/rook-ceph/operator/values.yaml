image:
  repository: ghcr.io/rook/ceph
crds:
  enabled: true
# CSI driver settings (tolerations, resources, cephfs-disabled) are NO LONGER
# configured here. Rook v1.20 removed CSI management from the operator Helm
# chart and handed it to the ceph-csi-operator. Those settings now live as CRs
# in ./csi/ (OperatorConfig + Driver). installCsiOperator defaults to true.
# Grants the operator RBAC to create ServiceMonitors/PrometheusRules. Must be
# true because the cluster chart sets cephClusterSpec.monitoring.enabled: true —
# otherwise the operator is forbidden from creating the rook-ceph-mgr /
# rook-ceph-exporter ServiceMonitors and no ceph_* metrics are scraped.
monitoring:
  enabled: true
# krr: rook-ceph-operator/rook-ceph-operator
resources:
  requests:
    memory: 74Mi
    cpu: 78m
  limits: {}
