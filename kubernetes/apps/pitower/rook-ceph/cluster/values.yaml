toolbox:
  enabled: true

monitoring:
  enabled: true
  createPrometheusRules: true

ingress:
  dashboard: {}

route:
  dashboard: {}

cephClusterSpec:
  placement:
    all:
      tolerations:
        - key: node-issue
          operator: Equal
          value: "true"
          effect: NoExecute
        - key: dedicated
          operator: Equal
          value: storage
          effect: NoSchedule
    mon:
      tolerations:
        - key: node-issue
          operator: Equal
          value: "true"
          effect: NoExecute
        - key: dedicated
          operator: Equal
          value: storage
          effect: NoSchedule
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - worker-01

  network:
    provider: host

  mon:
    count: 3
  mgr:
    count: 1

  resources:
    # krr: rook-ceph-mgr-a/mgr
    mgr:
      requests:
        cpu: "125m"
        memory: "512Mi"
      limits:
        memory: "2Gi"
    # krr: rook-ceph-mon-aa/mon
    # Shared by mon-aa/ab/ac. Review memory diffs carefully — ceph mons want
    # steady headroom; an average-based request can crowd them under recovery.
    mon:
      requests:
        cpu: "49m"
        memory: "512Mi"
      limits:
        memory: "1Gi"
    # krr: rook-ceph-osd-0/osd
    # Shared by osd-0/1/2. Review memory diffs carefully — OSDs grow to
    # osd_memory_target (~4Gi); an average request can OOM them during backfill.
    osd:
      requests:
        cpu: "100m"
        memory: "1Gi"
      limits:
        memory: "6Gi"
    mgr-sidecar:
      requests:
        cpu: "49m"
        memory: "128Mi"
      limits:
        memory: "256Mi"
    # krr: rook-ceph-crashcollector-worker-01/ceph-crash
    crashcollector:
      requests:
        cpu: "15m"
        memory: "64Mi"
      limits:
        memory: "64Mi"
    logcollector:
      requests:
        cpu: "25m"
        memory: "100Mi"
      limits:
        memory: "1Gi"
    cleanup:
      requests:
        cpu: "250m"
        memory: "100Mi"
      limits:
        memory: "1Gi"

  crashCollector:
    disable: false

  dashboard:
    enabled: true
    urlPrefix: /
    ssl: false

  storage:
    useAllNodes: false
    useAllDevices: false
    config:
      osdsPerDevice: "1"
    nodes:
      - name: "worker-01"
        devices:
          - name: "/dev/disk/by-id/nvme-AirDisk_512GB_SSD_NFQ0044006866P70GX"
      - name: "worker-02"
        devices:
          - name: "/dev/disk/by-id/nvme-AirDisk_512GB_SSD_NFQ0044007344P70GX"
      - name: "worker-03"
        devices:
          - name: "/dev/disk/by-id/nvme-AirDisk_512GB_SSD_NFQ0044010702P70GX"
    # migration:
    #     confirmation: "yes-really-migrate-osds"
  cleanupPolicy:
    # set to "yes-really-destroy-data" to enable the cleanup job to delete all data when deleting the cluster
    confirmation: ""

cephBlockPoolsVolumeSnapshotClass:
  enabled: true
  name: csi-ceph-blockpool
  deletionPolicy: Delete
  isDefault: false

cephFileSystems: []

cephObjectStores: []
