---
# flickerd generator: polls the flickerd Worker API for site-generation jobs and runs
# each in a throwaway agent-sandbox pod (see sandboxtemplate.yaml / warmpool.yaml).
# Egress only — no Service, no ingress.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flickerd-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flickerd-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flickerd-generator
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: flickerd-generator
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: generator
          image: ghcr.io/swibrow/flickerd:v0.7.0
          env:
            - name: TZ
              value: Europe/Zurich
            # bun's bundled `ws` shim ignores the CA options @kubernetes/client-node
            # passes to the exec WebSocket; trusting the cluster CA globally fixes it.
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4318"
            - name: FLICKERD_API_URL
              value: https://flickerd.com
            - name: FLICKERD_NAMESPACE
              value: flickerd
            - name: FLICKERD_SANDBOX_TEMPLATE
              value: flickerd
            - name: FLICKERD_WARMPOOL
              value: flickerd
            - name: FLICKERD_CONCURRENCY
              value: "4"
            # A full site generation regularly exceeds 5 minutes.
            - name: FLICKERD_GENERATE_TIMEOUT_MS
              value: "900000"
            - name: FLICKERD_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: flickerd-generator
                  key: FLICKERD_INTERNAL_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
