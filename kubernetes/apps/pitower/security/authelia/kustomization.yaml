---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - externalsecret.yaml
components:
  - ../../../../components/volsync

helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: 5.0.0
    releaseName: authelia
    namespace: security
    valuesFile: values.yaml

configMapGenerator:
  - name: authelia-configmap
    files:
      - configuration.yaml=./config/configuration.yaml
  - name: volsync-config
    literals:
      - APP_NAME=authelia
      - CLAIM_NAME=authelia-data
      - SECRET_NAME=authelia-volsync
      - STORAGE_SIZE=100Mi
      - RESTIC_REPO=s3:https://s3.eu-central-2.amazonaws.com/pitower-volsync-backups/security/authelia

generatorOptions:
  disableNameSuffixHash: true
