---
# Scan every namespace in the cluster
targetNamespaces: ""

operator:
  # Generate vulnerability, config-audit, exposed-secret, RBAC and infra reports
  vulnerabilityScannerEnabled: true
  configAuditScannerEnabled: true
  exposedSecretScannerEnabled: true
  rbacAssessmentScannerEnabled: true
  infraAssessmentScannerEnabled: true
  clusterComplianceEnabled: true
  scanJobsConcurrentLimit: 5
  # Re-scan workloads on a rolling basis
  scannerReportTTL: "24h"
  metricsFindingsEnabled: true

trivy:
  # Only surface vulnerabilities that have a fix available — cuts noise
  ignoreUnfixed: true
  # Pull the Trivy DB from the default GHCR mirror
  severity: "MEDIUM,HIGH,CRITICAL"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

nodeCollector:
  # Node-level CIS / kubelet checks (infra assessment)
  enabled: true

# Expose Prometheus metrics; cluster Prometheus scrapes all ServiceMonitors
serviceMonitor:
  enabled: true
