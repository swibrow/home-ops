---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-apps-cluster-admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: oidc:apps@idm.wibrow.dev
  # Temporary safety binding during the kanidm cutover: guarantees access via the
  # email username-claim even if kanidm's id_token omits the groups claim.
  # Remove once group-based access is confirmed working.
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: oidc:sam.wibrow@gmail.com
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
