---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kanidm-tls
  namespace: security
spec:
  secretName: kanidm-tls
  dnsNames:
    - idm.wibrow.dev
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
