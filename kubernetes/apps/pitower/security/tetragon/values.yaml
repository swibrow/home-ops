---
# Render all CRDs (TracingPolicy etc.) into the chart so ArgoCD owns them
# declaratively, rather than letting the operator install them out-of-band.
crds:
  installMethod: helm

# Export events to a stdout sidecar so they land in the cluster log pipeline
# (VictoriaLogs), queryable in Grafana.
export:
  mode: "stdout"

tetragon:
  # hostNetwork agent: default health gRPC port 6789 collides with the Rook
  # ceph-mon v1 port on mon nodes (worker-03/05/06). Move it off 6789.
  healthGrpc:
    port: 6790
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

tetragonOperator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
