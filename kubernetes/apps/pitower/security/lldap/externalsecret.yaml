---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lldap
  namespace: security
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: lldap-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # App
        LLDAP_JWT_SECRET: "{{ .lldap_jwt_secret }}"
        LLDAP_LDAP_USER_PASS: "{{ .lldap_password }}"
        # LLDAP_LDAP_USER_DN: admin # "{{ .lldap_user_dn }}"
        LLDAP_KEY_SEED: "{{ .lldap_server_key_seed }}"
  data:
    - secretKey: lldap_jwt_secret
      remoteRef:
        key: /security/lldap/jwt_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: lldap_password
      remoteRef:
        key: /security/lldap/password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: lldap_server_key_seed
      remoteRef:
        key: /security/lldap/server_key_seed
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
