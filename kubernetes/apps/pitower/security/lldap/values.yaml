defaultPodOptions:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: &app lldap
controllers:
  lldap:
    replicas: 2
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/lldap/lldap
          tag: v0.6.3@sha256:2a8454b668c1aba7157e832eab0e242e1e7eb5fb7591d7e7774ba05286511ca8
        env:
          TZ: Europe/Zurich
          LLDAP_HTTP_PORT: &port 8080
          LLDAP_HTTP_URL: https://lldap.wibrow.dev
          LLDAP_LDAP_PORT: &ldapPort 5389
          LLDAP_LDAP_BASE_DN: dc=wibrow,dc=dev
          LLDAP_KEY_FILE: ""
          # LLDAP_FORCE_LDAP_USER_PASS_RESET: "true" # Uncomment to force password reset
          LLDAP_DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: lldap-db-secret
                key: DB_URL
        envFrom:
          - secretRef:
              name: lldap-secret
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi
service:
  app:
    controller: *app
    ports:
      http:
        port: *port
      ldap:
        port: *ldapPort
route:
  app:
    hostnames:
      - lldap.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 8080

persistence:
  data:
    type: emptyDir
    globalMounts:
      - path: /data
