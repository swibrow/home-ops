---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/clusterexternalsecret_v1.json
# Fans a single ghcr.io dockerconfigjson out to every namespace, so any
# workload can reference imagePullSecrets: [ghcr-pull-secret] without its own
# ExternalSecret. Replaces the per-namespace copies previously duplicated in
# goat, dev/propagit, garrison and flickerd.
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ghcr-pull-secret
spec:
  refreshTime: 10m
  namespaceSelectors:
    - matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
  externalSecretSpec:
    # Static PAT in Infisical (not a short-lived generator token), and this
    # ExternalSecret now runs in every namespace — no need to poll every 1m.
    refreshInterval: 15m
    secretStoreRef:
      kind: ClusterSecretStore
      name: infisical
    target:
      name: ghcr-pull-secret
      creationPolicy: Owner
      template:
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: >-
            {"auths":{"ghcr.io":{"username":"swibrow","password":"{{ .token }}","auth":"{{ printf "swibrow:%s" .token | b64enc }}"}}}
    data:
      - secretKey: token
        remoteRef:
          key: /dev/propagit/ghcr_token
          conversionStrategy: Default
          decodingStrategy: None
          metadataPolicy: None
