---
# GitHub App private key (PEM), reused from the Renovate GitHub App
# (kubernetes/apps/pitower/renovate/renovate-operator/externalsecret.yaml) so
# this workflow doesn't need its own App. That App already has contents:write
# + pull_requests:write on swibrow/home-ops (it opens Renovate PRs there today).
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-model-sync-github-app
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: litellm-model-sync-github-app
    creationPolicy: Owner
  data:
    - secretKey: private-key
      remoteRef:
        key: /renovate/github-app/private_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# appID/installID are not secret (mirrors generator-github.yaml in
# ai/toolhive/toolhive-config) — values read from the live renovate-secret
# (Renovate GitHub App: app_id=3967935, installation_id=138120599).
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: litellm-model-sync-github
spec:
  appID: "3967935"
  installID: "138120599"
  auth:
    privateKey:
      secretRef:
        name: litellm-model-sync-github-app
        key: private-key
---
# Short-lived (60 min) GitHub App installation token, refreshed every 20 min
# so it's always fresh for the daily CronWorkflow run.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-model-sync-github
spec:
  refreshInterval: 20m
  target:
    name: litellm-model-sync-github
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: litellm-model-sync-github
