---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/eventbus_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: EventBus
metadata:
  name: default
  namespace: workflows
spec:
  jetstream:
    version: latest
    replicas: 3
    persistence:
      storageClassName: ceph-block
      accessMode: ReadWriteOnce
      volumeSize: 2Gi
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
