# Home cluster (admin@pitower): everything in the garrison namespace,
# secrets synced from Infisical via the external-secrets ClusterSecretStore.
# Pin images by release version (garrison's CI patches this file when it
# cuts a release): spegel resolves mutable tags like :latest from peer
# caches, serving stale images.
#
# database.enabled flips keep/herald to Postgres + HA (2 replicas each);
# garrison-db-secret is the CNPG-generated app credential (see
# cloudnative-pg/cluster/cluster.yaml + the cnpg-db kustomize component).
# Cut over per garrison's docs/postgres.md runbook.
database:
  enabled: true
  secret: garrison-db-secret
  secretKey: DB_URL
keep:
  image: ghcr.io/swibrow/garrison-keep:v0.15.0
  imagePullPolicy: IfNotPresent
# ghcr packages stay private (the repo is private); ghcr-pull-secret is
# fanned out to every namespace by security/external-secrets/ghcr-pull-secret.
imagePullSecret: ghcr-pull-secret
runner:
  image: ghcr.io/swibrow/garrison-runner:v0.15.0
  namespace: garrison
harness: claude
launcher: sandbox
herald:
  enabled: true
  allowedChatIds: "1053711635,-5540433154"
secrets:
  authEnabled: true
  # wartable is VPN-only (envoy-internal); /internal stays token-gated.
  apiAuthEnabled: false
  externalSecrets:
    enabled: true
    store: infisical
    basePath: /garrison
    githubApp: true
persistence:
  size: 5Gi
networkPolicy:
  enabled: true
  # Narrow exception to the runner sandboxes' private-range egress fence:
  # the toolhive MCP backend proxies in the ai namespace (see mcp.catalog
  # below). The other half is the garrison-runner ingress allowance in
  # ai/toolhive/toolhive-config/networkpolicy.yaml.
  runnerExtraEgress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai
          podSelector:
            matchLabels:
              app.kubernetes.io/name: mcpserver
      ports:
        - protocol: TCP
          port: 8080
httpRoute:
  enabled: true
  hostname: garrison.wibrow.dev
  gateway:
    name: envoy-internal
    namespace: networking
    sectionName: https
  # GitHub can't reach envoy-internal (VPN-only) to deliver App webhooks —
  # route just POST /webhooks/github through envoy-external instead. Update
  # the GitHub App's webhook URL to https://garrison-hooks.wibrow.dev/webhooks/github.
  webhookExternal:
    enabled: true
    hostname: garrison-hooks.wibrow.dev
    gateway:
      name: envoy-external
      namespace: networking
      sectionName: https
# Remote MCP servers raid agents may use, selected per project (wartable
# checkboxes / herald /mcp / PATCH projects API). URLs are the toolhive
# backend proxies in the ai namespace — reachable from runner pods only via
# the runnerExtraEgress exception below plus the garrison-runner ingress in
# ai/toolhive/toolhive-config/networkpolicy.yaml. The github entry ships a
# read-only default tool allowlist (enforced in the runner by a PreToolUse
# deny hook); a project can widen it by overriding `tools` in its selection.
# NOTE: requires chart >= the release carrying mcp support — until the
# version above is bumped past it, these keys are inert.
mcp:
  catalog:
    - name: github
      url: http://mcp-github-proxy.ai.svc.cluster.local:8080/mcp
      description: GitHub repos/issues/PRs/actions (read-only default toolset)
      tools:
        - get_issue
        - get_issue_comments
        - list_issues
        - search_issues
        - get_pull_request
        - get_pull_request_files
        - get_pull_request_comments
        - list_pull_requests
        - search_code
        - get_file_contents
        - list_workflow_runs
        - get_workflow_run
        - get_job_logs
    - name: context7
      url: http://mcp-context7-proxy.ai.svc.cluster.local:8080/mcp
      description: Library documentation lookup (resolve-library-id, get-library-docs)
    - name: grafana
      url: http://mcp-grafana-proxy.ai.svc.cluster.local:8080/sse
      transport: sse
      description: Grafana dashboards, Prometheus/Loki queries
    - name: terraform
      url: http://mcp-terraform-proxy.ai.svc.cluster.local:8080/mcp
      description: Terraform registry providers/modules docs
