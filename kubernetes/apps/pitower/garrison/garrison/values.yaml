# Home cluster (admin@pitower): everything in the garrison namespace,
# secrets synced from Infisical via the external-secrets ClusterSecretStore.
# Pin images by release version (garrison's CI patches this file when it
# cuts a release): spegel resolves mutable tags like :latest from peer
# caches, serving stale images.
#
# database.enabled flips keep/herald to Postgres + HA (2 replicas each);
# garrison-db-secret is the CNPG-generated app credential (see
# cloudnative-pg/cluster/cluster.yaml + the cnpg-db kustomize component).
# Cut over per garrison's docs/postgres.md runbook.
database:
  enabled: true
  secret: garrison-db-secret
  secretKey: DB_URL
keep:
  image: ghcr.io/swibrow/garrison-keep:v0.14.1
  imagePullPolicy: IfNotPresent
# ghcr packages stay private (the repo is private); ghcr-pull-secret is
# fanned out to every namespace by security/external-secrets/ghcr-pull-secret.
imagePullSecret: ghcr-pull-secret
runner:
  image: ghcr.io/swibrow/garrison-runner:v0.14.1
  namespace: garrison
harness: claude
launcher: sandbox
herald:
  enabled: true
  allowedChatIds: "1053711635,-5540433154"
secrets:
  authEnabled: true
  # wartable is VPN-only (envoy-internal); /internal stays token-gated.
  apiAuthEnabled: false
  externalSecrets:
    enabled: true
    store: infisical
    basePath: /garrison
    githubApp: true
persistence:
  size: 5Gi
networkPolicy:
  enabled: true
httpRoute:
  enabled: true
  hostname: garrison.wibrow.dev
  gateway:
    name: envoy-internal
    namespace: networking
    sectionName: https
  # GitHub can't reach envoy-internal (VPN-only) to deliver App webhooks —
  # route just POST /webhooks/github through envoy-external instead. Update
  # the GitHub App's webhook URL to https://garrison-hooks.wibrow.dev/webhooks/github.
  webhookExternal:
    enabled: true
    hostname: garrison-hooks.wibrow.dev
    gateway:
      name: envoy-external
      namespace: networking
      sectionName: https
