---
# garrison-keep has no generic env-passthrough field in its chart's values,
# but it does an unconditional envFrom on garrison-keep-env (optional: true,
# currently unused since secrets.externalSecrets.keepEnv is false) — so a
# standalone ExternalSecret targeting that name reaches the keep container
# without any chart change. keep has no egress restrictions, so it talks to
# the collector directly — no auth needed.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garrison-keep-otel
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: garrison-keep-env
    creationPolicy: Owner
  data:
    - secretKey: OTEL_EXPORTER_OTLP_ENDPOINT
      remoteRef:
        key: /garrison/keep/OTEL_EXPORTER_OTLP_ENDPOINT
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# Runner ("sortie") pods run in the garrison namespace (runner.namespace is
# overridden from the chart default garrison-runs — see values.yaml) and are
# network-fenced to internet-only (runs-networkpolicy.yaml blocks private
# ranges so a prompt-injected agent can't reach the cluster). A narrow egress
# exception for otel-collector:4318 (networkpolicy-otel.yaml, mirrors
# flickerd's sandboxtemplate.yaml) lets them reach the in-cluster collector
# directly, so no external route/API key needed here. garrison-runner-env
# already exists (owned by the chart's own ExternalSecret, carrying
# CLAUDE_CODE_OAUTH_TOKEN) and is mounted via envFrom into every runner pod
# (packages/keep/src/launcher/{sandbox,warm-pool}.ts) — Merge adds this key
# without taking ownership from the chart's copy.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garrison-runner-otel
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: garrison-runner-env
    creationPolicy: Merge
  data:
    - secretKey: OTEL_EXPORTER_OTLP_ENDPOINT
      remoteRef:
        key: /garrison/runner/OTEL_EXPORTER_OTLP_ENDPOINT
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
