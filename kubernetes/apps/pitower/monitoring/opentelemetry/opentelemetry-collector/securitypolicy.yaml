---
# API-key auth for the external OTLP ingest route (httproute.yaml). Clients send
# the key in the X-API-Key header; EG matches it against the
# otel-collector-apikeys Secret (key = client id, value = the API key, no
# Bearer prefix), populated from Infisical via externalsecret.yaml.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: otel-collector
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: otel-collector
  apiKeyAuth:
    credentialRefs:
      - group: ""
        kind: Secret
        name: otel-collector-apikeys
    extractFrom:
      - headers:
          - X-API-Key
