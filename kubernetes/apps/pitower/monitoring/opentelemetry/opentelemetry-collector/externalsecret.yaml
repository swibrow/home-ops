---
# API key(s) for the external OTLP ingest route's apiKeyAuth (securitypolicy.yaml).
# Add more secretKey/remoteRef pairs (each its own Infisical path) to issue
# additional keys for other clients.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: otel-collector-apikeys
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: otel-collector-apikeys
    creationPolicy: Owner
  data:
    - secretKey: default
      remoteRef:
        key: /monitoring/opentelemetry-collector/OTLP_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
