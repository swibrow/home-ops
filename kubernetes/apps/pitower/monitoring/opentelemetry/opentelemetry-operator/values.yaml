---
admissionWebhooks:
  certManager:
    enabled: true

manager:
  collectorImage:
    # The k8s distro lacks the "prometheus" exporter our pipeline uses; contrib has it.
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
    tag: "0.157.0"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
