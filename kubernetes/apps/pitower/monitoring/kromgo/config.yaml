---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kashalls/kromgo/main/config.schema.json
badge:
  font: Verdana.ttf
  size: 12

metrics:
  - name: cluster_cpu
    query: "round(cluster:node_cpu:ratio_rate5m * 100, 0.1)"
    suffix: "%"
    colors:
      - { color: "green",  min: 0,  max: 35  }
      - { color: "orange", min: 36, max: 75  }
      - { color: "red",    min: 76, max: 1000 }

  - name: cluster_memory
    query: 'round((1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100, 0.1)'
    suffix: "%"
    colors:
      - { color: "green",  min: 0,  max: 60  }
      - { color: "orange", min: 61, max: 85  }
      - { color: "red",    min: 86, max: 1000 }

  - name: cluster_nodes
    query: 'count(kube_node_info)'

  - name: cluster_pods_running
    query: 'count(kube_pod_status_phase{phase="Running"} == 1)'

  - name: kubernetes_version
    query: 'kubernetes_build_info{service="kubernetes"}'
    label: git_version

  - name: ceph_health
    query: 'ceph_health_status{}'
    colors:
      - { valueOverride: "Healthy",  color: "green",  min: 0, max: 0 }
      - { valueOverride: "Warning",  color: "orange", min: 1, max: 1 }
      - { valueOverride: "Critical", color: "red",    min: 2, max: 2 }

  - name: node_uptime
    query: "avg(time() - node_boot_time_seconds)"
    valueTemplate: "uptime"

templates:
  uptime: "{{ . | humanDuration }}"
