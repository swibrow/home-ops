---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: monitoring
data:
  config.yaml: |
    storage:
      type: postgres
      path: "postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable"

    ui:
      title: Pitower Status
      header: Pitower Status

    # Per-HTTPRoute endpoints are auto-generated by the gatus-sidecar container
    # and written to /config/gatus-sidecar.yaml, which Gatus merges from the
    # GATUS_CONFIG_PATH directory. Override a single route's check by annotating
    # its HTTPRoute with gatus.home-operations.com/endpoint (YAML fragment) or
    # opt one out with gatus.home-operations.com/enabled: "false".

    # Hand-written endpoints below for things the sidecar can't auto-discover.
    endpoints:
      # Canary for the external path (Cloudflare tunnel -> envoy-external ->
      # fallback-404 directResponse filter). Hits a subdomain with no route, so
      # the wildcard *.wibrow.dev catch-all answers; a 404 with our page proves
      # the whole ingress chain is alive. The wildcard route itself can't be
      # auto-probed (host is *.wibrow.dev), so it's checked here explicitly.
      - name: External Gateway Fallback
        group: Infrastructure
        url: https://gatus-canary.wibrow.dev
        interval: 5m
        conditions:
          - "[STATUS] == 404"
          - "[BODY] == pat(*pitower*)"
