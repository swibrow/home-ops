defaultPodOptions:
  automountServiceAccountToken: true

# ClusterRole + binding so the sidecar can watch HTTPRoutes/Gateways cluster-wide.
rbac:
  roles:
    gatus-sidecar:
      type: ClusterRole
      rules:
        - apiGroups: ["gateway.networking.k8s.io"]
          resources: ["httproutes", "gateways"]
          verbs: ["get", "list", "watch"]
  bindings:
    gatus-sidecar:
      type: ClusterRoleBinding
      roleRef:
        identifier: gatus-sidecar
        kind: ClusterRole
      subjects:
        - kind: ServiceAccount
          name: gatus
          namespace: monitoring

controllers:
  gatus:
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"

    initContainers:
      # Native sidecar (restartPolicy: Always) so it starts and writes
      # /config/gatus-sidecar.yaml BEFORE the gatus app container reads /config.
      # Gatus only reloads when a config file's mod-time is newer than its load
      # time, so if it walks /config before this writes, it never picks the file
      # up (the sidecar only rewrites on HTTPRoute changes). Ordering it ahead of
      # the app avoids that race. Name sorts before the gate below.
      a-gatus-sidecar:
        image:
          repository: ghcr.io/home-operations/gatus-sidecar
          tag: 0.3.2
        restartPolicy: Always
        env:
          TZ: Europe/Zurich
        args:
          - --auto-httproute
          - --default-interval=5m
          - --output=/config/gatus-sidecar.yaml
          # Probe the bare hostname, not the first non-root PathPrefix match
          # (multi-rule routes like /api, /badges would otherwise 404). Per-route
          # path overrides via the endpoint annotation still apply.
          - --probe-paths=false
        resources:
          requests:
            cpu: 10m
            memory: 32M
          limits:
            memory: 64M
      # Block the gatus app until the sidecar has produced its first config, so
      # the initial directory walk includes every discovered endpoint.
      b-wait-for-endpoints:
        image:
          repository: public.ecr.aws/docker/library/busybox
          tag: latest
        command:
          - sh
          - -c
          - |
            until [ -s /config/gatus-sidecar.yaml ]; do
              echo "waiting for /config/gatus-sidecar.yaml"; sleep 1;
            done
            echo "endpoints config present"

    containers:
      app:
        image:
          repository: ghcr.io/twin/gatus
          tag: v5.36.0
        env:
          TZ: Europe/Zurich
          GATUS_CONFIG_PATH: /config
          DB_HOST:
            valueFrom:
              secretKeyRef:
                name: gatus-db-secret
                key: DB_HOST
          DB_PORT:
            valueFrom:
              secretKeyRef:
                name: gatus-db-secret
                key: DB_PORT
          DB_USER:
            valueFrom:
              secretKeyRef:
                name: gatus-db-secret
                key: DB_USER
          DB_PASS:
            valueFrom:
              secretKeyRef:
                name: gatus-db-secret
                key: DB_PASS
          DB_NAME:
            valueFrom:
              secretKeyRef:
                name: gatus-db-secret
                key: DB_NAME
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 64M
          limits:
            memory: 256M

service:
  app:
    controller: gatus
    ports:
      http:
        port: 8080

route:
  app:
    enabled: true
    hostnames:
      - status.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https

persistence:
  # Writable dir shared by gatus (reads) and the sidecar (writes gatus-sidecar.yaml).
  config:
    type: emptyDir
    globalMounts:
      - path: /config
  # Static base config layered in as a single read-only file.
  config-file:
    enabled: true
    type: configMap
    name: gatus-config
    globalMounts:
      - path: /config/config.yaml
        subPath: config.yaml
        readOnly: true
