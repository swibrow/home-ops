controllers:
  ntfy-alertmanager:
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"

    containers:
      app:
        image:
          repository: docker.io/xenrox/ntfy-alertmanager
          tag: latest
        args:
          - -config
          - /etc/ntfy-alertmanager/config
        env:
          TZ: Europe/Zurich
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            memory: 64Mi

service:
  app:
    controller: ntfy-alertmanager
    ports:
      http:
        port: 8080

persistence:
  config:
    enabled: true
    type: secret
    name: ntfy-alertmanager-secret
    globalMounts:
      - path: /etc/ntfy-alertmanager/config
        subPath: config
        readOnly: true
