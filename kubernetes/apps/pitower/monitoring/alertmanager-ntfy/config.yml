ntfy:
  url: http://ntfy.monitoring.svc.cluster.local
  topic: pitower-alerts
  user: bridge

http:
  host: 0.0.0.0
  port: 8080

notification:
  templates:
    title: |
      [{{ .Status | ToUpper }}] {{ .Labels.alertname }}
      {{- if .Labels.severity }} ({{ .Labels.severity }}){{ end }}
    description: |
      {{- if .Annotations.description }}{{ .Annotations.description }}
      {{ else if .Annotations.summary }}{{ .Annotations.summary }}
      {{ else }}{{ .Labels.alertname }}
      {{ end -}}
      {{- if .Labels.instance }}Instance: {{ .Labels.instance }}
      {{ end -}}
      {{- if .Labels.namespace }}Namespace: {{ .Labels.namespace }}
      {{ end -}}
    tags:
      - '{{ .Labels.severity }}'
    priority: |
      {{- if eq .Labels.severity "critical" -}} 5
      {{- else if eq .Labels.severity "warning" -}} 4
      {{- else if eq .Labels.severity "info" -}} 2
      {{- else -}} 3
      {{- end -}}
