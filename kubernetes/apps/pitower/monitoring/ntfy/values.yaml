controllers:
  ntfy:
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"

    containers:
      app:
        image:
          repository: binwiederhier/ntfy
          tag: v2.22.0
        args:
          - serve
          - --config
          - /etc/ntfy/server.yml
        env:
          TZ: Europe/Zurich
          NTFY_AUTH_FILE: /var/lib/ntfy/user.db
          NTFY_AUTH_DEFAULT_ACCESS: deny-all
          BRIDGE_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: ntfy-secret
                key: BRIDGE_PASSWORD
        lifecycle:
          postStart:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  for _ in $(seq 1 30); do
                    [ -f /var/lib/ntfy/user.db ] && break
                    sleep 1
                  done
                  export NTFY_PASSWORD="$BRIDGE_PASSWORD"
                  ntfy user add --role=user bridge 2>/dev/null \
                    || ntfy user change-pass bridge
                  ntfy access bridge pitower-alerts write-only
                  ntfy access everyone pitower-alerts read-only
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /v1/health
                port: 80
              initialDelaySeconds: 10
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /v1/health
                port: 80
              initialDelaySeconds: 5
              periodSeconds: 10
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

service:
  app:
    controller: ntfy
    ports:
      http:
        port: 80

route:
  app:
    enabled: true
    hostnames:
      - ntfy.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https

persistence:
  config:
    enabled: true
    type: configMap
    name: ntfy-config
    globalMounts:
      - path: /etc/ntfy/server.yml
        subPath: server.yml
        readOnly: true
  data:
    type: emptyDir
    globalMounts:
      - path: /var/lib/ntfy
