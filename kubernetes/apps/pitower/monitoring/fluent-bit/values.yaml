tolerations:
  - key: dedicated
    operator: Equal
    value: storage
    effect: NoSchedule

## https://docs.fluentbit.io/manual/administration/configuring-fluent-bit/classic-mode/configuration-file
config:
  service: |
    [SERVICE]
      Daemon Off
      Flush {{ .Values.flush }}
      Log_Level {{ .Values.logLevel }}
      Parsers_File /fluent-bit/etc/parsers.conf
      Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
      HTTP_Server On
      HTTP_Listen 0.0.0.0
      HTTP_Port {{ .Values.metricsPort }}
      Health_Check On

  ## https://docs.fluentbit.io/manual/pipeline/inputs
  inputs: |
    [INPUT]
      name tail
      alias kubernetes
      path /var/log/containers/*.log
      parser containerd
      tag kubernetes.*

  ## https://docs.fluentbit.io/manual/pipeline/filters
  filters: |
    [FILTER]
      name kubernetes
      alias kubernetes
      match kubernetes.*
      buffer_size 0
      merge_log on

      kube_tag_prefix kubernetes.var.log.containers.
      k8s-logging.parser on
      k8s-logging.exclude on
      namespace_labels off
      annotations off

    [FILTER]
      name modify
      match kubernetes.*
      add source kubernetes
      remove logtag

    [FILTER]
      name nest
      match *
      wildcard pod_name
      operation lift
      nested_under kubernetes
      add_prefix kubernetes_

  ## https://docs.fluentbit.io/manual/pipeline/outputs
  outputs: |
    [OUTPUT]
      Name              http
      Match             kubernetes.*
      Host              victoria-logs.monitoring.svc.cluster.local
      Port              9428
      URI               /insert/jsonline?_stream_fields=kubernetes_namespace_name,kubernetes_pod_name,kubernetes_container_name&_time_field=@timestamp&_msg_field=log
      Format            json_lines
      Compress          gzip
      json_date_key     @timestamp
      json_date_format  iso8601
