---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pve-exporter
spec:
  groups:
    - name: pve-exporter.rules
      rules:
        - alert: PveExporterAbsent
          annotations:
            summary: Proxmox exporter has disappeared from Prometheus target discovery.
          expr: |
            absent(up{job="pve-exporter"})
          for: 15m
          labels:
            severity: critical
        - alert: PveExporterScrapeFailing
          annotations:
            summary: Proxmox exporter cannot scrape the Proxmox API on {{ $labels.instance }}.
          expr: |
            up{job="pve-exporter"} == 0
          for: 15m
          labels:
            severity: warning
        - alert: PveNodeDown
          annotations:
            summary: Proxmox node {{ $labels.id }} is down.
          expr: |
            pve_up{id=~"node/.+"} == 0
          for: 5m
          labels:
            severity: critical
