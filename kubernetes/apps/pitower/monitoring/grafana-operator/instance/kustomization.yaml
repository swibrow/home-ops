---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
# Wave 1: Grafana instance + datasources + dashboards, after the operator + CRDs
# (grafana-operator, wave 0).
commonAnnotations:
  argocd.argoproj.io/sync-wave: "1"
resources:
  - externalsecret.yaml
  - grafana.yaml
  - datasources.yaml
  - dashboards.yaml
  - httproute.yaml
  - image-renderer.yaml
  - servicemonitor.yaml
# Local dashboard JSON referenced by the GrafanaDashboard CRs (configMapRef).
# No grafana_dashboard label — these are consumed by the operator, not the old
# Grafana's configmap sidecar.
configMapGenerator:
  - name: grafana-dashboards-home-assistant
    files:
      - dashboards/home-assistant-overview.json
      - dashboards/home-assistant-sensors.json
    options:
      disableNameSuffixHash: true
  - name: grafana-dashboards-infrastructure
    files:
      - dashboards/worker-01-fabric-watch.json
      - dashboards/spegel.json
      - dashboards/proxmox.json
      - dashboards/towonel.json
    options:
      disableNameSuffixHash: true
  - name: grafana-dashboards-networking
    files:
      - dashboards/external-dns.json
      - dashboards/cilium-operator.json
      - dashboards/envoy-gateway-global.json
      - dashboards/envoy-proxy-global.json
      - dashboards/envoy-clusters.json
      - dashboards/envoy-access-logs.json
    options:
      disableNameSuffixHash: true
  - name: grafana-dashboards-observability
    files:
      - dashboards/tempo.json
    options:
      disableNameSuffixHash: true
