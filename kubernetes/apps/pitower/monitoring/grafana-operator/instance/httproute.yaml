---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    # Unauthenticated / redirects to /login (302), so probe Grafana's own
    # health endpoint instead — 200 + database:ok means it's actually serving.
    gatus.home-operations.com/endpoint: |
      path: /api/health
      conditions:
        - "[STATUS] == 200"
        - "[BODY].database == ok"
spec:
  hostnames:
    - grafana.wibrow.dev
  parentRefs:
    - name: envoy-external
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - name: grafana-service
          port: 3000
