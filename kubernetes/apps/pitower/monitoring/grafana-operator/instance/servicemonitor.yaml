---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana
  namespace: monitoring
spec:
  jobLabel: grafana
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      dashboards: grafana
  endpoints:
    - port: grafana
      path: /metrics
      honorLabels: true
