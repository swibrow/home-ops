---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: alertmanager-config
    template:
      data:
        # Full Alertmanager config rendered here because prometheus-operator's
        # config parser rejects discord webhook_url_file (operator <= v0.92 has
        # no such field), so the webhook URL must be injected inline.
        alertmanager.yaml: |
          route:
            receiver: discord
            group_by: ["alertname", "namespace", "severity"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - receiver: "null"
                matchers:
                  - alertname = "Watchdog"
              - receiver: "null"
                matchers:
                  - alertname = "InfoInhibitor"
              - receiver: ntfy
                matchers:
                  - notify = "ntfy"
                continue: true
          receivers:
            - name: "null"
            - name: discord
              discord_configs:
                - webhook_url: "{{ .discord_webhook_url }}"
                  send_resolved: true
            - name: ntfy
              webhook_configs:
                - url: http://ntfy-alertmanager.monitoring.svc.cluster.local:8080/
                  send_resolved: true
          inhibit_rules:
            - source_matchers:
                - severity = "critical"
              target_matchers:
                - severity =~ "warning|info"
              equal: ["alertname", "namespace"]
            - source_matchers:
                - severity = "warning"
              target_matchers:
                - severity = "info"
              equal: ["alertname", "namespace"]
  data:
    - secretKey: discord_webhook_url
      remoteRef:
        key: /monitoring/alertmanager/DISCORD_WEBHOOK_URL
