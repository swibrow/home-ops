crds:
  enabled: true
cleanPrometheusOperatorObjectNames: true
prometheusOperator:
  logFormat: json
alertmanager:
  enabled: true
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.wibrow.dev
      parentRefs:
        - name: envoy-internal
          namespace: networking
          sectionName: https
  alertmanagerSpec:
    # Public URL so Alertmanager's own links (silences, etc.) use the external host.
    externalUrl: https://alertmanager.wibrow.dev
  config:
    route:
      receiver: "null"
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: "null"
          matchers:
            - alertname = "InfoInhibitor"
        - receiver: ntfy
          matchers:
            - notify = "ntfy"
          continue: true
    receivers:
      - name: "null"
      - name: ntfy
        webhook_configs:
          - url: http://ntfy-alertmanager.monitoring.svc.cluster.local:8080/
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity =~ "warning|info"
        equal: ["alertname", "namespace"]
      - source_matchers:
          - severity = "warning"
        target_matchers:
          - severity = "info"
        equal: ["alertname", "namespace"]
kube-state-metrics:
  metricLabelsAllowlist:
    - "deployments=[*]"
    - "persistentvolumeclaims=[*]"
    - "pods=[*]"
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          regex: ^(.*)$
          replacement: $1
          targetLabel: kubernetes_node
kubelet:
  enabled: true
  serviceMonitor:
    # Stamp the cluster label so the KubeletDown rule's join matches:
    #   count by (cluster) (kube_node_info)
    #   unless on (cluster) count by (cluster) (up{job="kubelet"} == 1)
    # kube_node_info carries cluster="pitower" (from a metric relabeling) but the
    # synthetic `up` series does not. `up` is appended after metric_relabel_configs
    # run, so it can only gain the label via target relabeling (relabelings),
    # not metricRelabelings. Without it the join never cancels and KubeletDown
    # fires permanently even though every kubelet is up.
    #
    # Keep the chart-default metrics_path relabel too: the KubeletDown rule
    # selects up{job="kubelet",metrics_path="/metrics"}, so the main /metrics
    # endpoint must carry that label. Overriding `relabelings` with only the
    # cluster stamp drops the default and makes the selector match nothing,
    # which also makes KubeletDown fire permanently.
    relabelings:
      - action: replace
        sourceLabels: ["__metrics_path__"]
        targetLabel: metrics_path
      - action: replace
        targetLabel: cluster
        replacement: pitower
    metricRelabelings:
      # Remove duplicate labels provided by k3s
      - action: keep
        sourceLabels: ["__name__"]
        regex: (apiserver_audit|apiserver_client|apiserver_delegated|apiserver_envelope|apiserver_storage|apiserver_webhooks|authentication_token|cadvisor_version|container_blkio|container_cpu|container_fs|container_last|container_memory|container_network|container_oom|container_processes|container|csi_operations|disabled_metric|get_token|go|hidden_metric|kubelet_certificate|kubelet_cgroup|kubelet_container|kubelet_containers|kubelet_cpu|kubelet_device|kubelet_graceful|kubelet_http|kubelet_lifecycle|kubelet_managed|kubelet_node|kubelet_pleg|kubelet_pod|kubelet_run|kubelet_running|kubelet_runtime|kubelet_server|kubelet_started|kubelet_volume|kubernetes_build|kubernetes_feature|machine_cpu|machine_memory|machine_nvm|machine_scrape|node_namespace|plugin_manager|prober_probe|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|registered_metric|rest_client|scrape_duration|scrape_samples|scrape_series|storage_operation|volume_manager|volume_operation|workqueue)_(.+)
      - action: replace
        sourceLabels: ["node"]
        targetLabel: instance
      # Drop high cardinality labels
      - action: labeldrop
        regex: (uid)
      - action: labeldrop
        regex: (id|name)
      - action: drop
        sourceLabels: ["__name__"]
        regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
      # Drop rarely-queried high-cardinality histogram buckets
      - action: drop
        sourceLabels: ["__name__"]
        regex: (workqueue_queue_duration_seconds|workqueue_work_duration_seconds|kubelet_runtime_operations_duration_seconds|kubelet_http_requests_duration_seconds|kubelet_pleg_relist_duration_seconds)_bucket
kubeApiServer:
  enabled: true
  serviceMonitor:
    metricRelabelings:
      # Remove duplicate labels provided by k3s
      - action: keep
        sourceLabels: ["__name__"]
        regex: (aggregator_openapi|aggregator_unavailable|apiextensions_openapi|apiserver_admission|apiserver_audit|apiserver_cache|apiserver_cel|apiserver_client|apiserver_crd|apiserver_current|apiserver_envelope|apiserver_flowcontrol|apiserver_init|apiserver_kube|apiserver_longrunning|apiserver_request|apiserver_requested|apiserver_response|apiserver_selfrequest|apiserver_storage|apiserver_terminated|apiserver_tls|apiserver_watch|apiserver_webhooks|authenticated_user|authentication|disabled_metric|etcd_bookmark|etcd_lease|etcd_request|field_validation|get_token|go|grpc_client|hidden_metric|kube_apiserver|kubernetes_build|kubernetes_feature|node_authorizer|pod_security|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|registered_metric|rest_client|scrape_duration|scrape_samples|scrape_series|serviceaccount_legacy|serviceaccount_stale|serviceaccount_valid|watch_cache|workqueue)_(.+)
      # Drop high cardinality labels
      - action: drop
        sourceLabels: ["__name__"]
        regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
      - action: drop
        sourceLabels: ["__name__"]
        regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)
kubeControllerManager:
  enabled: true
  # No `endpoints:` -> the chart adds a `component: kube-controller-manager`
  # selector to its headless Service, so K8s discovers the Talos control-plane
  # static pods dynamically (no hardcoded CP IPs).
  service:
    # Pin single-stack: a selectorless headless Service defaults to
    # RequireDualStack, which breaks apply on this IPv4-only cluster once a
    # selector is present. ipDualStack is the only knob that emits ipFamilies.
    ipDualStack:
      enabled: true
      ipFamilies: ["IPv4"]
      ipFamilyPolicy: SingleStack
  serviceMonitor:
    metricRelabelings:
      # Remove duplicate labels provided by k3s
      - action: keep
        sourceLabels: ["__name__"]
        regex: "(apiserver_audit|apiserver_client|apiserver_delegated|apiserver_envelope|apiserver_storage|apiserver_webhooks|attachdetach_controller|authenticated_user|authentication|cronjob_controller|disabled_metric|endpoint_slice|ephemeral_volume|garbagecollector_controller|get_token|go|hidden_metric|job_controller|kubernetes_build|kubernetes_feature|leader_election|node_collector|node_ipam|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|pv_collector|registered_metric|replicaset_controller|rest_client|retroactive_storageclass|root_ca|running_managed|scrape_duration|scrape_samples|scrape_series|service_controller|storage_count|storage_operation|ttl_after|volume_operation|workqueue)_(.+)"
      - action: drop
        sourceLabels: ["__name__"]
        regex: (workqueue_queue_duration_seconds|workqueue_work_duration_seconds)_bucket
kubeEtcd:
  # enabled keeps the etcd Grafana dashboard shipping. Scraping is NOT done via
  # the chart's kubeEtcd.endpoints: Talos etcd needs a manual (selector-less)
  # Endpoints object, and ArgoCD's resource.exclusions drops Endpoints/
  # EndpointSlice, so that object never applies. Instead we scrape etcd's
  # :2381 listener (controlplane.patch cluster.etcd.extraArgs.listen-metrics-urls)
  # via prometheusSpec.additionalScrapeConfigs (job: kube-etcd) below. service is
  # disabled to avoid a dangling selector-less Service with no targets.
  enabled: true
  service:
    enabled: false
kubeScheduler:
  enabled: true
  # No `endpoints:` -> chart adds a `component: kube-scheduler` selector for
  # dynamic discovery of the Talos control-plane static pods.
  service:
    ipDualStack:
      enabled: true
      ipFamilies: ["IPv4"]
      ipFamilyPolicy: SingleStack
  serviceMonitor:
    metricRelabelings:
      # Remove duplicate labels provided by k3s
      - action: keep
        sourceLabels: ["__name__"]
        regex: "(apiserver_audit|apiserver_client|apiserver_delegated|apiserver_envelope|apiserver_storage|apiserver_webhooks|authenticated_user|authentication|disabled_metric|go|hidden_metric|kubernetes_build|kubernetes_feature|leader_election|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|registered_metric|rest_client|scheduler|scrape_duration|scrape_samples|scrape_series|workqueue)_(.+)"
      - action: drop
        sourceLabels: ["__name__"]
        regex: (workqueue_queue_duration_seconds|workqueue_work_duration_seconds|scheduler_scheduling_duration_seconds|scheduler_plugin_execution_duration_seconds)_bucket
kubeProxy:
  enabled: false # Disabled due to eBPF
prometheus:
  ingress:
    enabled: false
  route:
    main:
      enabled: true
      hostnames:
        - prometheus.wibrow.dev
      parentRefs:
        - name: envoy-internal
          namespace: networking
          sectionName: https
  prometheusSpec:
    nodeSelector:
      wibrow.dev/compute: "true"
    # Public URL so alert generatorURL (Alertmanager "Source" links) points at
    # the external host instead of the internal service address.
    externalUrl: https://prometheus.wibrow.dev
    externalLabels:
      cluster: pitower
    # Talos etcd metrics (:2381, plain http). Static targets instead of a
    # ServiceMonitor because Talos etcd is a host service with no pod/Endpoints
    # ArgoCD will apply (Endpoints/EndpointSlice are in argocd-cm
    # resource.exclusions). additionalScrapeConfigs bypass the default scrapeClass
    # relabeling, so cluster=pitower is set here explicitly (the etcd dashboard
    # filters on cluster="$cluster").
    additionalScrapeConfigs:
      - job_name: kube-etcd
        scheme: http
        static_configs:
          - targets:
              - 10.20.10.1:2381
              - 10.20.10.2:2381
              - 10.20.10.3:2381
            labels:
              cluster: pitower
    additionalAlertRelabelConfigs:
      - source_labels: [alertname]
        regex: KubeNodeNotReady|KubeNodeUnreachable|KubeletDown
        target_label: notify
        replacement: ntfy
    additionalArgs:
      - name: storage.tsdb.head-chunks-write-queue-size
        value: "10000"
    containers:
      - name: prometheus
        env:
          - name: GOMEMLIMIT
            value: "3GiB"
    remoteWrite:
      - url: http://victoria-metrics-server.monitoring.svc.cluster.local:8428/api/v1/write
        writeRelabelConfigs:
          - action: labeldrop
            regex: prometheus_replica
        queueConfig:
          maxSamplesPerSend: 10000
          capacity: 20000
          maxShards: 30
    scrapeClasses:
      - name: default
        default: true
        # Stamp cluster=pitower as a TARGET label (relabelings), so the synthetic
        # `up` series carries it too — metricRelabelings run after `up` is appended
        # and can't label it. Many dashboards (dotdc k8s-*) drive a hidden `cluster`
        # variable off label_values(up{job="..."}, cluster); without cluster on `up`
        # it resolves empty and every cluster="$cluster" panel shows no data.
        #
        # Conditional (regex: ^$): only set pitower when cluster is still empty, so
        # scrapes that set their own cluster keep it (rook-ceph-exporter/mgr →
        # cluster=rook-ceph) regardless of relabel ordering. Supersedes the per-SM
        # kubelet workaround above.
        relabelings:
          - sourceLabels: [cluster]
            regex: ^$
            targetLabel: cluster
            replacement: pitower
        metricRelabelings:
          - targetLabel: cluster
            replacement: pitower
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    enableAdminAPI: true
    walCompression: true
    retentionSize: 50GB
    startupProbe:
      failureThreshold: 120
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          resources:
            requests:
              storage: 50Gi
prometheus-node-exporter:
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - key: node-issue
      operator: Equal
      value: "true"
      effect: NoExecute
grafana:
  enabled: false
  forceDeployDashboards: true
  sidecar:
    dashboards:
      multicluster:
        etcd:
          enabled: true
