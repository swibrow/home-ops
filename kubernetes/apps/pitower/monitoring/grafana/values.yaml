annotations:
  reloader.stakater.com/auto: "true"
deploymentStrategy:
  type: Recreate
admin:
  existingSecret: grafana-admin-secret
env:
  GF_EXPLORE_ENABLED: true
  GF_SERVER_ROOT_URL: "https://grafana.pitower.link"
envFromSecret: grafana-secrets
grafana.ini:
  analytics:
    check_for_updates: false
    check_for_plugin_updates: false
    reporting_enabled: false
  auth:
    signout_redirect_url: "https://auth.pitower.link/logout"
    oauth_auto_login: true
    oauth_allow_insecure_email_lookup: true
  auth.generic_oauth:
    enabled: true
    name: Authelia
    icon: signin
    scopes: openid profile email groups
    client_id: grafana
    empty_scopes: false
    auth_url: https://auth.pitower.link/api/oidc/authorization
    token_url: https://auth.pitower.link/api/oidc/token
    api_url: https://auth.pitower.link/api/oidc/userinfo
    login_attribute_path: preferred_username
    groups_attribute_path: groups
    name_attribute_path: name
    use_pkce: true
  auth.generic_oauth.group_mapping:
    org_id: 1
    role_attribute_path: |
      contains(groups[*], 'admins') && 'Admin' || contains(groups[*], 'people') && 'Viewer'
  news:
    news_feed_enabled: false
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes
datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - { name: Prometheus, orgId: 1 }
      - { name: Loki, orgId: 1 }
      - { name: VictoriaLogs, orgId: 1 }
      - { name: VictoriaMetrics, orgId: 1 }
      - { name: HomeAssistant, orgId: 1 }
      - { name: Alertmanager, orgId: 1 }
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        jsonData:
          prometheusType: Prometheus
        isDefault: true
      - name: VictoriaMetrics
        type: prometheus
        uid: victoriametrics
        access: proxy
        url: http://victoria-metrics-server.monitoring.svc.cluster.local:8428
        jsonData:
          prometheusType: Prometheus
      - name: HomeAssistant
        type: influxdb
        uid: homeassistant
        access: proxy
        url: http://victoria-metrics-server.monitoring.svc.cluster.local:8428
        database: homeassistant
        jsonData:
          dbName: homeassistant
          httpMode: GET
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victoria-logs-victoria-logs-single-server.monitoring.svc.cluster.local:9428
      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.monitoring.svc.cluster.local:9093
        jsonData:
          implementation: prometheus
dashboards:
  default:
    authelia:
      url: https://raw.githubusercontent.com/authelia/authelia/master/examples/grafana-dashboards/simple.json
      datasource: Prometheus
    cloudflared:
      gnetId: 17457 # https://grafana.com/grafana/dashboards/17457?tab=revisions
      revision: 6
      datasource:
        - { name: DS_PROMETHEUS, value: Prometheus }
    external-dns:
      gnetId: 15038 # https://grafana.com/grafana/dashboards/15038?tab=revisions
      revision: 3
      datasource: Prometheus
    external-secrets:
      url: https://raw.githubusercontent.com/external-secrets/external-secrets/main/docs/snippets/dashboard.json
      datasource: Prometheus
    cert-manager:
      gnetId: 20842 # https://grafana.com/grafana/dashboards/20842
      revision: 3
      datasource: Prometheus
    home-assistant-state-changes:
      gnetId: 12705 # https://grafana.com/grafana/dashboards/12705?tab=revisions
      revision: 3
      datasource:
        - { name: DS_HA_INFLUXDB, value: HomeAssistant }
    node-exporter-full:
      gnetId: 1860 # https://grafana.com/grafana/dashboards/1860?tab=revisions
      revision: 37
      datasource: Prometheus
  kubernetes:
    kubernetes-api-server:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json
      datasource: Prometheus
    kubernetes-coredns:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-coredns.json
      datasource: Prometheus
    kubernetes-global:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json
      datasource: Prometheus
    kubernetes-namespaces:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-namespaces.json
      datasource: Prometheus
    kubernetes-nodes:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json
      datasource: Prometheus
    kubernetes-pods:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json
      datasource: Prometheus
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    labelValue: ""
    label: grafana_dashboard
    folderAnnotation: grafana_folder
    provider:
      disableDelete: true
      foldersFromFilesStructure: true
  datasources:
    enabled: true
    searchNamespace: ALL
    labelValue: ""
serviceMonitor:
  enabled: true

route:
  main:
    enabled: true
    hostnames:
      - grafana.pitower.link
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https

persistence:
  enabled: false

testFramework:
  enabled: false

plugins:
  - grafana-clock-panel
  - victoriametrics-logs-datasource

imageRenderer:
  enabled: true
