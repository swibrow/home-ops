annotations:
  reloader.stakater.com/auto: "true"
deploymentStrategy:
  type: Recreate
admin:
  existingSecret: grafana-admin-secret
env:
  GF_EXPLORE_ENABLED: true
  GF_SERVER_ROOT_URL: "https://grafana.wibrow.dev"
envFromSecret: grafana-secrets
grafana.ini:
  log.console:
    format: json
  analytics:
    check_for_updates: false
    check_for_plugin_updates: false
    reporting_enabled: false
  auth:
    oauth_auto_login: true
    oauth_allow_insecure_email_lookup: true
  auth.generic_oauth:
    enabled: true
    name: Kanidm
    icon: signin
    scopes: openid profile email groups
    client_id: grafana
    empty_scopes: false
    auth_url: https://idm.wibrow.dev/ui/oauth2
    token_url: https://idm.wibrow.dev/oauth2/token
    api_url: https://idm.wibrow.dev/oauth2/openid/grafana/userinfo
    login_attribute_path: preferred_username
    groups_attribute_path: groups
    name_attribute_path: name
    use_pkce: true
  auth.generic_oauth.group_mapping:
    org_id: 1
    role_attribute_path: |
      contains(groups[*], 'admins@idm.wibrow.dev') && 'Admin' || contains(groups[*], 'people@idm.wibrow.dev') && 'Viewer'
  news:
    news_feed_enabled: false
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes
      - name: infrastructure
        orgId: 1
        folder: Infrastructure
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/infrastructure
datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - { name: Prometheus, orgId: 1 }
      - { name: Loki, orgId: 1 }
      - { name: VictoriaLogs, orgId: 1 }
      - { name: VictoriaMetrics, orgId: 1 }
      - { name: Alertmanager, orgId: 1 }
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        jsonData:
          prometheusType: Prometheus
        isDefault: true
      - name: VictoriaMetrics
        type: prometheus
        uid: victoriametrics
        access: proxy
        url: http://victoria-metrics-server.monitoring.svc.cluster.local:8428
        jsonData:
          prometheusType: Prometheus
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        uid: victorialogs
        access: proxy
        url: http://victoria-logs.monitoring.svc.cluster.local:9428
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: victorialogs
            filterByTraceID: true
          tracesToMetrics:
            datasourceUid: prometheus
          serviceMap:
            datasourceUid: prometheus
      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.monitoring.svc.cluster.local:9093
        jsonData:
          implementation: prometheus
dashboards:
  infrastructure:
    node-exporter-full:
      gnetId: 1860 # https://grafana.com/grafana/dashboards/1860?tab=revisions
      revision: 45
      datasource: Prometheus
    external-secrets:
      url: https://raw.githubusercontent.com/external-secrets/external-secrets/main/docs/snippets/dashboard.json
      datasource: Prometheus
    cert-manager:
      gnetId: 20842 # https://grafana.com/grafana/dashboards/20842
      revision: 3
      datasource: Prometheus
  kubernetes:
    kubernetes-api-server:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json
      datasource: Prometheus
    kubernetes-coredns:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-coredns.json
      datasource: Prometheus
    kubernetes-global:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json
      datasource: Prometheus
    kubernetes-namespaces:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-namespaces.json
      datasource: Prometheus
    kubernetes-nodes:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json
      datasource: Prometheus
    kubernetes-pods:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json
      datasource: Prometheus
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    labelValue: ""
    label: grafana_dashboard
    folderAnnotation: grafana_folder
    provider:
      disableDelete: true
      foldersFromFilesStructure: true
  datasources:
    enabled: true
    searchNamespace: ALL
    labelValue: ""
serviceMonitor:
  enabled: true

route:
  main:
    enabled: true
    annotations:
      # Unauthenticated / redirects to /login (302), so probe Grafana's own
      # health endpoint instead — 200 + database:ok means it's actually serving.
      gatus.home-operations.com/endpoint: |
        path: /api/health
        conditions:
          - "[STATUS] == 200"
          - "[BODY].database == ok"
    hostnames:
      - grafana.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https

persistence:
  enabled: false

testFramework:
  enabled: false

plugins:
  - grafana-clock-panel
  - victoriametrics-logs-datasource

imageRenderer:
  enabled: true
  # Without this the chart mints a random token every render (its `lookup` to
  # reuse the existing one returns nil under ArgoCD, which has no cluster
  # access), churning the Secret and making Reloader restart Grafana on every
  # reconcile. Pin it to an ESO-managed Secret so the token is deterministic.
  existingSecret: grafana-image-renderer
  env:
    LOG_FORMAT: json
