---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - externalsecret.yaml

configMapGenerator:
  - name: grafana-dashboards-home-assistant
    files:
      - dashboards/home-assistant-overview.json
      - dashboards/home-assistant-sensors.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: HomeAssistant

helmCharts:
  - name: grafana
    repo: https://grafana.github.io/helm-charts
    version: 10.5.15
    releaseName: grafana
    namespace: monitoring
    valuesFile: values.yaml
