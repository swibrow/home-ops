---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: victoria-logs-overview
  namespace: monitoring
spec:
  folder: Observability
  instanceSelector:
    matchLabels:
      dashboards: grafana
  configMapRef:
    name: victoria-logs-overview-dashboard
    key: victoria-logs-overview.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: victorialogs-single-node
  namespace: monitoring
spec:
  folder: Observability
  instanceSelector:
    matchLabels:
      dashboards: grafana
  configMapRef:
    name: victoria-logs-victorialogs-single-node
    key: victorialogs-single-node.json
