---
# Stateful, singleton Claude Code workspace managed by the agent-sandbox controller.
# Pause with `replicas: 0` (PVC retained); resume with `replicas: 1`.
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: claude-code
spec:
  replicas: 1
  # We define our own ClusterIP Service below for clean Gateway API routing,
  # so the controller's auto headless Service is disabled.
  service: false
  shutdownPolicy: Retain
  volumeClaimTemplates:
    - metadata:
        name: home
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ceph-block
        resources:
          requests:
            storage: 20Gi
  podTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: claude-code
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: code-server
          image: ghcr.io/swibrow/claude-code-sandbox:2.1.167
          # Auth is enforced upstream by the Envoy Gateway SecurityPolicy (OIDC via
          # kanidm), so code-server itself runs without a password. Authenticate
          # Claude with `claude login` in the terminal — the token persists on the PVC.
          args: ["--auth", "none"]
          env:
            - name: TZ
              value: Europe/Zurich
          ports:
            - name: http
              containerPort: 8080
          # Fails loudly if the NFS bin-cache mount ever ends up noexec (see
          # kubernetes/apps/pitower/ai/bin-cache/README.md) — binaries cached there
          # couldn't run otherwise.
          lifecycle:
            postStart:
              exec:
                command: ["verify-exec-mount", "/mnt/nfs"]
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: home
              mountPath: /home/coder
            # NFS bin-cache (kubernetes/apps/pitower/ai/bin-cache/) — read-only on both this
            # mount and the pod's nfs volume source below; no PV/PVC, mirrors the same inline
            # pod-level nfs pattern used by jellyfin/sonarr/etc against this same NFS server.
            - name: bin-cache
              mountPath: /mnt/nfs
              readOnly: true
            - name: mise-config
              mountPath: /etc/mise
              readOnly: true
            - name: mise-tmp
              mountPath: /tmp/mise
      volumes:
        - name: bin-cache
          nfs:
            server: data
            path: /volume1/nfs
            readOnly: true
        - name: mise-config
          configMap:
            name: bin-cache-mise-config
        - name: mise-tmp
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: claude-code
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-code
spec:
  hostnames:
    - claude.wibrow.dev
  parentRefs:
    - name: envoy-internal
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - name: claude-code
          port: 8080
