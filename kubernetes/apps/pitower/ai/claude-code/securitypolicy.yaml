---
# OIDC auth for code-server, enforced at the Envoy internal gateway (code-server OSS
# has no native OIDC). Requires a kanidm OAuth2 client named "code-server":
#   kanidm system oauth2 create code-server "Code Server" https://claude.wibrow.dev
#   kanidm system oauth2 add-redirect-url code-server https://claude.wibrow.dev/oauth2/callback
#   kanidm system oauth2 update-scope-map code-server <group> openid email profile
#   kanidm system oauth2 warning-insecure-client-disable-pkce code-server  # EG 1.8 OIDC has no PKCE
#   kanidm system oauth2 show-basic-secret code-server  # -> Infisical /ai/claude-code/oidc-client-secret
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: claude-code
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: claude-code
  oidc:
    provider:
      # kanidm per-client issuer (bare host 404s); discovery resolves at
      # <issuer>/.well-known/openid-configuration
      issuer: https://idm.wibrow.dev/oauth2/openid/code-server
    clientID: code-server
    clientSecret:
      name: claude-code-oidc
    scopes: ["openid", "email", "profile"]
    redirectURL: https://claude.wibrow.dev/oauth2/callback
    logoutPath: /logout
