---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: kubernetes
  annotations:
    # Opt-in: only annotated MCPServers are exported to the MCPRegistry / Cloud UI.
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-title: Kubernetes
    toolhive.stacklok.dev/registry-description: Read-only access to the pitower cluster.
    # Required for export: the registry-server kubernetes source skips any MCPServer
    # missing BOTH registry-description AND registry-url (becomes the catalog entry's
    # Remotes[].URL). External path-based endpoint (see oidcConfigRef.resourceUrl +
    # the per-server rules in httproute.yaml) so consumers can add this single server.
    toolhive.stacklok.dev/registry-url: "https://mcp.wibrow.dev/kubernetes/mcp"
spec:
  image: ghcr.io/stackloklabs/mkp/server:0.4.2
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8080
  args:
    # Read-only; flip to true (and rebind RBAC below) for write access.
    - --read-write=false
  serviceAccount: toolhive-kubernetes
  groupRef:
    name: mcp-tools
  # Exposed individually at https://mcp.wibrow.dev/kubernetes (path-based ingress on
  # the shared mcp-gateway HTTPRoute). The proxy enforces kanidm OAuth itself (same
  # client as the vMCP) and emits its own RFC 9728 protected-resource metadata.
  # endpointPrefix: Envoy strips /kubernetes before forwarding (ReplacePrefixMatch),
  # so the proxy prepends it back onto advertised endpoint URLs.
  endpointPrefix: /kubernetes
  # Embedded OAuth authorization server (mcpexternalauthconfig.yaml). Provides DCR
  # so agents like Claude Code can self-register (kanidm has no DCR), brokering the
  # actual login upstream to kanidm. authServerRef turns the AS on; oidcConfigRef
  # validates the tokens IT issues (issuer matches the AS, not kanidm).
  authServerRef:
    kind: MCPExternalAuthConfig
    name: kubernetes-authserver
  oidcConfigRef:
    name: kubernetes-authserver-oidc
    # The embedded AS issues tokens with aud = the resource (RFC 8707); match it.
    audience: https://mcp.wibrow.dev/kubernetes
    resourceUrl: https://mcp.wibrow.dev/kubernetes
    scopes:
      - openid
      - profile
      - email
      - groups
  # Authorize on internal kanidm group: only members of mcp-tools may use the server.
  # ToolHive synthesises THVGroup entities from the token's `groups` claim (a
  # well-known default). kanidm emits groups in SPN form (<name>@idm.wibrow.dev),
  # same as every other app's group binding — so match the full SPN, not bare name.
  authzConfig:
    type: inline
    inline:
      policies:
        - 'permit(principal in THVGroup::"mcp-tools@idm.wibrow.dev", action, resource);'
  # krr: kubernetes/toolhive
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: toolhive-kubernetes
  namespace: ai
---
# Read-only cluster access for the Kubernetes MCP server. To allow
# apply_resource, bind a writable role (e.g. edit) and set --read-write=true.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: toolhive-kubernetes-view
subjects:
  - kind: ServiceAccount
    name: toolhive-kubernetes
    namespace: ai
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
