---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - mcpgroup.yaml
  - embeddingserver.yaml
  - mcpoidcconfig.yaml
  - virtualmcpserver.yaml
  - httproute.yaml
  - externalsecret.yaml
  - mcpserver-home-assistant.yaml
  - mcpserver-grafana.yaml
  - mcpserver-kubernetes.yaml
  - mcpserver-argocd.yaml
  - mcpregistry.yaml
components:
  - ../../../../components/cnpg-db
configMapGenerator:
  # Generates the toolhive-registry-db-secrets Secret (DB_HOST/PORT/USER/PASS/NAME)
  # from the CNPG-managed toolhive-registry-app secret, consumed by the MCPRegistry.
  - name: cnpg-db-config
    literals:
      - APP_NAME=toolhive-registry
      - SECRET_NAME=toolhive-registry-db-secrets
      - CNPG_SECRET_KEY=toolhive-registry-app
