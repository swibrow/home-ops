---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpexternalauthconfig_v1beta1.json
# Embedded OAuth2/OIDC authorization server for the kubernetes MCP server.
#
# Why this exists: kanidm has NO Dynamic Client Registration (RFC 7591), but MCP
# clients like Claude Code REQUIRE DCR ("Incompatible auth server: does not support
# dynamic client registration"). This embedded AS runs in-process in the proxy,
# exposes /oauth/* + /.well-known/* (so clients self-register via DCR against IT),
# and delegates the actual user login upstream to kanidm. kanidm therefore only
# ever sees ONE client (toolhive-mcp) with ONE redirect URI (this AS's callback);
# every agent registers dynamically with the embedded AS instead.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPExternalAuthConfig
metadata:
  name: kubernetes-authserver
spec:
  type: embeddedAuthServer
  embeddedAuthServer:
    # Issuer = the public path-based URL of this server. The AS advertises its
    # endpoints under this (…/kubernetes/oauth/authorize, …/token, …/register).
    issuer: https://mcp.wibrow.dev/kubernetes
    # Scopes every DCR-registered client may request at /oauth/authorize. Keep
    # narrow — these are granted to ALL dynamically-registered clients.
    baselineClientScopes:
      - openid
      - offline_access
    # Persistent signing (RS256) + HMAC material. Without these the AS auto-gens
    # ephemeral keys (dev only) and every restart invalidates issued tokens.
    # Sourced from Infisical via externalsecret.yaml → Secret toolhive-authserver-secret.
    signingKeySecretRefs:
      - name: toolhive-authserver-secret
        key: signing-key
    hmacSecretRefs:
      - name: toolhive-authserver-secret
        key: hmac
    # DCR registrations + auth codes + refresh tokens live in Dragonfly (dragonfly.yaml)
    # so they survive proxy restarts.
    storage:
      type: redis
      redis:
        addr: toolhive-auth-dragonfly.ai:6379
        # Password-only AUTH (no ACL username) — Dragonfly requirepass. Same
        # Secret/key the Dragonfly CR sets via authentication.passwordFromSecret.
        aclUserConfig:
          passwordSecretRef:
            name: toolhive-authserver-secret
            key: redis-password
    upstreamProviders:
      # kanidm public PKCE client toolhive-mcp — no client secret. The AS redirects
      # users here to log in, then exchanges the code. redirectUri defaults to
      # {resourceUrl}/oauth/callback = https://mcp.wibrow.dev/kubernetes/oauth/callback,
      # which MUST be registered on the toolhive-mcp client in kanidm.
      - name: kanidm
        type: oidc
        oidcConfig:
          issuerUrl: https://idm.wibrow.dev/oauth2/openid/toolhive-mcp
          clientId: toolhive-mcp
          scopes:
            - openid
            - profile
            - email
            - groups
