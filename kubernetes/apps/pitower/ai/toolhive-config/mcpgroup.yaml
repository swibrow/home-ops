---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpgroup_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPGroup
metadata:
  name: mcp-tools
spec:
  description: Optimized MCP tools for AI assistants
---
# Aggregate tier for the mcp-gateway-internal VirtualMCPServer. The per-server
# tier (mcp-tools) runs an embedded OAuth AS per proxy, which breaks vMCP
# aggregation: each backend demands bearer tokens from a DIFFERENT per-server
# issuer and the embedded AS has no RFC 8693 token exchange, so the vMCP can
# never satisfy all of them. This group holds unauthenticated, in-cluster-only
# copies of the same servers (mcpserver-*-agg.yaml) that the vMCP fronts with
# its OWN embedded AS (virtualmcpserver.yaml). Ingress to these copies is
# locked to the vMCP pod via networkpolicy-mcp-agg.yaml.
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpgroup_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPGroup
metadata:
  name: mcp-agg
spec:
  description: Unauthenticated backend copies aggregated by the vMCP gateway
