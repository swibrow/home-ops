---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpoidcconfig_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: toolhive-mcp-oidc
spec:
  type: inline
  inline:
    # kanidm OAuth2 public client "toolhive-mcp" (PKCE). Created via the kanidm
    # CLI (no operator / declarative client support in this kanidm install).
    # issuer only — toolhive discovers jwks_uri via OIDC discovery. Setting an
    # explicit jwksUrl as well makes the vMCP register the same JWKS URL twice
    # ("httprc.Client: resource already exists") and every token is rejected.
    issuer: https://idm.wibrow.dev/oauth2/openid/toolhive-mcp
    clientId: toolhive-mcp
    # idm.wibrow.dev resolves to the envoy-external LB (private 10.20.10.x) inside
    # the cluster; allow toolhive's JWKS/OIDC + protected-resource fetches to hit
    # private IPs, otherwise discovery is blocked as an SSRF risk.
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
---
# Resource-server validation for the mcp-gateway-internal vMCP now that it runs
# its OWN embedded auth server (virtualmcpserver.yaml spec.authServerConfig).
# The vMCP validates incoming bearer tokens against the embedded AS's JWKS — so
# the issuer here MUST match authServerConfig.issuer (the AS root), NOT kanidm.
# mcp.wibrow.dev hairpins to the envoy-external LB (private 10.20.10.239)
# in-cluster, so JWKS/discovery fetches need the private-IP allowances.
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpoidcconfig_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: vmcp-authserver-oidc
spec:
  type: inline
  inline:
    issuer: https://mcp.wibrow.dev
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpoidcconfig_v1beta1.json
# Resource-server validation for the kubernetes MCP server when it runs behind its
# OWN embedded auth server (mcpexternalauthconfig.yaml / authServerRef). The proxy
# validates incoming bearer tokens against the embedded AS's JWKS — so the issuer
# here MUST match the embeddedAuthServer.issuer, NOT kanidm.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: kubernetes-authserver-oidc
spec:
  type: inline
  inline:
    issuer: https://mcp.wibrow.dev/kubernetes
    # mcp.wibrow.dev resolves to the envoy-external LB (private 10.20.10.x) inside
    # the cluster, and the AS hairpins to validate its own tokens — allow private IPs.
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
---
# Resource-server validation for the remaining per-server embedded auth servers.
# issuer MUST match each MCPExternalAuthConfig.embeddedAuthServer.issuer (the AS),
# NOT kanidm. Private IPs allowed (mcp.wibrow.dev hairpins to the envoy-external LB).
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: grafana-authserver-oidc
spec:
  type: inline
  inline:
    issuer: https://mcp.wibrow.dev/grafana
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: home-assistant-authserver-oidc
spec:
  type: inline
  inline:
    issuer: https://mcp.wibrow.dev/home-assistant
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: argocd-authserver-oidc
spec:
  type: inline
  inline:
    issuer: https://mcp.wibrow.dev/argocd
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: aws-api-authserver-oidc
spec:
  type: inline
  inline:
    issuer: https://mcp.wibrow.dev/aws-api
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
