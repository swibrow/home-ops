---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-secret
    creationPolicy: Owner
  data:
    - secretKey: HA_TOKEN
      remoteRef:
        key: /ai/toolhive/HA_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# Grafana basic-auth creds. MCPServer.spec.secrets is keyed by secret name
# (x-kubernetes-list-map-keys: [name]), so each env var must come from its own
# Secret — hence two separate targets rather than two keys in one Secret.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-grafana-user
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-grafana-user
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_USERNAME
      remoteRef:
        key: /monitoring/grafana/admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-grafana-pass
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-grafana-pass
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_PASSWORD
      remoteRef:
        key: /monitoring/grafana/admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
