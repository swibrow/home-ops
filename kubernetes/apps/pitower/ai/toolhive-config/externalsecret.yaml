---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-secret
    creationPolicy: Owner
  data:
    - secretKey: HA_TOKEN
      remoteRef:
        key: /ai/toolhive/HA_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # Grafana runs with ephemeral SQLite (persistence disabled), so a service
    # account token would be wiped on every pod restart. Use basic auth with
    # the admin credentials, which are persistent in Infisical.
    - secretKey: GRAFANA_USERNAME
      remoteRef:
        key: /monitoring/grafana/admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_PASSWORD
      remoteRef:
        key: /monitoring/grafana/admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
