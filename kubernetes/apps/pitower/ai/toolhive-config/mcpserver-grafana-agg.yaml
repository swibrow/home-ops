---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
# Aggregate-tier copy of mcpserver-grafana.yaml for the vMCP — unauthenticated,
# in-cluster only, ingress locked to the vMCP pod (networkpolicy-mcp-agg.yaml).
# See mcpserver-kubernetes-agg.yaml for the dual-tier rationale.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: grafana-agg
spec:
  image: docker.io/grafana/mcp-grafana:0.15.2
  transport: sse
  proxyPort: 8080
  mcpPort: 8000
  args:
    - -t
    - sse
  groupRef:
    name: mcp-agg
  env:
    - name: GRAFANA_URL
      value: http://grafana.monitoring.svc.cluster.local
  # Reuses the ExternalSecret-managed Secrets from externalsecret.yaml.
  secrets:
    - name: toolhive-grafana-user
      key: GRAFANA_USERNAME
      targetEnvName: GRAFANA_USERNAME
    - name: toolhive-grafana-pass
      key: GRAFANA_PASSWORD
      targetEnvName: GRAFANA_PASSWORD
  # krr: grafana/toolhive
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
