---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: home-assistant
  annotations:
    # Opt-in: only annotated MCPServers are exported to the MCPRegistry / Cloud UI.
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-title: Home Assistant
    toolhive.stacklok.dev/registry-description: Control and query Home Assistant entities.
    # Required for export: the registry-server kubernetes source skips any MCPServer
    # missing BOTH registry-description AND registry-url. External path-based endpoint
    # so consumers can add this single server.
    toolhive.stacklok.dev/registry-url: "https://mcp.wibrow.dev/home-assistant/mcp"
spec:
  image: docker.io/voska/hass-mcp:0.4.1
  # HTTP transport, NOT stdio: ToolHive's proxy only mounts the embedded OAuth AS
  # HTTP handlers (/oauth/*, /.well-known/*) for non-stdio transports — a stdio proxy
  # serves /mcp (401) but 404s every AS endpoint, so DCR/discovery is dead. hass-mcp
  # serves MCP streamable-http with --http; the proxy fronts it on 8080.
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8000
  args:
    - --http
    - --port
    - "8000"
    - --host
    - 0.0.0.0
  groupRef:
    name: mcp-tools
  # Per-server external exposure at https://mcp.wibrow.dev/home-assistant via the
  # embedded OAuth AS (DCR). See mcpserver-kubernetes.yaml + embedded-authserver memory.
  endpointPrefix: /home-assistant
  resourceOverrides:
    proxyDeployment:
      env:
        - name: INSECURE_DISABLE_URL_VALIDATION
          value: "true"
  authServerRef:
    kind: MCPExternalAuthConfig
    name: home-assistant-authserver
  oidcConfigRef:
    name: home-assistant-authserver-oidc
    audience: https://mcp.wibrow.dev/home-assistant
    resourceUrl: https://mcp.wibrow.dev/home-assistant
    scopes:
      - openid
      - profile
      - email
      - groups
  authzConfig:
    type: inline
    inline:
      policies:
        - 'permit(principal, action, resource);'
  env:
    - name: HA_URL
      value: http://homeassistant.iot:8123
  secrets:
    - name: toolhive-secret
      key: HA_TOKEN
      targetEnvName: HA_TOKEN
  # krr: home-assistant/toolhive
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
