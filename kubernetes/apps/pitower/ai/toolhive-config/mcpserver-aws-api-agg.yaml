---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
# Aggregate-tier copy of mcpserver-aws-api.yaml for the vMCP — unauthenticated,
# in-cluster only, ingress locked to the vMCP pod (networkpolicy-mcp-agg.yaml);
# that lock matters here: the workload reuses the IRSA ServiceAccount below.
# See mcpserver-kubernetes-agg.yaml for the dual-tier rationale.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: aws-api-agg
spec:
  # Runs AWS CLI commands. Read-only is enforced at the tool layer
  # (READ_OPERATIONS_ONLY) AND the IAM layer (ReadOnlyAccess on the IRSA role).
  # renovate: datasource=docker
  image: public.ecr.aws/awslabs-mcp/awslabs/aws-api-mcp-server:1.3.43
  transport: streamable-http
  # The server listens on :8000/mcp in streamable-http mode; the ToolHive proxy
  # fronts it on 8080.
  proxyPort: 8080
  mcpPort: 8000
  # Reuses the IRSA SA defined in mcpserver-aws-api.yaml (pitower-toolhive-aws-ro).
  serviceAccount: toolhive-aws-ro
  groupRef:
    name: mcp-agg
  # builtin "network" — the AWS server needs outbound egress to *.amazonaws.com
  # and sts.amazonaws.com.
  permissionProfile:
    type: builtin
    name: network
  env:
    - name: READ_OPERATIONS_ONLY
      value: "true"
    - name: AWS_API_MCP_TRANSPORT
      value: streamable-http
    # Bind on all interfaces + accept any Host header — see mcpserver-aws-api.yaml
    # for the full rationale (default 127.0.0.1 bind 502s the toolhive proxy).
    - name: AWS_API_MCP_HOST
      value: 0.0.0.0
    - name: AWS_API_MCP_ALLOWED_HOSTS
      value: "*"
    - name: AWS_REGION
      value: eu-central-2
    # The vMCP enforces auth at the edge; the server itself is unauthenticated
    # and only reachable from the vMCP pod (networkpolicy-mcp-agg.yaml).
    - name: AUTH_TYPE
      value: no-auth
    # ToolHive runs the workload with a read-only root filesystem, so the server
    # can't find a writable temp/working dir (gettempdir() fails on /tmp). Point
    # HOME + the working dir at the emptyDir mounted below. The server validates
    # that AWS_API_MCP_WORKING_DIR already EXISTS (it won't mkdir), so use /tmp
    # itself — the emptyDir mount point — not a subdir that nothing creates.
    - name: HOME
      value: /tmp
    - name: AWS_API_MCP_WORKING_DIR
      value: /tmp
  # emptyDir for /tmp — the only writable path under the read-only rootfs. The
  # CRD `volumes` field is hostPath-only, so this goes via podTemplateSpec
  # (workload container is named "mcp").
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  # krr: aws-api/toolhive
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
