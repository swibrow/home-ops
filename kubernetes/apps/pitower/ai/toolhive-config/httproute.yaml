---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-gateway
spec:
  hostnames:
    - mcp.wibrow.dev
  parentRefs:
    - name: envoy-external
      namespace: networking
      sectionName: https
  rules:
    # ── Per-server path-based exposure (mcp.wibrow.dev/<server>) ──────────────
    # Each individually-exposed MCPServer enforces its own kanidm OAuth + group
    # authz at its proxy. Gateway API ranks rules by longest matching path, so
    # these /<server>-prefixed rules outrank the generic /.well-known, event-stream,
    # and / rules below — the vMCP aggregate at /mcp is untouched.
    #
    # kubernetes — OAuth discovery (RFC 9728 path-suffixed metadata). NOT stripped:
    # the proxy serves /.well-known/oauth-protected-resource/kubernetes directly.
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource/kubernetes
      backendRefs:
        - name: mcp-kubernetes-proxy
          port: 8080
    # kubernetes — MCP traffic. Strip /kubernetes so the proxy sees /mcp; the
    # MCPServer's endpointPrefix re-adds it on advertised URLs.
    - matches:
        - path:
            type: PathPrefix
            value: /kubernetes
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: mcp-kubernetes-proxy
          port: 8080
    # ── Aggregate vMCP + Cloud UI (mcp.wibrow.dev) ───────────────────────────
    # OAuth protected-resource metadata (RFC 9728). MCP clients (claude.ai) GET
    # this from the 401 WWW-Authenticate `resource_metadata` hint, WITHOUT an
    # event-stream Accept header — so without this explicit rule it falls through
    # to the Cloud UI and 404s, and OAuth discovery never starts. PathPrefix is
    # more specific than `/`, so it outranks both rules below. Covers the
    # path-suffixed variants (…/oauth-protected-resource/mcp) too.
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource
      backendRefs:
        - name: vmcp-mcp-gateway-internal
          port: 4483
    # MCP protocol traffic — both streamable-http (POST) and SSE (GET) carry
    # `Accept: ... text/event-stream`. This rule has a header match, so by Gateway
    # API precedence it outranks the catch-all `/` rule below for those requests,
    # and MCP clients keep using https://mcp.wibrow.dev unchanged. Browser/UI
    # traffic (no event-stream Accept) falls through to the Cloud UI.
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: accept
              type: RegularExpression
              value: .*text/event-stream.*
      backendRefs:
        - name: vmcp-mcp-gateway-internal
          port: 4483
    # Everything else → ToolHive Cloud UI (registry browser) on root.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: toolhive-ui
          port: 3000
