---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-gateway
  annotations:
    # The vMCP endpoint returns 406 to a plain GET (no MCP Accept header), so
    # probe the gateway's /health endpoint instead.
    gatus.home-operations.com/endpoint: |
      path: /health
      conditions:
        - "[STATUS] == 200"
spec:
  hostnames:
    - mcp.wibrow.dev
  parentRefs:
    - name: envoy-external
      namespace: networking
      sectionName: https
  rules:
    # ── Per-server path-based exposure (mcp.wibrow.dev/<server>) ──────────────
    # Each individually-exposed MCPServer enforces its own kanidm OAuth + group
    # authz at its proxy. Gateway API ranks rules by longest matching path, so
    # these /<server>-prefixed rules outrank the generic /.well-known, event-stream,
    # and / rules below — the vMCP aggregate at /mcp is untouched.
    #
    # kubernetes — OAuth discovery (RFC 9728 path-suffixed metadata). NOT stripped:
    # the proxy serves /.well-known/oauth-protected-resource/kubernetes directly.
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource/kubernetes
      backendRefs:
        - name: mcp-kubernetes-proxy
          port: 8080
    # kubernetes — MCP traffic. Strip /kubernetes so the proxy sees /mcp; the
    # MCPServer's endpointPrefix re-adds it on advertised URLs.
    - matches:
        - path:
            type: PathPrefix
            value: /kubernetes
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: mcp-kubernetes-proxy
          port: 8080
    # grafana (SSE on /sse + a messages endpoint; endpointPrefix re-adds /grafana).
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource/grafana
      backendRefs:
        - name: mcp-grafana-proxy
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: mcp-grafana-proxy
          port: 8080
    # home-assistant
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource/home-assistant
      backendRefs:
        - name: mcp-home-assistant-proxy
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /home-assistant
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: mcp-home-assistant-proxy
          port: 8080
    # argocd
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource/argocd
      backendRefs:
        - name: mcp-argocd-proxy
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /argocd
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: mcp-argocd-proxy
          port: 8080
    # aws-api
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource/aws-api
      backendRefs:
        - name: mcp-aws-api-proxy
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /aws-api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: mcp-aws-api-proxy
          port: 8080
    # ── Aggregate vMCP (mcp.wibrow.dev) ──────────────────────────────────────
    # Everything not claimed by a per-server prefix above goes to the vMCP:
    # /mcp protocol traffic, RFC 9728 protected-resource metadata, and any
    # future root-level OAuth/AS endpoints (/oauth/*, authorization-server
    # metadata) — no per-endpoint rules or Accept-header heuristics needed.
    # The Cloud UI lives on its own host (toolhive.wibrow.dev, route in the
    # toolhive-ui app) so it can never shadow MCP/OAuth paths here.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vmcp-mcp-gateway-internal
          port: 4483
