---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: argocd
  annotations:
    # Opt-in: only annotated MCPServers are exported to the MCPRegistry / Cloud UI.
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-title: ArgoCD
    toolhive.stacklok.dev/registry-description: Read-only access to ArgoCD applications.
    # Required for export: the registry-server kubernetes source skips any MCPServer
    # missing BOTH registry-description AND registry-url. External path-based endpoint
    # so consumers can add this single server.
    toolhive.stacklok.dev/registry-url: "https://mcp.wibrow.dev/argocd/mcp"
spec:
  image: ghcr.io/argoproj-labs/mcp-for-argocd:v0.8.0
  # Image default CMD is `node dist/index.js http` (HTTP stream on :3000).
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 3000
  groupRef:
    name: mcp-tools
  # Per-server external exposure at https://mcp.wibrow.dev/argocd via the embedded
  # OAuth AS (DCR). See mcpserver-kubernetes.yaml + embedded-authserver memory.
  endpointPrefix: /argocd
  resourceOverrides:
    proxyDeployment:
      env:
        - name: INSECURE_DISABLE_URL_VALIDATION
          value: "true"
  authServerRef:
    kind: MCPExternalAuthConfig
    name: argocd-authserver
  oidcConfigRef:
    name: argocd-authserver-oidc
    audience: https://mcp.wibrow.dev/argocd
    resourceUrl: https://mcp.wibrow.dev/argocd
    scopes:
      - openid
      - profile
      - email
      - groups
  authzConfig:
    type: inline
    inline:
      policies:
        - 'permit(principal, action, resource);'
  env:
    - name: ARGOCD_BASE_URL
      value: http://argocd-server.argocd.svc
    # Refuse any mutating operations regardless of the token's RBAC.
    - name: MCP_READ_ONLY
      value: "true"
  secrets:
    - name: toolhive-argocd
      key: ARGOCD_API_TOKEN
      targetEnvName: ARGOCD_API_TOKEN
  # krr: argocd/toolhive
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
