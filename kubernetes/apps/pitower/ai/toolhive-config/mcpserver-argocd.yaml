---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: argocd
spec:
  image: ghcr.io/argoproj-labs/mcp-for-argocd:v0.7.0
  # Image default CMD is `node dist/index.js http` (HTTP stream on :3000).
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 3000
  groupRef:
    name: mcp-tools
  env:
    - name: ARGOCD_BASE_URL
      value: http://argocd-server.argocd.svc
    # Refuse any mutating operations regardless of the token's RBAC.
    - name: MCP_READ_ONLY
      value: "true"
  secrets:
    - name: toolhive-argocd
      key: ARGOCD_API_TOKEN
      targetEnvName: ARGOCD_API_TOKEN
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
