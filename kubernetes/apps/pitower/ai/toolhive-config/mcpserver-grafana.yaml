---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: grafana
  annotations:
    # Opt-in: only annotated MCPServers are exported to the MCPRegistry / Cloud UI.
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-title: Grafana
    toolhive.stacklok.dev/registry-description: Query Grafana dashboards, Prometheus, and Loki.
    # Required for export: the registry-server kubernetes source skips any MCPServer
    # missing BOTH registry-description AND registry-url. External path-based SSE
    # endpoint so consumers can add this single server.
    toolhive.stacklok.dev/registry-url: "https://mcp.wibrow.dev/grafana/sse"
spec:
  image: docker.io/grafana/mcp-grafana:0.16.0
  transport: sse
  proxyPort: 8080
  mcpPort: 8000
  args:
    - -t
    - sse
  groupRef:
    name: mcp-tools
  # Per-server external exposure at https://mcp.wibrow.dev/grafana via the embedded
  # OAuth AS (DCR for agents). See mcpserver-kubernetes.yaml + the embedded-authserver
  # memory for the full rationale; group gating is at the kanidm scope-map (mcp-tools),
  # so Cedar just allows authenticated principals. SSE: endpointPrefix re-prepends
  # /grafana onto the messages endpoint the proxy advertises.
  endpointPrefix: /grafana
  resourceOverrides:
    proxyDeployment:
      env:
        - name: INSECURE_DISABLE_URL_VALIDATION
          value: "true"
  authServerRef:
    kind: MCPExternalAuthConfig
    name: grafana-authserver
  oidcConfigRef:
    name: grafana-authserver-oidc
    audience: https://mcp.wibrow.dev/grafana
    resourceUrl: https://mcp.wibrow.dev/grafana
    scopes:
      - openid
      - profile
      - email
      - groups
  authzConfig:
    type: inline
    inline:
      policies:
        - 'permit(principal, action, resource);'
  env:
    - name: GRAFANA_URL
      value: http://grafana.monitoring.svc.cluster.local
  secrets:
    - name: toolhive-grafana-user
      key: GRAFANA_USERNAME
      targetEnvName: GRAFANA_USERNAME
    - name: toolhive-grafana-pass
      key: GRAFANA_PASSWORD
      targetEnvName: GRAFANA_PASSWORD
  # krr: grafana/toolhive
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
