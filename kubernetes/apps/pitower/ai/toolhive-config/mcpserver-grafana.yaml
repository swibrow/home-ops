---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: grafana
  annotations:
    # Opt-in: only annotated MCPServers are exported to the MCPRegistry / Cloud UI.
    toolhive.stacklok.dev/registry-export: "true"
    toolhive.stacklok.dev/registry-title: Grafana
    toolhive.stacklok.dev/registry-description: Query Grafana dashboards, Prometheus, and Loki.
spec:
  image: docker.io/grafana/mcp-grafana:0.15.2
  transport: sse
  proxyPort: 8080
  mcpPort: 8000
  args:
    - -t
    - sse
  groupRef:
    name: mcp-tools
  env:
    - name: GRAFANA_URL
      value: http://grafana.monitoring.svc.cluster.local
  secrets:
    - name: toolhive-grafana-user
      key: GRAFANA_USERNAME
      targetEnvName: GRAFANA_USERNAME
    - name: toolhive-grafana-pass
      key: GRAFANA_PASSWORD
      targetEnvName: GRAFANA_PASSWORD
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
