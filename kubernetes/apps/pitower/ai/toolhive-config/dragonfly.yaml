---
# Storage backend for the ToolHive embedded OAuth authorization server
# (MCPExternalAuthConfig type embeddedAuthServer). Holds DCR client registrations,
# authorization codes, and refresh tokens so they survive proxy restarts — without
# this they'd live in the proxy's memory and every restart would drop registrations.
# Redis-protocol; the toolhive AS storage.redis.addr points at this Service.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: toolhive-auth-dragonfly
spec:
  replicas: 1
  # AUTH password (toolhive's redis storage requires auth). Same Secret/key the AS
  # references via storage.redis.aclUserConfig.passwordSecretRef.
  authentication:
    passwordFromSecret:
      name: toolhive-authserver-secret
      key: redis-password
  # Dragonfly reserves ~256Mi per io thread and refuses to start unless the memory
  # limit exceeds threads*256Mi. One thread is plenty for OAuth session state.
  args:
    - "--proactor_threads=1"
    # ToolHive's auth-server storage runs Lua scripts that touch keys not declared
    # in KEYS[] (e.g. thv:auth:{ns:server}:user:upstream:<uuid>). Standard Redis
    # permits this; Dragonfly rejects undeclared-key access by default and the OAuth
    # callback fails with "failed to store session". Allow it to match Redis.
    - "--default_lua_flags=allow-undeclared-keys"
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
