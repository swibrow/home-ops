controllers:
  john:
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      seed-config:
        image:
          repository: busybox
          tag: 1.37.0
        command:
          - /bin/sh
          - -c
          - |
            if [ ! -s /home/node/.openclaw/openclaw.json ]; then
              cp /etc/openclaw/openclaw.json /home/node/.openclaw/openclaw.json
            fi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
    containers:
      app:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: 2026.5.3
        env:
          TZ: Europe/Zurich
        envFrom:
          - secretRef:
              name: john-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: &port 18789
              initialDelaySeconds: 15
              periodSeconds: 10
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *port
              periodSeconds: 10
              failureThreshold: 3
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: *port
              periodSeconds: 30
              failureThreshold: 5
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 4Gi

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

service:
  app:
    controller: john
    ports:
      http:
        appProtocol: kubernetes.io/ws
        port: *port

route:
  app:
    enabled: true
    hostnames:
      - john.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https

persistence:
  data:
    existingClaim: john-data
    globalMounts:
      - path: /home/node/.openclaw
  config:
    type: configMap
    name: john-config
    globalMounts:
      - path: /etc/openclaw
        readOnly: true
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
