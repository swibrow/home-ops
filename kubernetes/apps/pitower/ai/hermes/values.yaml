defaultPodOptions:
  securityContext:
    fsGroup: 10000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

controllers:
  hermes:
    annotations:
      reloader.stakater.com/auto: "true"
    replicas: 1
    strategy: Recreate
    type: deployment
    initContainers:
      init:
        image:
          repository: docker.io/library/alpine
          tag: "3.24"
        envFrom:
          - secretRef:
              name: hermes
        command:
          - /bin/sh
          - -c
          - |
            set -eu
            # Bake the real ANTHROPIC_API_KEY into the config (hermes needs it inline
            # and does not interpolate ${VAR}). Key chars are [A-Za-z0-9_-] only, so
            # '|' is a safe sed delimiter.
            sed "s|__ANTHROPIC_API_KEY__|${ANTHROPIC_API_KEY}|g" /tmp/config.yaml > /opt/data/config.yaml
            mkdir -p /opt/data/workspace
            chown -R 10000:10000 /opt/data/config.yaml /opt/data/workspace
    containers:
      app:
        image: &image
          repository: nousresearch/hermes-agent
          tag: v2026.7.1@sha256:b6c019227889e6675424a2b6223b2cafdd36bf7d1048d1ddd8e043b880d6cc0f
        args: ["gateway", "run", "--no-supervise"]
        env:
          AGENTMEMORY_URL: http://agentmemory.ai:3111
          AGENTMEMORY_PROJECT: hermes
          HERMES_HOME: /opt/data
          HOME: /opt/data
          TZ: Europe/Zurich
        envFrom:
          - secretRef:
              name: hermes
        resources:
          requests:
            cpu: 14m
            memory: 167Mi
          limits:
            memory: 2Gi
        ports:
          - containerPort: &port 8642
            name: http
            protocol: TCP
      dashboard:
        image: *image
        args: ["dashboard", "--host", "0.0.0.0", "--insecure"]
        env:
          TZ: Europe/Zurich
          GATEWAY_HEALTH_URL: http://localhost:8642
          HERMES_HOME: /opt/data
          HOME: /opt/data
        envFrom:
          - secretRef:
              name: hermes
        resources:
          requests:
            cpu: 50m
            memory: 216Mi
          limits:
            memory: 1Gi
        ports:
          - containerPort: &dashboardPort 9119
            name: http
            protocol: TCP
      codeserver:
        image:
          repository: ghcr.io/coder/code-server
          tag: 4.127.0@sha256:4193b3a0c2661bce87b3cafede59e7d50e1e99e35f7c10bece7c2a7e0660c0a8
        args:
          - --auth
          - none
          - --user-data-dir
          - /home/node/.vscode
          - --extensions-dir
          - /home/node/.vscode
          - --port
          - "12321"
          - /opt/data
        env:
          TZ: Europe/Zurich
        resources:
          requests:
            cpu: 10m
            memory: 72Mi
          limits:
            memory: 1Gi
        ports:
          - containerPort: &codeserverPort 12321
            name: codeserver
            protocol: TCP

service:
  app:
    controller: hermes
    ports:
      http:
        port: *port
      codeserver:
        port: *codeserverPort
  dashboard:
    controller: hermes
    ports:
      http:
        port: *dashboardPort

route:
  app:
    hostnames:
      - hermes.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: dashboard
            port: http
  codeserver:
    hostnames:
      - hermes-code.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: codeserver

persistence:
  config:
    existingClaim: hermes
    globalMounts:
      - path: /opt/data
  configmap:
    type: configMap
    name: hermes-config
    defaultMode: 0755
    globalMounts:
      - path: /tmp/config.yaml
        subPath: config.yaml
  agentmemory-plugin:
    type: configMap
    name: hermes-agentmemory-plugin
    defaultMode: 0755
    globalMounts:
      - path: /opt/data/plugins/agentmemory
