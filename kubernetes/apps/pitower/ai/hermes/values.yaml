defaultPodOptions:
  securityContext:
    fsGroup: 10000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

controllers:
  hermes:
    annotations:
      reloader.stakater.com/auto: "true"
    replicas: 1
    strategy: Recreate
    type: deployment
    initContainers:
      init:
        image:
          repository: docker.io/library/alpine
          tag: "3.24"
        envFrom:
          - secretRef:
              name: hermes
        command:
          - /bin/sh
          - -c
          - |
            set -eu
            # Bake the real ANTHROPIC_API_KEY into the config (hermes needs it inline
            # and does not interpolate ${VAR}). Key chars are [A-Za-z0-9_-] only, so
            # '|' is a safe sed delimiter.
            sed "s|__ANTHROPIC_API_KEY__|${ANTHROPIC_API_KEY}|g" /tmp/config.yaml > /opt/data/config.yaml
            mkdir -p /opt/data/workspace
            chown -R 10000:10000 /opt/data/config.yaml /opt/data/workspace
    containers:
      app:
        image: &image
          repository: nousresearch/hermes-agent
          tag: v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
        args: ["gateway", "run"]
        env:
          MEMINI_BASE_URL: http://memini.ai:8080
          # Share this string across agents (e.g. this Claude Code session) to
          # share one memory namespace, or give hermes its own to keep its
          # captured turns separate.
          MEMINI_NAMESPACE: hermes
          MEMINI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: hermes
                key: MEMINI_API_KEY
          HERMES_HOME: /opt/data
          HOME: /opt/data
          TZ: Europe/Zurich
        envFrom:
          - secretRef:
              name: hermes
        resources:
          requests:
            cpu: 14m
            memory: 167Mi
          limits:
            memory: 2Gi
        ports:
          - containerPort: &port 8642
            name: http
            protocol: TCP
      dashboard:
        image: *image
        args: ["dashboard", "--host", "0.0.0.0", "--insecure"]
        env:
          TZ: Europe/Zurich
          GATEWAY_HEALTH_URL: http://localhost:8642
          HERMES_HOME: /opt/data
          HOME: /opt/data
          HERMES_DASHBOARD_OIDC_ISSUER: https://idm.wibrow.dev/oauth2/openid/hermes
          HERMES_DASHBOARD_OIDC_CLIENT_ID: hermes
          # Envoy Gateway terminates TLS upstream; without this hermes builds the
          # OAuth callback URL from the (plain-HTTP) request it actually receives,
          # so the redirect_uri sent to Kanidm is http:// and gets rejected as a
          # mismatch against the registered https:// redirect URL.
          HERMES_DASHBOARD_PUBLIC_URL: https://hermes.wibrow.dev
        envFrom:
          - secretRef:
              name: hermes
        resources:
          requests:
            cpu: 50m
            memory: 216Mi
          limits:
            memory: 1Gi
        ports:
          - containerPort: &dashboardPort 9119
            name: http
            protocol: TCP
      codeserver:
        image:
          repository: ghcr.io/coder/code-server
          tag: 4.128.0@sha256:bd4a3a022ff016954bf9ae6ea0bce6c7eef96a69da4d2fe34552638f32d4820c
        args:
          - --auth
          - none
          - --user-data-dir
          - /home/node/.vscode
          - --extensions-dir
          - /home/node/.vscode
          - --port
          - "12321"
          - /opt/data
        env:
          TZ: Europe/Zurich
        resources:
          requests:
            cpu: 10m
            memory: 72Mi
          limits:
            memory: 1Gi
        ports:
          - containerPort: &codeserverPort 12321
            name: codeserver
            protocol: TCP

service:
  app:
    controller: hermes
    ports:
      http:
        port: *port
      codeserver:
        port: *codeserverPort
  dashboard:
    controller: hermes
    ports:
      http:
        port: *dashboardPort

route:
  app:
    hostnames:
      - hermes.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: dashboard
            port: http
  codeserver:
    hostnames:
      - hermes-code.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: codeserver

persistence:
  config:
    existingClaim: hermes
    globalMounts:
      - path: /opt/data
  configmap:
    type: configMap
    name: hermes-config
    defaultMode: 0755
    globalMounts:
      - path: /tmp/config.yaml
        subPath: config.yaml
  memini-plugin:
    type: configMap
    name: hermes-memini-plugin
    defaultMode: 0755
    globalMounts:
      - path: /opt/data/plugins/memini
