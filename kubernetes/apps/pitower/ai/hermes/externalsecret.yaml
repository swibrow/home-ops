---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name hermes
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    creationPolicy: Owner
  data:
    # Model provider: direct Anthropic API (hermes config interpolates ${ANTHROPIC_API_KEY}).
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: /ai/hermes/ANTHROPIC_API_KEY
    # Bearer used by the agentmemory plugin; MUST match the agentmemory service's signing secret.
    - secretKey: AGENTMEMORY_SECRET
      remoteRef:
        key: /ai/agentmemory/AGENTMEMORY_SECRET
    # Telegram chat interface.
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: /ai/hermes/TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_ALLOWED_USERS
      remoteRef:
        key: /ai/hermes/TELEGRAM_ALLOWED_USERS
