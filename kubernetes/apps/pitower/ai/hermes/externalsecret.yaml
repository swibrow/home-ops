---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name hermes
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    creationPolicy: Owner
  data:
    # Model provider: direct Anthropic API (hermes config interpolates ${ANTHROPIC_API_KEY}).
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: /ai/hermes/ANTHROPIC_API_KEY
    # Bearer used by the memini plugin; MUST match memini's own MEMINI_API_KEY
    # (kubernetes/apps/pitower/ai/memini/externalsecret.yaml) since that's the
    # token the memini service itself validates against.
    - secretKey: MEMINI_API_KEY
      remoteRef:
        key: /ai/memini/MEMINI_API_KEY
    # Telegram chat interface.
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: /ai/hermes/TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_ALLOWED_USERS
      remoteRef:
        key: /ai/hermes/TELEGRAM_ALLOWED_USERS
    # Dashboard Kanidm OAuth2 client (self-hosted OIDC provider).
    - secretKey: HERMES_DASHBOARD_OIDC_CLIENT_SECRET
      remoteRef:
        key: /ai/hermes/HERMES_DASHBOARD_OIDC_CLIENT_SECRET
