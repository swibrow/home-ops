model:
  default: claude-sonnet-4-6
  provider: anthropic
fallback_providers:
  - provider: anthropic
    model: claude-haiku-4-5-20251001
providers:
  anthropic:
    base_url: https://api.anthropic.com/
    api_mode: anthropic_messages
    # hermes does NOT interpolate ${VAR} in config (that relies on Flux postBuild
    # substitution, unused here) and the provider requires the key inline. The init
    # container substitutes this placeholder with the real ANTHROPIC_API_KEY (from
    # the `hermes` secret) before hermes starts — mirroring what Flux bakes in.
    api_key: __ANTHROPIC_API_KEY__
toolsets:
  - hermes-cli
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
memory:
  provider: agentmemory
  auto_migrate: true
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 2
  reasoning_effort: medium
streaming:
  enabled: false
security:
  redact_secrets: true
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram
mcp_servers:
  # Anonymous in-cluster vMCP (toolhive/toolhive-config/virtualmcpserver-direct.yaml).
  # The OAuth vMCP (vmcp-mcp-gateway, mcp.wibrow.dev) requires a browser OAuth flow
  # Hermes can't do, so it uses the anonymous sibling, netpol-locked to this pod.
  toolhive:
    url: http://vmcp-mcp-gateway-direct.ai:4483/mcp
auxiliary:
  vision:
    provider: anthropic
    model: claude-sonnet-4-6
  compression:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 180
  web_extract:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 120
  approval:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 60
  session_search:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 120
