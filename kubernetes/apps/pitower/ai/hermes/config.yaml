model:
  default: claude-sonnet-4-6
  provider: anthropic
fallback_providers:
  - provider: anthropic
    model: claude-haiku-4-5-20251001
providers:
  anthropic:
    base_url: https://api.anthropic.com/
    api_mode: anthropic_messages
    api_key: ${ANTHROPIC_API_KEY}
toolsets:
  - hermes-cli
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
memory:
  provider: agentmemory
  auto_migrate: true
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 2
  reasoning_effort: medium
streaming:
  enabled: false
security:
  redact_secrets: true
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram
mcp_servers:
  toolhive:
    url: http://vmcp-mcp-gateway-internal.ai:4483/mcp
auxiliary:
  vision:
    provider: anthropic
    model: claude-sonnet-4-6
  compression:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 180
  web_extract:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 120
  approval:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 60
  session_search:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 120
