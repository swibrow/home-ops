defaultPodOptions:
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

controllers:
  agentmemory:
    annotations:
      reloader.stakater.com/auto: "true"
    replicas: 1
    strategy: Recreate
    type: deployment
    containers:
      app:
        image:
          repository: ghcr.io/joryirving/agentmemory
          tag: 0.9.28@sha256:a1fc1fedb18ca7f4a6be782ed742d24ee86358ebe9bbc303c3e3f7fba5389b83
        command:
          - /usr/bin/catatonit
          - --
          - /bin/sh
          - -c
          - |
            PREFS_HOME="${HOME:-/home/node}"
            mkdir -p "$PREFS_HOME/.agentmemory"
            if [ ! -s "$PREFS_HOME/.agentmemory/preferences.json" ]; then
              printf '%s\n' '{"schemaVersion":1,"lastAgent":null,"lastAgents":[],"lastProvider":null,"skipSplash":true,"skipNpxHint":true,"skipGlobalInstall":true,"skipConsoleInstall":true,"firstRunAt":"1970-01-01T00:00:00.000Z"}' > "$PREFS_HOME/.agentmemory/preferences.json"
            fi
            exec /entrypoint.sh
        env:
          AGENTMEMORY_DROP_STALE_INDEX: "true"
          AGENTMEMORY_TOOLS: all
          # Embeddings run on-device (BGE-small via @xenova/transformers); no external service.
          EMBEDDING_PROVIDER: local
          # Chat LLM (compression / consolidation / graph extraction) runs via the
          # Claude Agent SDK against a Claude subscription, NOT the metered Anthropic
          # API. Auth = CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token`, injected
          # by the externalsecret); no ANTHROPIC_API_KEY is set, so the SDK bills the
          # subscription. ANTHROPIC_MODEL still selects the (light) model the SDK uses.
          AGENTMEMORY_ALLOW_AGENT_SDK: "true"
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          AGENTMEMORY_LLM_TIMEOUT_MS: "120000"
          AGENTMEMORY_AUTO_COMPRESS: "true"
          CONSOLIDATION_ENABLED: "true"
          GRAPH_EXTRACTION_ENABLED: "true"
          III_REST_PORT: "3111"
          RUST_LOG: warn
          # Viewer/stream default to binding localhost only (REST on 3111 binds all
          # interfaces, which is why only it was reachable). Bind to 0.0.0.0 so the
          # kube Service can reach the viewer (3113) + stream (3112); set the public
          # URL so the in-browser websocket targets the gateway, not localhost:3112.
          AGENTMEMORY_VIEWER_HOST: 0.0.0.0
          AGENTMEMORY_VIEWER_URL: https://agentmemory.wibrow.dev
          VIEWER_ALLOWED_HOSTS: agentmemory.wibrow.dev
          VIEWER_ALLOWED_ORIGINS: https://agentmemory.wibrow.dev
          TZ: Europe/Zurich
        envFrom:
          - secretRef:
              name: agentmemory
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              failureThreshold: 3
              httpGet:
                path: /agentmemory/livez
                port: 3111
              periodSeconds: 30
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              failureThreshold: 3
              httpGet:
                path: /agentmemory/livez
                port: 3111
              periodSeconds: 10
              timeoutSeconds: 5
          startup:
            enabled: true
            custom: true
            spec:
              failureThreshold: 60
              httpGet:
                path: /agentmemory/livez
                port: 3111
              periodSeconds: 5
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 18m
            memory: 1180Mi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

persistence:
  data:
    existingClaim: agentmemory
    globalMounts:
      - path: /data
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp

service:
  app:
    controller: agentmemory
    ports:
      api:
        port: 3111
      stream:
        port: 3112
      viewer:
        port: 3113

route:
  app:
    hostnames:
      - agentmemory.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
            headers:
              - name: Upgrade
                value: websocket
        backendRefs:
          - identifier: app
            port: 3112
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: app
            port: 3113
  # REST API (3111) — consumed by remote MCP clients (e.g. Claude Code via
  # @agentmemory/mcp). Bearer-auth via AGENTMEMORY_SECRET; internal gateway only.
  api:
    hostnames:
      - agentmemory-api.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 3111
