defaultPodOptions:
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

controllers:
  agentmemory:
    annotations:
      reloader.stakater.com/auto: "true"
    replicas: 1
    strategy: Recreate
    type: deployment
    containers:
      app:
        image:
          repository: ghcr.io/joryirving/agentmemory
          tag: 0.9.27@sha256:3dbd28e1194f9e36babef9f8611ee10b5673444aed8df8b74144c3ba91073e48
        command:
          - /usr/bin/catatonit
          - --
          - /bin/sh
          - -c
          - |
            PREFS_HOME="${HOME:-/home/node}"
            mkdir -p "$PREFS_HOME/.agentmemory"
            if [ ! -s "$PREFS_HOME/.agentmemory/preferences.json" ]; then
              printf '%s\n' '{"schemaVersion":1,"lastAgent":null,"lastAgents":[],"lastProvider":null,"skipSplash":true,"skipNpxHint":true,"skipGlobalInstall":true,"skipConsoleInstall":true,"firstRunAt":"1970-01-01T00:00:00.000Z"}' > "$PREFS_HOME/.agentmemory/preferences.json"
            fi
            exec /entrypoint.sh
        env:
          AGENTMEMORY_DROP_STALE_INDEX: "true"
          AGENTMEMORY_TOOLS: all
          # Embeddings run on-device (BGE-small via @xenova/transformers); no external service.
          EMBEDDING_PROVIDER: local
          # Chat LLM (consolidation / graph extraction) via the real Anthropic API.
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          AGENTMEMORY_LLM_TIMEOUT_MS: "120000"
          AGENTMEMORY_AUTO_COMPRESS: "true"
          CONSOLIDATION_ENABLED: "true"
          GRAPH_EXTRACTION_ENABLED: "true"
          III_REST_PORT: "3111"
          RUST_LOG: warn
          VIEWER_ALLOWED_HOSTS: agentmemory.wibrow.dev
          VIEWER_ALLOWED_ORIGINS: https://agentmemory.wibrow.dev
          TZ: Europe/Zurich
        envFrom:
          - secretRef:
              name: agentmemory
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              failureThreshold: 3
              httpGet:
                path: /agentmemory/livez
                port: 3111
              periodSeconds: 30
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              failureThreshold: 3
              httpGet:
                path: /agentmemory/livez
                port: 3111
              periodSeconds: 10
              timeoutSeconds: 5
          startup:
            enabled: true
            custom: true
            spec:
              failureThreshold: 60
              httpGet:
                path: /agentmemory/livez
                port: 3111
              periodSeconds: 5
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

persistence:
  data:
    existingClaim: agentmemory
    globalMounts:
      - path: /data
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp

service:
  app:
    controller: agentmemory
    ports:
      api:
        port: 3111
      stream:
        port: 3112
      viewer:
        port: 3113

route:
  app:
    hostnames:
      - agentmemory.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
            headers:
              - name: Upgrade
                value: websocket
        backendRefs:
          - identifier: app
            port: 3112
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: app
            port: 3113
  # REST API (3111) — consumed by remote MCP clients (e.g. Claude Code via
  # @agentmemory/mcp). Bearer-auth via AGENTMEMORY_SECRET; internal gateway only.
  api:
    hostnames:
      - agentmemory-api.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 3111
