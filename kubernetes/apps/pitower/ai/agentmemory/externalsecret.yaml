---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name agentmemory
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    creationPolicy: Owner
  data:
    # Consolidation / chat LLM (real Anthropic API). Embeddings run on-device (local).
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: /ai/agentmemory/ANTHROPIC_API_KEY
    # Signing secret for the agentmemory viewer/API sessions.
    - secretKey: AGENTMEMORY_SECRET
      remoteRef:
        key: /ai/agentmemory/AGENTMEMORY_SECRET
