---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name agentmemory
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    creationPolicy: Owner
  data:
    # Chat LLM runs via the Claude Agent SDK against a Claude subscription.
    # `claude setup-token` mints this long-lived OAuth token; providing it here
    # (instead of an ANTHROPIC_API_KEY) makes the SDK bill the subscription, not
    # the metered API. Embeddings run on-device (local).
    - secretKey: CLAUDE_CODE_OAUTH_TOKEN
      remoteRef:
        key: /ai/agentmemory/CLAUDE_CODE_OAUTH_TOKEN
    # Signing secret for the agentmemory viewer/API sessions.
    - secretKey: AGENTMEMORY_SECRET
      remoteRef:
        key: /ai/agentmemory/AGENTMEMORY_SECRET
