---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
# Infisical entries required under /ai/flickerd:
#   internal-token        — must equal the Worker's GENERATOR_SHARED_SECRET
#   git-token             — fine-grained PAT, contents:write on swibrow/flickerd-sites
#   r2-access-key-id      — R2 API token (Object Read & Write, bucket flickerd-sites)
#   r2-secret-access-key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flickerd-generator
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: flickerd-generator
    creationPolicy: Owner
  data:
    - secretKey: FLICKERD_INTERNAL_TOKEN
      remoteRef:
        key: /ai/flickerd/internal-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flickerd-sandbox
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: flickerd-sandbox
    creationPolicy: Owner
  data:
    - secretKey: GIT_TOKEN
      remoteRef:
        key: /ai/flickerd/git-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: R2_ACCESS_KEY_ID
      remoteRef:
        key: /ai/flickerd/r2-access-key-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: R2_SECRET_ACCESS_KEY
      remoteRef:
        key: /ai/flickerd/r2-secret-access-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
