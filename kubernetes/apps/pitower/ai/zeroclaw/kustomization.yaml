---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - externalsecret.yaml
components:
  - ../../../../components/volsync

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: zeroclaw-config
    files:
      - config.toml
  - name: volsync-config
    literals:
      - APP_NAME=zeroclaw
      - CLAIM_NAME=zeroclaw-data
      - SECRET_NAME=zeroclaw-volsync
      - STORAGE_SIZE=1Gi
      - RESTIC_REPO=s3:https://s3.eu-central-2.amazonaws.com/pitower-volsync-backups/ai/zeroclaw

helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: 4.6.2
    releaseName: zeroclaw
    namespace: ai
    valuesFile: values.yaml
