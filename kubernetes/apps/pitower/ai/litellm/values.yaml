defaultPodOptions:
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

controllers:
  litellm:
    annotations:
      reloader.stakater.com/auto: "true"
    replicas: 1
    strategy: Recreate
    type: deployment
    containers:
      app:
        # non_root variant: prisma baked for UID 1000 (avoids the runtime
        # "Installing Prisma CLI" reinstall + NotConnectedError under non-root).
        image:
          repository: ghcr.io/berriai/litellm-non_root
          tag: v1.91.3
        args:
          - --config
          - /config/config.yaml
          - --port
          - "4000"
        env:
          STORE_MODEL_IN_DB: "true"
          LITELLM_MODE: PRODUCTION
          TZ: Europe/Zurich
          # Admin UI SSO via Kanidm (generic OIDC). "Login with SSO" button;
          # master-key login stays as break-glass. PKCE (S256) is mandatory on
          # Kanidm clients — LiteLLM sends it via GENERIC_CLIENT_USE_PKCE.
          # GENERIC_CLIENT_SECRET injected via the litellm secret (envFrom).
          PROXY_BASE_URL: https://litellm.wibrow.dev
          GENERIC_CLIENT_ID: litellm
          GENERIC_AUTHORIZATION_ENDPOINT: https://idm.wibrow.dev/ui/oauth2
          GENERIC_TOKEN_ENDPOINT: https://idm.wibrow.dev/oauth2/token
          GENERIC_USERINFO_ENDPOINT: https://idm.wibrow.dev/oauth2/openid/litellm/userinfo
          GENERIC_SCOPE: openid profile email
          GENERIC_CLIENT_USE_PKCE: "true"
          # Skip the username/password form, go straight to Kanidm. Master-key
          # login still reachable at /ui/login (LiteLLM has no toggle to disable it).
          AUTO_REDIRECT_UI_LOGIN_TO_SSO: "true"
          # preferred_username (short name) → maps this person to proxy_admin.
          PROXY_ADMIN_ID: sam
          # Connection string assembled by the cnpg-db component (DB_URL key).
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: litellm-db-secret
                key: DB_URL
        envFrom:
          - secretRef:
              name: litellm
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/liveliness
                port: 4000
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 6
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/readiness
                port: 4000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health/liveliness
                port: 4000
              periodSeconds: 5
              failureThreshold: 60
        resources:
          requests:
            cpu: 488m
            memory: 595Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

persistence:
  config:
    type: configMap
    name: litellm-config
    globalMounts:
      - path: /config
        readOnly: true
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp

service:
  app:
    controller: litellm
    ports:
      http:
        port: 4000

route:
  app:
    hostnames:
      - litellm.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 4000
