---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name litellm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    creationPolicy: Owner
  data:
    # Admin master key (sk-…) — UI login at /ui + virtual-key issuance.
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: /ai/litellm/LITELLM_MASTER_KEY
    # Kanidm OIDC client secret — UI SSO ("Login with SSO"). Client `litellm`.
    - secretKey: GENERIC_CLIENT_SECRET
      remoteRef:
        key: /ai/litellm/GENERIC_CLIENT_SECRET
    # Provider keys (referenced as os.environ/* in config.yaml).
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: /ai/litellm/ANTHROPIC_API_KEY
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: /ai/litellm/OPENROUTER_API_KEY
    # text-embedding-3-small — serves memini's embeddings model.
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: /ai/litellm/OPENAI_API_KEY
