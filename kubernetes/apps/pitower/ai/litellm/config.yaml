# LiteLLM proxy config — hosted providers only (no local inference).
# Provider keys are injected as env vars from the `litellm` secret
# (Infisical /ai/litellm/*). LITELLM_MASTER_KEY + DATABASE_URL are read
# from the environment automatically and are not referenced here.
model_list:
  # --- Anthropic (via OpenRouter) ---
  - model_name: claude-opus
    litellm_params:
      model: openrouter/anthropic/claude-opus-4.8
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: claude-sonnet
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: claude-haiku
    litellm_params:
      model: openrouter/anthropic/claude-haiku-4.5
      api_key: os.environ/OPENROUTER_API_KEY

  # --- OpenRouter (named aliases, auto-curated from the live catalog) ---
  # Newest ~5 chat models per major provider so they show in the dropdown.
  # Any other OpenRouter model is still reachable by full id via the catch-all.
