# LiteLLM proxy config — hosted providers only (no local inference).
# Provider keys are injected as env vars from the `litellm` secret
# (Infisical /ai/litellm/*). LITELLM_MASTER_KEY + DATABASE_URL are read
# from the environment automatically and are not referenced here.
model_list:
  # --- Anthropic (direct API key) ---
  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenRouter (named aliases) ---
  # Curated models that show up in the dropdown. Any other OpenRouter model is
  # still reachable by full id via the catch-all below (e.g. openrouter/...).
  - model_name: gemini-2.5-pro
    litellm_params:
      model: openrouter/google/gemini-2.5-pro
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: gemini-2.5-flash
    litellm_params:
      model: openrouter/google/gemini-2.5-flash
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: gpt-5
    litellm_params:
      model: openrouter/openai/gpt-5
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: gpt-5-mini
    litellm_params:
      model: openrouter/openai/gpt-5-mini
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: o3
    litellm_params:
      model: openrouter/openai/o3
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: gpt-4o
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: grok-4
    litellm_params:
      model: openrouter/x-ai/grok-4.3
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: deepseek-v3
    litellm_params:
      model: openrouter/deepseek/deepseek-chat-v3.1
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: deepseek-r1
    litellm_params:
      model: openrouter/deepseek/deepseek-r1
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: llama-3.3-70b
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: qwen3-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: kimi-k2
    litellm_params:
      model: openrouter/moonshotai/kimi-k2
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: glm-4.6
    litellm_params:
      model: openrouter/z-ai/glm-4.6
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: mistral-large
    litellm_params:
      model: openrouter/mistralai/mistral-large
      api_key: os.environ/OPENROUTER_API_KEY

  # --- OpenRouter (catch-all passthrough) ---
  # Reach any other OpenRouter model by id, e.g. `openrouter/google/gemma-3-27b-it`.
  # The explicit aliases above take precedence for those names.
  - model_name: "*"
    litellm_params:
      model: openrouter/*
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 600
