controllers:
  open-webui:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/open-webui/open-webui
          tag: v0.10.1
        env:
          # Application
          WEBUI_URL: "https://chat.wibrow.dev"
          TZ: Europe/Zurich
          PORT: "8080"
          # Model backend — litellm (OpenAI-compatible), Ollama disabled
          ENABLE_OPENAI_API: "true"
          OPENAI_API_BASE_URL: "http://litellm:4000/v1"
          ENABLE_OLLAMA_API: "false"
          # Auth — Kanidm OIDC only (local login form disabled)
          WEBUI_AUTH: "true"
          ENABLE_LOGIN_FORM: "false"
          ENABLE_OAUTH_SIGNUP: "true"
          OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
          OAUTH_PROVIDER_NAME: Kanidm
          OAUTH_CLIENT_ID: open-webui
          OPENID_PROVIDER_URL: "https://idm.wibrow.dev/oauth2/openid/open-webui/.well-known/openid-configuration"
          OAUTH_SCOPES: "openid email profile groups"
          # Kanidm requires PKCE — Open-WebUI omits it unless this is set.
          OAUTH_CODE_CHALLENGE_METHOD: "S256"
          # Group-based role management (Kanidm groups arrive in the `groups` claim)
          ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
          OAUTH_ROLES_CLAIM: groups
          OAUTH_ALLOWED_ROLES: "apps@idm.wibrow.dev,admins@idm.wibrow.dev"
          OAUTH_ADMIN_ROLES: "admins@idm.wibrow.dev"
          # Database — CNPG
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: open-webui-db-secret
                key: DB_URL
        envFrom:
          - secretRef:
              name: open-webui
        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 6
          readiness: *probe
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 30
              periodSeconds: 10
              failureThreshold: 30
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 4Gi

service:
  app:
    controller: open-webui
    ports:
      http:
        port: 8080

route:
  app:
    hostnames:
      - chat.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 8080

persistence:
  data:
    existingClaim: open-webui-data
    advancedMounts:
      open-webui:
        app:
          - path: /app/backend/data
