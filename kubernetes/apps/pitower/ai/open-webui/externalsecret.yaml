---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name open-webui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    creationPolicy: Owner
  data:
    # Signs session JWTs — must stay stable across restarts.
    - secretKey: WEBUI_SECRET_KEY
      remoteRef:
        key: /ai/open-webui/WEBUI_SECRET_KEY
    # litellm master key (sk-…) used as the OpenAI-compatible API key.
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: /ai/litellm/LITELLM_MASTER_KEY
