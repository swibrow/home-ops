---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/virtualmcpserver_v1beta1.json
# OAuth MCP gateway at https://mcp.wibrow.dev (httproute mcp-gateway → / catch-all,
# which also carries this AS's /oauth/* and /.well-known/* endpoints).
#
# This is the OAuth tier: required for the claude.ai web connector, whose UI is
# OAuth-only (no static-key/header field). It aggregates the mcp-tools backend group
# and enforces auth HERE with its own embedded AS. The sibling mcp-gateway-direct
# (virtualmcpserver-direct.yaml) aggregates the SAME group anonymously for the
# API-key gateway route, the no-auth internal route, and in-cluster agents (Hermes).
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway
spec:
  groupRef:
    name: mcp-tools
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  embeddingServerRef:
    name: mcp-tools-embedding
  # Embedded OAuth2/OIDC authorization server: kanidm has no Dynamic Client
  # Registration, but MCP clients like Claude Code / claude.ai REQUIRE DCR. This AS
  # exposes /oauth/* + /.well-known/* under the root issuer and brokers the actual
  # login upstream to kanidm (shared public PKCE client toolhive-mcp).
  authServerConfig:
    # Issuer = the public root URL of the aggregate. The AS advertises its
    # endpoints under it (…/oauth/authorize, …/token, …/register).
    issuer: https://mcp.wibrow.dev
    # Scopes every DCR-registered client may request. Keep narrow — unioned into
    # ALL dynamically-registered clients' scope sets (RFC 7591 §3.2.1), so each
    # entry here is requestable at /oauth/authorize by every DCR client.
    #
    # offline_access is what makes the AS mint refresh tokens (fosite only
    # issues one when the granted scope includes it). Since operator v0.30 the
    # AS no longer strips offline_access from scopes_supported — instead
    # scopes_supported is derived verbatim from incomingAuth.oidcConfigRef
    # scopes, so offline_access MUST also be listed there or the AS hard-fails
    # to start ("baseline_client_scopes contains offline_access which is not in
    # scopes_supported"). Verified against v0.34.0 source.
    baselineClientScopes:
      - openid
      - offline_access
    # Token lifetimes. With offline_access grantable, clients get rotating
    # refresh tokens: each /oauth/token refresh mints a new refresh token valid
    # for refreshTokenLifespan, and the token endpoint also renews the DCR
    # client-registration TTL on every exchange — so an actively-used client
    # never re-auths. Re-auth only after 30 days of complete inactivity.
    #
    # Operator caps (v0.34.0): access 1m–24h, refresh 1h–720h. Longer values
    # fail validation and crashloop the vMCP on boot.
    tokenLifespans:
      accessTokenLifespan: 24h
      refreshTokenLifespan: 720h
    # Persistent signing (RS256) + HMAC material — shared with the per-server
    # ASes via externalsecret.yaml → Secret toolhive-authserver-secret. Without
    # these the AS auto-gens ephemeral keys and restarts invalidate tokens.
    signingKeySecretRefs:
      - name: toolhive-authserver-secret
        key: signing-key
    hmacSecretRefs:
      - name: toolhive-authserver-secret
        key: hmac
    # DCR registrations + auth codes + refresh tokens live in the shared
    # Dragonfly (dragonfly.yaml; keys are namespaced per server/issuer) so they
    # survive vMCP restarts.
    storage:
      type: redis
      redis:
        addr: toolhive-auth-dragonfly.ai:6379
        # Password-only AUTH (no ACL username) — Dragonfly requirepass. Same
        # Secret/key the Dragonfly CR sets via authentication.passwordFromSecret.
        aclUserConfig:
          passwordSecretRef:
            name: toolhive-authserver-secret
            key: redis-password
    upstreamProviders:
      # kanidm public PKCE client toolhive-mcp — no client secret. The AS
      # redirects users here to log in, then exchanges the code. redirectUri
      # defaults to {resourceUrl}/oauth/callback =
      # https://mcp.wibrow.dev/oauth/callback, which is registered on the
      # toolhive-mcp client in kanidm.
      - name: kanidm
        type: oidc
        oidcConfig:
          issuerUrl: https://idm.wibrow.dev/oauth2/openid/toolhive-mcp
          clientId: toolhive-mcp
          # offline_access here gets the AS a kanidm REFRESH token at login.
          # Without it, once the kanidm access token stored for the session
          # expires, the incoming-auth upstream-token enrichment fails refresh
          # and 401s EVERY request — even while the AS-issued token is still
          # valid. Requires offline_access in the toolhive-mcp client's kanidm
          # scope-map for the mcp-tools group (kanidm rejects unmapped scopes
          # at authorize).
          scopes:
            - openid
            - profile
            - email
            - groups
            - offline_access
  incomingAuth:
    type: oidc
    # Validate the tokens the embedded AS itself issues (issuer/audience match
    # the AS, NOT kanidm — the AS mints aud = resourceUrl per RFC 8707).
    # TRAILING SLASH IS LOAD-BEARING: resourceUrl becomes the AS's only
    # AllowedAudiences entry and the token endpoint EXACT-matches the client's
    # RFC 8707 `resource` param against it. claude.ai normalizes the root
    # origin to "https://mcp.wibrow.dev/" and got invalid_target on the
    # slash-less form (browser flow succeeded, token exchange 400'd, no log —
    # rejection logs at debug only). Spec-conformant clients echo the
    # protected-resource metadata's `resource` field, so they follow the
    # slashed form automatically. The AS issuer stays slash-less (RFC 8414
    # pattern forbids a trailing slash); the upstream callback is unaffected
    # (defaultRedirectURI TrimRights the slash).
    oidcConfigRef:
      name: mcp-gateway-oidc
      audience: https://mcp.wibrow.dev/
      resourceUrl: https://mcp.wibrow.dev/
      # These scopes are NOT enforced on incoming tokens — they feed two
      # advertisements: the AS's scopes_supported (openid-configuration; the
      # operator derives it from this list verbatim) and the RFC 9728
      # protected-resource metadata clients read to decide what to request.
      # offline_access must be listed here for DCR to accept it and for the
      # baselineClientScopes subset check to pass at AS startup.
      scopes:
        - openid
        - profile
        - email
        - groups
        - offline_access
    # No authzConfig: since operator 0.40.x, Cedar authz and the optimizer
    # (embeddingServerRef → find_tool/call_tool) are mutually exclusive — the
    # vMCP refuses to start with both. The old policy here was an allow-all
    # no-op anyway; group gating happens at kanidm, whose toolhive-mcp
    # scope-map is restricted to the mcp-tools group, so non-members get
    # access_denied at the IdP and any valid token is already authorized.
  # The mcp-agg backends declare no externalAuthConfigRef, so discovery resolves
  # them as unauthenticated — exactly what the agg tier is. (The CRD enum for
  # outgoingAuth.default.type is only [discovered, externalAuthConfigRef]; there
  # is no explicit "unauthenticated".)
  outgoingAuth:
    source: discovered
  # The AS's upstream OIDC discovery client blocks private IPs by default (SSRF
  # guard), but kanidm (idm.wibrow.dev) resolves to the envoy-external LB
  # (private 10.20.10.x) in-cluster — same issue and fix as the per-server
  # proxies (resourceOverrides.proxyDeployment.env there). The vMCP CRD has no
  # resourceOverrides env hook, but podTemplateSpec merges into the operator's
  # deployment; the container is named "vmcp" (verified live). Acceptable:
  # kanidm is a trusted internal IdP.
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          env:
            - name: INSECURE_DISABLE_URL_VALIDATION
              value: "true"
            # Surface embedded-AS request/error detail (DCR, authorize, token
            # exchange) — INFO logs show nothing for the OAuth endpoints.
            - name: TOOLHIVE_DEBUG
              value: "true"
