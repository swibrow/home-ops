# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
# Kubernetes MCP backend (the "mkp" server). Unauthenticated and in-cluster only —
# auth is enforced at the vMCP edge (OAuth on mcp-gateway, API key at the gateway on
# mcp-gateway-direct) and ingress is locked to the two vMCP pods by networkpolicy.yaml.
# That lock matters: the workload runs as the cluster-view ServiceAccount below.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: kubernetes
spec:
  image: ghcr.io/stackloklabs/mkp/server:0.4.2
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8080
  args:
    # Read-only; flip to true (and bind a writable role below) for write access.
    - --read-write=false
  serviceAccount: toolhive-kubernetes
  groupRef:
    name: mcp-tools
  # krr: kubernetes/toolhive
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: toolhive-kubernetes
  namespace: ai
---
# Read-only cluster access for the Kubernetes MCP server. To allow apply_resource,
# bind a writable role (e.g. edit) and set --read-write=true above.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: toolhive-kubernetes-view
subjects:
  - kind: ServiceAccount
    name: toolhive-kubernetes
    namespace: ai
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
