---
# Publishes skills into the registry's writable "managed" source via the admin
# API. Skills have no CRD and the deployed registry-api rejects a skills-only
# file source, so this ArgoCD PostSync hook (re)publishes on every sync. POST is
# idempotent for a given version — an already-published version returns 409,
# which the script treats as success.
apiVersion: batch/v1
kind: Job
metadata:
  name: toolhive-skill-publish
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: publish
          image: docker.io/curlimages/curl:8.21.0
          command:
            - sh
            - -c
            - |
              set -eu
              API="http://toolhive-registry-api.ai:8080"
              # Wait for the registry API to be ready.
              for i in $(seq 1 30); do
                curl -sf -o /dev/null "$API/v1/registries/default" && break
                echo "waiting for registry-api ($i)..."; sleep 5
              done
              code=$(curl -s -o /tmp/resp -w '%{http_code}' \
                -X POST "$API/v1/entries" \
                -H 'Content-Type: application/json' \
                --data @/payload/skill-pr.json)
              echo "publish HTTP $code"; cat /tmp/resp; echo
              case "$code" in
                2*|409) echo "ok"; exit 0 ;;
                *) echo "publish failed"; exit 1 ;;
              esac
          volumeMounts:
            - name: payload
              mountPath: /payload
              readOnly: true
      volumes:
        - name: payload
          configMap:
            name: toolhive-skill-payload
