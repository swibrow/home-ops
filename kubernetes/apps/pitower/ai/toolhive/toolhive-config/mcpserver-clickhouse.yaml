---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
# ClickHouse MCP backend, pointed at Rybbit's analytics ClickHouse. Read-only by
# design — the server only exposes list_databases/list_tables/run_select_query.
# Unauthenticated and in-cluster only; auth is enforced at the vMCP edge and
# ingress is locked to the two vMCP pods (networkpolicy.yaml). stdio image, so the
# ToolHive proxy fronts it on 8080 (same pattern as the github backend).
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: clickhouse
spec:
  image: ghcr.io/stacklok/dockyard/uvx/mcp-clickhouse:0.2.0
  transport: stdio
  proxyPort: 8080
  groupRef:
    name: mcp-tools
  env:
    - name: CLICKHOUSE_HOST
      value: rybbit-clickhouse.analytics.svc.cluster.local
    - name: CLICKHOUSE_USER
      value: default
    # In-cluster plaintext HTTP on :8123 — Rybbit's ClickHouse isn't TLS-fronted,
    # so disable the secure (8443/HTTPS) default.
    - name: CLICKHOUSE_PORT
      value: "8123"
    - name: CLICKHOUSE_SECURE
      value: "false"
  # CLICKHOUSE_PASSWORD reuses Rybbit's Infisical secret (see externalsecret.yaml).
  secrets:
    - name: toolhive-clickhouse
      key: CLICKHOUSE_PASSWORD
      targetEnvName: CLICKHOUSE_PASSWORD
  # krr: clickhouse/toolhive
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
