---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
# GitHub MCP backend, authenticated as a GITHUB APP.
# Self-hosted container, NOT the hosted api.githubcopilot.com endpoint: the
# hosted server rejects App installation tokens (ghs_) with 400 "Authorization
# header is badly formatted" (github/github-mcp-server#696) and the server has
# no native App auth in any form (#311/#1333, still true at v1.3.0). So we mint
# installation tokens OUTSIDE the server (ESO GithubAccessToken generator →
# Secret toolhive-github, generator-github.yaml) and feed them in as if they
# were a PAT — the server just forwards the value as a bearer to api.github.com,
# which accepts ghs_ tokens fine.
#
# Token lifecycle: installation tokens live 60 min and the server only reads
# the env var at startup, so cronjob-github-token.yaml rolling-restarts this
# StatefulSet every 30 min (ESO refreshes the Secret every 20 min; worst-case
# in-pod token age 20+30=50 min). Restart is the only option: the operator
# doesn't propagate annotations to the StatefulSet, so Reloader can't see it.
#
# `context` toolset deliberately excluded: its get_me needs a user identity,
# which server-to-server installation tokens don't have.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: github
spec:
  image: ghcr.io/github/github-mcp-server:v1.6.0
  transport: stdio
  proxyPort: 8080
  groupRef:
    name: mcp-tools
  env:
    - name: GITHUB_TOOLSETS
      value: repos,issues,pull_requests,actions,labels
  secrets:
    - name: toolhive-github
      key: token
      targetEnvName: GITHUB_PERSONAL_ACCESS_TOKEN
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
