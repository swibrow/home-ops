---
# Resource-server validation for the mcp-gateway vMCP, which runs its OWN embedded
# auth server (virtualmcpserver.yaml spec.authServerConfig). The vMCP validates
# incoming bearer tokens against the embedded AS's JWKS — so the issuer here MUST
# match authServerConfig.issuer (the AS root), NOT kanidm. mcp.wibrow.dev hairpins to
# the envoy-external LB (private 10.20.10.239) in-cluster, so JWKS/discovery fetches
# need the private-IP allowances.
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpoidcconfig_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  # Renamed from vmcp-authserver-oidc: the original was stamped with a
  # deletionTimestamp by the old toolhive-config app's prune during the nest
  # migration, but stayed referenced by mcp-gateway so the operator finalizer
  # (correctly) blocked deletion → wedged "Terminating" forever. Renaming points the
  # vMCP at a fresh object and lets the old one finalize cleanly. Spec is unchanged.
  name: mcp-gateway-oidc
spec:
  type: inline
  inline:
    issuer: https://mcp.wibrow.dev
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
---
# Resource-server validation for the mcp-gateway-secrets vMCP (its own embedded AS).
# Issuer MUST match that vMCP's authServerConfig.issuer. mcp-secrets.wibrow.dev hairpins
# to the envoy-external LB (private) in-cluster, so JWKS/discovery need the private-IP
# allowances — same as mcp-gateway-oidc above.
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpoidcconfig_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: mcp-gateway-secrets-oidc
spec:
  type: inline
  inline:
    issuer: https://mcp-secrets.wibrow.dev
    jwksAllowPrivateIP: true
    protectedResourceAllowPrivateIP: true
