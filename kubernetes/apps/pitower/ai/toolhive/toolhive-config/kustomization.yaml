---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai

# Wave 1: the MCP CRs reconcile after the operator + CRDs (toolhive-operator, wave 0).
commonAnnotations:
  argocd.argoproj.io/sync-wave: "1"

resources:
  - mcpgroup.yaml
  - embeddingserver.yaml
  - dragonfly.yaml
  - mcpoidcconfig.yaml
  - virtualmcpserver.yaml
  - virtualmcpserver-direct.yaml
  - httproute.yaml
  - securitypolicy.yaml
  - externalsecret.yaml
  - mcpserver-kubernetes.yaml
  - mcpserver-grafana.yaml
  - mcpserver-home-assistant.yaml
  - mcpserver-argocd.yaml
  - mcpserver-aws-api.yaml
  - mcpserver-github.yaml
  - mcpserver-clickhouse.yaml
  - mcpserver-terraform.yaml
  - mcpserver-context7.yaml
  - mcpserver-database-toolbox.yaml
  - mcpserver-infisical.yaml
  - generator-github.yaml
  - cronjob-github-token.yaml
  - networkpolicy.yaml
  - mcpregistry.yaml
  - skill-publish-job.yaml
components:
  # One extra ../ vs the old ai/toolhive-config location — this now lives one level
  # deeper at ai/toolhive/toolhive-config.
  - ../../../../../components/cnpg-db
configMapGenerator:
  # Generates the toolhive-registry-db-secrets Secret (DB_HOST/PORT/USER/PASS/NAME)
  # from the CNPG-managed toolhive-registry-app secret, consumed by the MCPRegistry.
  - name: cnpg-db-config
    literals:
      - APP_NAME=toolhive-registry
      - SECRET_NAME=toolhive-registry-db-secrets
      - CNPG_SECRET_KEY=toolhive-registry-app
  # Skill publish payload (POST body) for the toolhive-skill-publish hook Job.
  - name: toolhive-skill-payload
    files:
      - skill-pr.json
generatorOptions:
  disableNameSuffixHash: true
