---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai

# Wave 1: the MCP CRs reconcile after the operator + CRDs (toolhive-operator, wave 0).
commonAnnotations:
  argocd.argoproj.io/sync-wave: "1"

resources:
  - mcpgroup.yaml
  - embeddingserver.yaml
  - dragonfly.yaml
  - mcpoidcconfig.yaml
  - virtualmcpserver.yaml
  - virtualmcpserver-direct.yaml
  - httproute.yaml
  - securitypolicy.yaml
  - externalsecret.yaml
  - mcpserver-kubernetes.yaml
  - mcpserver-grafana.yaml
  - mcpserver-home-assistant.yaml
  - mcpserver-argocd.yaml
  - mcpserver-aws-api.yaml
  - mcpserver-github.yaml
  - mcpserver-terraform.yaml
  - mcpserver-context7.yaml
  - mcpserver-database-toolbox.yaml
  - generator-github.yaml
  - cronjob-github-token.yaml
  - networkpolicy.yaml
