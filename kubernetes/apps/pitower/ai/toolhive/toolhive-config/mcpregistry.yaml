---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpregistry_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPRegistry
metadata:
  name: toolhive-registry
spec:
  displayName: Pitower MCP Registry
  # The operator renders configYAML into a ConfigMap mounted at /config/config.yaml
  # in the registry-api container and creates a Service named "<name>-api" on :8080
  # (here: toolhive-registry-api). The kubernetes source auto-discovers MCPServer
  # CRs in the listed namespaces, but ONLY those annotated
  # toolhive.stacklok.dev/registry-export: "true" (see mcpserver-*.yaml).
  configYAML: |
    sources:
      - name: cluster
        kubernetes:
          namespaces:
            - ai
      # Writable in-DB source for entries the kubernetes source can't express
      # (skills have no CRD). A file source can't carry skills here: the deployed
      # registry-api (v1.4.x) rejects a skills-only file with "must contain at
      # least one server", so skills are published into this managed source via
      # the admin API (POST /v1/entries) by the skill-publish PostSync hook Job.
      - name: managed
        managed: {}
    registries:
      - name: default
        sources:
          - cluster
          - managed
    auth:
      mode: anonymous
    database:
      host: toolhive-registry-rw.cloudnative-pg.svc.cluster.local
      port: 5432
      user: toolhive_registry
      database: toolhive_registry
      sslMode: disable
  # registry-api has no in-memory mode; Postgres is mandatory. The DB password is
  # injected via env (Viper THV_REGISTRY_* AutomaticEnv) from the CNPG-derived
  # secret rather than inlined in the ConfigMap configYAML above.
  podTemplateSpec:
    spec:
      containers:
        - name: registry-api
          env:
            - name: THV_REGISTRY_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: toolhive-registry-db-secrets
                  key: DB_PASS
