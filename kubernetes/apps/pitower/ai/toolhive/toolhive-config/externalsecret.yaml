---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-secret
    creationPolicy: Owner
  data:
    - secretKey: HA_TOKEN
      remoteRef:
        key: /ai/toolhive/HA_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# Grafana basic-auth creds. MCPServer.spec.secrets is keyed by secret name
# (x-kubernetes-list-map-keys: [name]), so each env var must come from its own
# Secret — hence two separate targets rather than two keys in one Secret.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-grafana-user
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-grafana-user
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_USERNAME
      remoteRef:
        key: /monitoring/grafana/admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-grafana-pass
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-grafana-pass
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_PASSWORD
      remoteRef:
        key: /monitoring/grafana/admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-argocd
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-argocd
    creationPolicy: Owner
  data:
    - secretKey: ARGOCD_API_TOKEN
      remoteRef:
        key: /ai/toolhive/ARGOCD_API_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# GitHub App private key (PEM) for the GithubAccessToken generator
# (generator-github.yaml). The only long-lived GitHub credential in the
# cluster — everything else is 60-min installation tokens minted from it.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-github-app
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-github-app
    creationPolicy: Owner
  data:
    - secretKey: private-key
      remoteRef:
        key: /ai/toolhive/GITHUB_APP_PRIVATE_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# Short-lived GitHub App installation token for github-agg, minted by the
# GithubAccessToken generator (no secretStoreRef — the generator IS the
# source). Produces key `token` (a ghs_ value, max age 60 min). The 20m
# refresh pairs with the 30m restart CronJob: worst-case token age inside the
# pod is 20+30=50 min. Don't raise either number without redoing that math.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-github
spec:
  refreshInterval: 20m
  target:
    name: toolhive-github
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: github-mcp
---
# Signing (RS256 PEM) + HMAC material for the embedded OAuth authorization server
# (mcpexternalauthconfig.yaml). Both land in one Secret as separate keys, referenced
# by signingKeySecretRefs / hmacSecretRefs. Populate the two Infisical paths below.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-authserver
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-authserver-secret
    creationPolicy: Owner
  data:
    - secretKey: signing-key
      remoteRef:
        key: /ai/toolhive/AUTHSERVER_SIGNING_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: hmac
      remoteRef:
        key: /ai/toolhive/AUTHSERVER_HMAC
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # Dragonfly AUTH password — referenced by both the Dragonfly CR
    # (authentication.passwordFromSecret) and the AS storage (aclUserConfig).
    - secretKey: redis-password
      remoteRef:
        key: /ai/toolhive/AUTHSERVER_REDIS_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# API key(s) for the Envoy apiKeyAuth SecurityPolicy on the mcp-api.wibrow.dev route
# (securitypolicy.yaml). EG treats each Secret data key as a client id and its value
# as the API key (no Bearer prefix). One client "claude" for now; add more secretKeys
# (each its own Infisical path) to issue additional keys.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-mcp-apikeys
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-mcp-apikeys
    creationPolicy: Owner
  data:
    - secretKey: claude
      remoteRef:
        key: /ai/toolhive/MCP_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
