# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
# Grafana MCP backend. Unauthenticated, in-cluster only, ingress locked to the two
# vMCP pods (networkpolicy.yaml); auth is enforced at the vMCP edge.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: grafana
spec:
  image: docker.io/grafana/mcp-grafana:0.17.2
  transport: sse
  proxyPort: 8080
  mcpPort: 8000
  args:
    - -t
    - sse
  groupRef:
    name: mcp-tools
  env:
    - name: GRAFANA_URL
      value: http://grafana-service.monitoring.svc.cluster.local:3000
  # Reuses the ExternalSecret-managed Secrets from externalsecret.yaml.
  secrets:
    - name: toolhive-grafana-user
      key: GRAFANA_USERNAME
      targetEnvName: GRAFANA_USERNAME
    - name: toolhive-grafana-pass
      key: GRAFANA_PASSWORD
      targetEnvName: GRAFANA_PASSWORD
  # krr: grafana/toolhive
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
