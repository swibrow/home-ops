---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/virtualmcpserver_v1beta1.json
# Dedicated OAuth MCP gateway at https://mcp-secrets.wibrow.dev for the isolated
# mcp-secrets group (currently: infisical). A clone of the mcp-gateway vMCP
# (virtualmcpserver.yaml) — same embedded AS pattern, kanidm upstream, shared signing/
# HMAC/Dragonfly material — but a DIFFERENT group and issuer. There is intentionally NO
# anonymous sibling, so the secrets backend can only be reached through this OAuth edge.
# See virtualmcpserver.yaml for the full rationale behind each authServerConfig knob.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-secrets
spec:
  groupRef:
    name: mcp-secrets
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  embeddingServerRef:
    name: mcp-tools-embedding
  authServerConfig:
    issuer: https://mcp-secrets.wibrow.dev
    # offline_access → rotating refresh tokens = no re-auth while actively used.
    # Must also appear in incomingAuth scopes below (feeds scopes_supported).
    # See virtualmcpserver.yaml for the full rationale.
    baselineClientScopes:
      - openid
      - offline_access
    # Operator caps: access 24h, refresh 720h (see virtualmcpserver.yaml).
    tokenLifespans:
      accessTokenLifespan: 24h
      refreshTokenLifespan: 720h
    # Shared signing/HMAC material with the other ASes.
    signingKeySecretRefs:
      - name: toolhive-authserver-secret
        key: signing-key
    hmacSecretRefs:
      - name: toolhive-authserver-secret
        key: hmac
    # Shared Dragonfly; DCR clients/codes/tokens are namespaced per issuer, so this
    # issuer's registrations don't collide with mcp-gateway's.
    storage:
      type: redis
      redis:
        addr: toolhive-auth-dragonfly.ai:6379
        aclUserConfig:
          passwordSecretRef:
            name: toolhive-authserver-secret
            key: redis-password
    upstreamProviders:
      # Reuses the kanidm public PKCE client toolhive-mcp. Its redirectUri here is
      # {resourceUrl}/oauth/callback = https://mcp-secrets.wibrow.dev/oauth/callback,
      # which MUST be added to the toolhive-mcp client's redirect URIs in kanidm. For
      # tighter least-privilege, swap this for a DEDICATED kanidm client whose scope-map
      # is restricted to an admin group (then only admins can reach the secrets gateway).
      - name: kanidm
        type: oidc
        oidcConfig:
          issuerUrl: https://idm.wibrow.dev/oauth2/openid/toolhive-mcp
          clientId: toolhive-mcp
          # offline_access: kanidm refresh token for the upstream session, else
          # enrichment 401s once the kanidm access token expires (see
          # virtualmcpserver.yaml).
          scopes:
            - openid
            - profile
            - email
            - groups
            - offline_access
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: mcp-gateway-secrets-oidc
      # Trailing slash is load-bearing (RFC 8707 resource match) — see virtualmcpserver.yaml.
      audience: https://mcp-secrets.wibrow.dev/
      resourceUrl: https://mcp-secrets.wibrow.dev/
      # Advertised, not enforced — becomes the AS's scopes_supported; must
      # include offline_access (see virtualmcpserver.yaml).
      scopes:
        - openid
        - profile
        - email
        - groups
        - offline_access
    # Group gating happens at the kanidm scope-map; Cedar just allows authenticated calls.
    authzConfig:
      type: inline
      inline:
        policies:
          - 'permit(principal, action, resource);'
  outgoingAuth:
    source: discovered
  # INSECURE_DISABLE_URL_VALIDATION: kanidm hairpins to a private LB IP in-cluster (same
  # as mcp-gateway). Container is named "vmcp".
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          env:
            - name: INSECURE_DISABLE_URL_VALIDATION
              value: "true"
