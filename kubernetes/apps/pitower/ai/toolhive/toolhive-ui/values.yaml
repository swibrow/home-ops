# OIDC login is handled by Better Auth against kanidm. kanidm has no declarative
# client support here, so the confidential client is created imperatively:
#   kanidm system oauth2 create toolhive-ui "ToolHive UI" https://toolhive.wibrow.dev
#   kanidm system oauth2 add-redirect-url toolhive-ui https://toolhive.wibrow.dev/api/auth/oauth2/callback/oidc
#   kanidm system oauth2 update-scope-map toolhive-ui app_access openid email profile
#   kanidm system oauth2 show-basic-secret toolhive-ui  # -> Infisical /ai/toolhive-ui/OIDC_CLIENT_SECRET
# Only members of the app_access group can log in. BETTER_AUTH_SECRET is a separate
# random token (openssl rand -base64 32) in Infisical /ai/toolhive-ui/BETTER_AUTH_SECRET.
controllers:
  toolhive-ui:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/stacklok/toolhive-cloud-ui
          tag: v0.6.1
        env:
          NODE_ENV: production
          # Registry-api Service created by the MCPRegistry "toolhive-registry"
          # (operator names it "<registry>-api" on :8080).
          API_BASE_URL: http://toolhive-registry-api.ai.svc.cluster.local:8080
          # Public base URL; Better Auth derives the OIDC redirect from this as
          # ${BETTER_AUTH_URL}/api/auth/oauth2/callback/oidc. Own host, decoupled
          # from mcp.wibrow.dev so the UI never shadows MCP/OAuth paths there
          # (the old Accept-header split silently 404'd missed AS endpoints).
          BETTER_AUTH_URL: https://toolhive.wibrow.dev
          # kanidm per-client issuer (bare host 404s); discovery appends
          # /.well-known/openid-configuration
          OIDC_ISSUER_URL: https://idm.wibrow.dev/oauth2/openid/toolhive-ui
          OIDC_CLIENT_ID: toolhive-ui
          # Drop offline_access (refresh tokens) for v1 — add it back here and to the
          # kanidm scope-map once basic login works, if longer sessions are wanted.
          OIDC_SCOPES: openid,email,profile
        # OIDC_CLIENT_SECRET + BETTER_AUTH_SECRET
        envFrom:
          - secretRef:
              name: toolhive-ui-secret
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  app:
    controller: toolhive-ui
    ports:
      http:
        port: 3000

route:
  app:
    enabled: true
    hostnames:
      - toolhive.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https
