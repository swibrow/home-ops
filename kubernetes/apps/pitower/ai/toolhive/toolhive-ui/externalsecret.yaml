---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-ui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: toolhive-ui-secret
    creationPolicy: Owner
  data:
    # kanidm OAuth2 confidential client secret (kanidm system oauth2 show-basic-secret toolhive-ui)
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: /ai/toolhive-ui/OIDC_CLIENT_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # Better Auth token-encryption secret (openssl rand -base64 32)
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: /ai/toolhive-ui/BETTER_AUTH_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
