---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai

# Wave 0: CRDs + operator install ahead of the MCP CRs (toolhive-config, wave 1)
# in the single combined ArgoCD sync.
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"

helmCharts:
  - name: toolhive-operator-crds
    repo: oci://ghcr.io/stacklok/toolhive
    version: 0.31.0
    releaseName: toolhive-operator-crds
    namespace: ai
  - name: toolhive-operator
    repo: oci://ghcr.io/stacklok/toolhive
    version: 0.32.0
    releaseName: toolhive-operator
    namespace: ai
    valuesFile: values.yaml
