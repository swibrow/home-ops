---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "mode": "local",
        "bind": "lan",
        "trustedProxies": ["10.244.0.0/16", "10.96.0.0/12"],
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "dangerouslyDisableDeviceAuth": true
        },
        "tailscale": {
          "mode": "off"
        }
      },
      "models": {
        "providers": {
          "anthropic": {
            "baseUrl": "https://api.anthropic.com",
            "apiKey": "ANTHROPIC_API_KEY",
            "api": "anthropic-messages",
            "models": [
              {
                "id": "claude-opus-4-20250514",
                "name": "Claude Opus 4",
                "reasoning": true,
                "input": ["text", "image"],
                "contextWindow": 200000,
                "maxTokens": 32000
              },
              {
                "id": "claude-sonnet-4-20250514",
                "name": "Claude Sonnet 4",
                "reasoning": true,
                "input": ["text", "image"],
                "contextWindow": 200000,
                "maxTokens": 32000
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "anthropic/claude-sonnet-4-20250514",
            "fallbacks": ["anthropic/claude-opus-4-20250514"]
          },
          "userTimezone": "Europe/Zurich",
          "timeoutSeconds": 600,
          "maxConcurrent": 3,
          "thinkingDefault": "low",
          "contextPruning": {
            "mode": "cache-ttl",
            "ttl": "1h",
            "keepLastAssistants": 3
          }
        }
      },
      "session": {
        "scope": "per-sender",
        "store": "/home/node/.openclaw/sessions",
        "reset": {
          "mode": "idle",
          "idleMinutes": 60
        },
        "maintenance": {
          "mode": "enforce",
          "pruneAfter": "30d",
          "maxEntries": 500,
          "rotateBytes": "10mb",
          "maxDiskBytes": "2gb"
        }
      },
      "tools": {
        "profile": "full",
        "web": {
          "search": { "enabled": true, "provider": "duckduckgo" },
          "fetch": { "enabled": true }
        }
      },
      "browser": {
        "enabled": false
      },
      "cron": {
        "enabled": true,
        "maxConcurrentRuns": 2,
        "sessionRetention": "24h"
      },
      "logging": {
        "level": "info",
        "consoleLevel": "info",
        "consoleStyle": "compact",
        "redactSensitive": "tools"
      }
    }
