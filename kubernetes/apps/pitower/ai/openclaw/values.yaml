controllers:
  openclaw:
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      install-proxy:
        image:
          repository: node
          tag: 24-slim
        command: ["/bin/sh"]
        args:
          - "-c"
          - |
            export NPM_CONFIG_PREFIX=/opt/proxy
            npm install -g claude-max-api-proxy@1.0.0 @anthropic-ai/claude-code@2.1.83
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 1Gi
    containers:
      app:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: 2026.4.5
        command: ["/bin/sh"]
        args:
          - "-c"
          - |
            exec node dist/index.js gateway --bind lan --allow-unconfigured
        env:
          TZ: Europe/Zurich
          OPENAI_BASE_URL: http://localhost:3456/v1
        envFrom:
          - secretRef:
              name: openclaw-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: &port 18789
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *port
              periodSeconds: 10
              failureThreshold: 3
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: *port
              periodSeconds: 30
              failureThreshold: 5
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 4Gi
      claude-max-api:
        image:
          repository: node
          tag: 24-slim
        command: ["/bin/sh"]
        args:
          - "-c"
          - |
            export NPM_CONFIG_PREFIX=/opt/proxy
            export PATH=/opt/proxy/bin:$PATH
            exec node /opt/proxy/lib/node_modules/claude-max-api-proxy/dist/server/standalone.js
        env:
          HOME: /home/node
          CLAUDE_CONFIG_DIR: /tmp/.claude
        envFrom:
          - secretRef:
              name: openclaw-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["node", "-e", "require('http').get('http://127.0.0.1:3456/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["node", "-e", "require('http').get('http://127.0.0.1:3456/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
              periodSeconds: 10
              failureThreshold: 3
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["node", "-e", "require('http').get('http://127.0.0.1:3456/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
              periodSeconds: 30
              failureThreshold: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

service:
  app:
    controller: openclaw
    ports:
      http:
        appProtocol: kubernetes.io/ws
        port: *port

route:
  app:
    enabled: true
    hostnames:
      - openclaw.pitower.link
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https

persistence:
  data:
    existingClaim: openclaw-data
    globalMounts:
      - path: /home/node/.openclaw
  proxy-install:
    type: emptyDir
    advancedMounts:
      openclaw:
        install-proxy:
          - path: /opt/proxy
        claude-max-api:
          - path: /opt/proxy
            readOnly: true
  npm-cache:
    type: emptyDir
    advancedMounts:
      openclaw:
        install-proxy:
          - path: /home/node/.npm
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
