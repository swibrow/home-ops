controllers:
  openclaw:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: 2026.4.14
        env:
          TZ: Europe/Zurich
        envFrom:
          - secretRef:
              name: openclaw-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: &port 18789
              initialDelaySeconds: 15
              periodSeconds: 10
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *port
              periodSeconds: 10
              failureThreshold: 3
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: *port
              periodSeconds: 30
              failureThreshold: 5
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 4Gi

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

service:
  app:
    controller: openclaw
    ports:
      http:
        appProtocol: kubernetes.io/ws
        port: *port

route:
  app:
    enabled: true
    hostnames:
      - openclaw.pitower.link
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https

persistence:
  data:
    existingClaim: openclaw-data
    globalMounts:
      - path: /home/node/.openclaw
  config:
    type: configMap
    name: openclaw-config
    globalMounts:
      - path: /home/node/.openclaw/openclaw.json
        subPath: openclaw.json
        readOnly: true
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
