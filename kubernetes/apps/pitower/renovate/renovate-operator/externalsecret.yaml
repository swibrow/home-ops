---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate
  namespace: renovate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: renovate-secret
    creationPolicy: Owner
  # Credentials for a dedicated "Renovate" GitHub App. The operator reads these
  # keys (via githubAppReference on the RenovateJob), mints an installation
  # access token, and injects it as RENOVATE_TOKEN into the renovate container.
  data:
    - secretKey: app_id
      remoteRef:
        key: /renovate/github-app/app_id
    - secretKey: installation_id
      remoteRef:
        key: /renovate/github-app/installation_id
    - secretKey: private_key
      remoteRef:
        key: /renovate/github-app/private_key
