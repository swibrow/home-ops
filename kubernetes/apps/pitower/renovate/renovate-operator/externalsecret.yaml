---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate
  namespace: renovate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: renovate-secret
    creationPolicy: Owner
  # Credentials for a dedicated "Renovate" GitHub App. The operator reads these
  # keys (via githubAppReference on the RenovateJob), mints an installation
  # access token, and injects it as RENOVATE_TOKEN into the renovate container.
  data:
    - secretKey: app_id
      remoteRef:
        key: /renovate/github-app/app_id
    - secretKey: installation_id
      remoteRef:
        key: /renovate/github-app/installation_id
    - secretKey: private_key
      remoteRef:
        key: /renovate/github-app/private_key
    # Shared secret for the GitHub webhook. The operator validates inbound
    # deliveries by recomputing HMAC-SHA256(body, token) and comparing to
    # GitHub's X-Hub-Signature-256 header — so this value goes in the GitHub
    # webhook "Secret" field, not an Authorization header.
    - secretKey: webhook_token
      remoteRef:
        key: /renovate/github-app/webhook_token
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-host-rules
  namespace: renovate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: renovate-host-rules
    creationPolicy: Owner
    # Render PATs into a single RENOVATE_HOST_RULES env var (injected via the
    # RenovateJob's extraEnvFrom): docker.io so lookups don't hit the anonymous
    # pull-rate limit (429 → external-host-error aborts the whole run), and
    # ghcr.io because Renovate's auto-provisioned host rule only works with a
    # platform PAT — the GitHub App installation token (RENOVATE_TOKEN) this
    # operator mints can't authenticate to GitHub Packages at all, so private
    # ghcr.io/swibrow/* lookups silently return no-result without this. Reuses
    # the same ghcr PAT as ghcr-pull-secret (apps/pitower/security).
    template:
      engineVersion: v2
      data:
        RENOVATE_HOST_RULES: >-
          [{"hostType":"docker","matchHost":"docker.io","username":"{{ .dockerhubUsername }}","password":"{{ .dockerhubToken }}"},
          {"hostType":"docker","matchHost":"ghcr.io","username":"swibrow","password":"{{ .ghcrToken }}"}]
  data:
    - secretKey: dockerhubUsername
      remoteRef:
        key: /renovate/dockerhub/username
    - secretKey: dockerhubToken
      remoteRef:
        key: /renovate/dockerhub/token
    - secretKey: ghcrToken
      remoteRef:
        key: /security/ghcr/token
