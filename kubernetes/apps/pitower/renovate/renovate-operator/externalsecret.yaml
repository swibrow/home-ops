---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate
  namespace: renovate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: renovate-secret
    creationPolicy: Owner
  # Credentials for a dedicated "Renovate" GitHub App. The operator reads these
  # keys (via githubAppReference on the RenovateJob), mints an installation
  # access token, and injects it as RENOVATE_TOKEN into the renovate container.
  data:
    - secretKey: app_id
      remoteRef:
        key: /renovate/github-app/app_id
    - secretKey: installation_id
      remoteRef:
        key: /renovate/github-app/installation_id
    - secretKey: private_key
      remoteRef:
        key: /renovate/github-app/private_key
    # Shared secret for the GitHub webhook. The operator validates inbound
    # deliveries by recomputing HMAC-SHA256(body, token) and comparing to
    # GitHub's X-Hub-Signature-256 header — so this value goes in the GitHub
    # webhook "Secret" field, not an Authorization header.
    - secretKey: webhook_token
      remoteRef:
        key: /renovate/github-app/webhook_token
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-dockerhub
  namespace: renovate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: renovate-dockerhub
    creationPolicy: Owner
    # Render the Docker Hub PAT into a RENOVATE_HOST_RULES env var (injected via
    # the RenovateJob's extraEnvFrom) so docker.io lookups are authenticated and
    # don't hit Docker Hub's anonymous pull-rate limit (429 → external-host-error
    # aborts the whole run). Output secret holds only RENOVATE_HOST_RULES.
    template:
      engineVersion: v2
      data:
        RENOVATE_HOST_RULES: '[{"hostType":"docker","matchHost":"docker.io","username":"{{ .username }}","password":"{{ .token }}"}]'
  data:
    - secretKey: username
      remoteRef:
        key: /renovate/dockerhub/username
    - secretKey: token
      remoteRef:
        key: /renovate/dockerhub/token
