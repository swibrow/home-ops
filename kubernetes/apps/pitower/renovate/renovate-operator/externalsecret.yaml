---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate
  namespace: renovate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: renovate-secret
    creationPolicy: Owner
  data:
    # GitHub PAT (classic) with repo + workflow scope, or a fine-grained token
    # with Contents/PRs/Workflows read-write on the repos to be managed.
    # Consumed by the renovate container as the RENOVATE_TOKEN env var.
    - secretKey: RENOVATE_TOKEN
      remoteRef:
        key: /renovate/RENOVATE_TOKEN
