---
fullnameOverride: renovate-operator

# Render the RenovateJob CRD as a normal template resource (not a Helm hook),
# so kustomize helm inflation + ArgoCD can manage it. SkipDryRunOnMissingResource
# in the ApplicationSet lets the RenovateJob CR apply alongside the CRD.
crd:
  install: true
  mode: template

# Everything the operator manages (RenovateJobs, Jobs, secret) lives in this
# namespace, so scope RBAC to the release namespace instead of cluster-wide.
rbac:
  ownNamespaceOnly: true

config:
  # Managing all repos means ~one executor Job per repo per run. Garbage-collect
  # finished Jobs/pods after 1h (chart default -1 keeps them forever).
  deleteSuccessfulJobs: false
  jobTTLSecondsAfterFinished: 3600

logging:
  level: info
  format: json

# krr: renovate-operator/renovate-operator
resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    memory: 256Mi

# Internal-only web UI for inspecting renovate runs.
route:
  enabled: true
  hostnames:
    - renovate.wibrow.dev
  parentRefs:
    - name: envoy-internal
      namespace: networking
      sectionName: https

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
