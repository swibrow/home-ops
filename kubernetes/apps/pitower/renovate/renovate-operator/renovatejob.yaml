---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: github
  namespace: renovate
spec:
  # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
  image: ghcr.io/renovatebot/renovate:43.212.4
  schedule: "0 * * * *"
  parallelism: 3
  provider:
    name: github
  githubAppReference:
    secretName: renovate-secret
    appIdSecretKey: app_id
    installationIdSecretKey: installation_id
    pemSecretKey: private_key
  discoveryFilters:
    - swibrow/*
  extraEnv:
    - name: RENOVATE_AUTODISCOVER
      value: "true"
    - name: LOG_LEVEL
      value: info
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
