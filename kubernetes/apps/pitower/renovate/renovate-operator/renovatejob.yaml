---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: github
  namespace: renovate
spec:
  # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
  image: ghcr.io/renovatebot/renovate:43.253.1
  # Daily. The Dependency Dashboard (#1049) is only rewritten when a run
  # completes, so it can trail actual state by up to ~24h between runs; the
  # webhook gives instant response to dashboard checkbox clicks on top.
  schedule: "0 6 * * *"
  parallelism: 1
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
  provider:
    name: github
  githubAppReference:
    secretName: renovate-secret
    appIdSecretKey: app_id
    installationIdSecretKey: installation_id
    pemSecretKey: private_key
  discoveryFilters:
    - swibrow/*
  skipForks: true
  # GitHub PR/Issue events (e.g. Dependency Dashboard checkbox clicks) hit the
  # operator's webhook server and schedule an on-demand run for the repo,
  # instead of waiting for the twice-daily cron. Auth = HMAC: the operator
  # recomputes HMAC-SHA256(body, token) against GitHub's X-Hub-Signature-256.
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-secret
        key: webhook_token
  extraEnv:
    - name: RENOVATE_INHERIT_CONFIG
      value: "true"
    - name: RENOVATE_ONBOARDING
      value: "false"
    - name: RENOVATE_REQUIRE_CONFIG
      value: "optional"
  # Authenticate docker.io lookups so Docker Hub's anonymous pull-rate limit
  # (429) doesn't abort the run with external-host-error. RENOVATE_HOST_RULES
  # (JSON) is templated from the dockerhub PAT — see externalsecret.yaml.
  extraEnvFrom:
    - secretRef:
        name: renovate-dockerhub
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 4096Mi
