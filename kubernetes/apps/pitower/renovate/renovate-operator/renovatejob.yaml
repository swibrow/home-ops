---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: github
  namespace: renovate
spec:
  # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
  image: ghcr.io/renovatebot/renovate:43.212.4
  schedule: "0 * * * *"
  parallelism: 3
  provider:
    name: github
  githubAppReference:
    secretName: renovate-secret
    appIdSecretKey: app_id
    installationIdSecretKey: installation_id
    pemSecretKey: private_key
  # The operator handles discovery itself (discovery job runs `renovate
  # --autodiscover`; executor jobs run `renovate <repo>` scoped to one repo).
  # Do NOT set RENOVATE_AUTODISCOVER here — it makes the executor ignore its
  # positional repo arg and autodiscover/process every repo the App can see.
  discoveryFilters:
    - swibrow/home-ops
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
