defaultPodOptions:
  securityContext:
    fsGroup: 2000
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 2000
    runAsUser: 2000

controllers:
  bambuddy:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/maziggy/bambuddy
          tag: 0.2.4.7
        env:
          TZ: Europe/Zurich
          PORT: &httpPort 8000
        probes:
          liveness:
            enabled: true
            spec:
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *httpPort
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 10
        resources:
          requests:
            memory: 160Mi
            cpu: 10m
          limits:
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            add:
              - NET_BIND_SERVICE
            drop:
              - ALL

service:
  app:
    controller: bambuddy
    ports:
      http:
        appProtocol: kubernetes.io/ws
        port: *httpPort

route:
  app:
    hostnames:
      - bambuddy.wibrow.dev
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *httpPort

persistence:
  config:
    existingClaim: bambuddy
    advancedMounts:
      bambuddy:
        app:
          - path: /app/data
            subPath: data
  tmpfs:
    type: emptyDir
    advancedMounts:
      bambuddy:
        app:
          - path: /tmp
            subPath: tmp
          - path: /app/logs
            subPath: logs
