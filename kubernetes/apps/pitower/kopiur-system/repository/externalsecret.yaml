---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopiur-repository-secret
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: kopiur-repository-secret
    template:
      data:
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: /kopiur-system/repository/AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: /kopiur-system/repository/AWS_SECRET_ACCESS_KEY
    - secretKey: KOPIA_PASSWORD
      remoteRef:
        key: /kopiur-system/repository/KOPIA_PASSWORD
