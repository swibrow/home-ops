---
# Allow HTTPRoutes in app namespaces to use the KEDA HTTP interceptor proxy
# (in system) as a cross-namespace backendRef. Gateway API requires a
# ReferenceGrant in the target (Service) namespace for any cross-namespace
# reference. Add each app namespace that adopts KEDA HTTP scale-to-zero to the
# `from` list.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: keda-http-interceptor-from-apps
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: selfhosted
  to:
    - group: ""
      kind: Service
      name: keda-add-ons-http-interceptor-proxy
