spegel:
  containerdRegistryConfigPath: /etc/cri/conf.d/hosts

serviceMonitor:
  enabled: true

# Dashboard vendored + patched locally at apps/pitower/monitoring/grafana/dashboards/spegel.json
# (chart JSON points the pod/registry template variables at an unresolved ${DS_PROMETHEUS}
# export placeholder, so panels render blank). Keep this disabled to avoid a duplicate uid.
grafanaDashboard:
  enabled: false
