---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: selfhosted
resources:
  - dragonfly.yaml
configMapGenerator:
  - name: cryptgeon-brand
    options:
      disableNameSuffixHash: true
    files:
      - brand/logo.svg
      - brand/favicon.svg
helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: 5.0.1
    releaseName: cryptgeon
    namespace: selfhosted
    valuesFile: values.yaml
