---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: selfhosted
components:
  - ../../../../components/volsync
configMapGenerator:
  - name: volsync-config
    options:
      disableNameSuffixHash: true
    literals:
      - APP_NAME=cryptgeon
      - CLAIM_NAME=cryptgeon-valkey
      - SECRET_NAME=cryptgeon-volsync
      - STORAGE_SIZE=256Mi
      - RESTIC_REPO=s3:https://s3.eu-central-2.amazonaws.com/pitower-volsync-backups/selfhosted/cryptgeon
helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: 4.6.2
    releaseName: cryptgeon
    namespace: selfhosted
    valuesFile: values.yaml
