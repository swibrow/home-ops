controllers:
  rrda:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/swibrow/rrda
          tag: 1.4.1
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /127.0.0.1:53/example.com/A
                port: &port 8080
              initialDelaySeconds: 5
              periodSeconds: 30
              timeoutSeconds: 5
          readiness: *probes
        resources:
          requests:
            cpu: 10m
            memory: 6Mi
      dns-over-https:
        image:
          repository: docker.io/adguard/dnsproxy
          tag: v0.83.0
        args:
          - --listen=0.0.0.0
          - --port=53
          - --upstream=https://1.1.1.1/dns-query
          - --upstream=https://1.0.0.1/dns-query
          - --bootstrap=9.9.9.9:53

        resources:
          requests:
            cpu: 10m
            memory: 11Mi
service:
  app:
    controller: rrda
    ports:
      http:
        port: *port

route:
  app:
    enabled: true
    annotations:
      # rrda is a JSON DNS API with no root index (/ → 404). Probe a real
      # query so Gatus checks actual resolution instead of the bare host.
      gatus.home-operations.com/endpoint: |
        path: /127.0.0.1:53/example.com/a
        conditions:
          - "[STATUS] == 200"
          - "len([BODY].answer) > 0"
    hostnames:
      - rrda.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https
