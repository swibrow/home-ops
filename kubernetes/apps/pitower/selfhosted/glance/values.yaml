controllers:
  glance:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      glance:
        image:
          repository: docker.io/glanceapp/glance
          tag: v0.8.5@sha256:32ab73d80f2b8b5fb0735b0431deb36b93fbb6b2fb43592449b0178c8b83e350
        args:
          - --config
          - /config/glance.yml
        env:
          TZ: Europe/Zurich
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
        resources:
          requests:
            cpu: 10m
            memory: 100Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1022
    runAsGroup: 1022
    fsGroup: 1022
    fsGroupChangePolicy: OnRootMismatch
service:
  app:
    controller: glance
    ports:
      http:
        port: 8080
route:
  app:
    enabled: true
    hostnames:
      - glance.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https

persistence:
  config:
    type: configMap
    name: glance-config
