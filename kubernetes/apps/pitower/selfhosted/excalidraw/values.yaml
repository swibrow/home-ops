controllers:
  excalidraw:
    replicas: 1
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: docker.io/excalidraw/excalidraw
          tag: latest@sha256:3c2513e830bb6e195147c05b34ecf8393d0ba2b1cc86e93b407a5777d6135c6c
          pullPolicy: IfNotPresent
        # probes:
        #   liveness:
        #     enabled: true
        #   readiness:
        #     enabled: true
        # resources:
        #   requests:
        #     cpu: 5m
        #     memory: 10Mi
        # limits:
        #   memory: 512Mi
        resources:
          requests:
            cpu: 10m
            memory: 14Mi
service:
  app:
    controller: excalidraw
    ports:
      http:
        # The excalidraw nginx image serves on :80 and ignores the PORT env.
        port: 80

route:
  app:
    enabled: true
    hostnames:
      - draw.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https

persistence:
  data:
    enabled: true
    type: emptyDir
