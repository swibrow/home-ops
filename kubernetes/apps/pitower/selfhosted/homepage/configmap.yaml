---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: github.svg
              href: https://github.com/swibrow/home-ops
        - HackerNews:
            - icon: hacker-news.svg
              href: https://news.ycombinator.com
    - Media:
        - YouTube:
            - icon: youtube.svg
              href: https://youtube.com/feed/subscriptions
  docker.yaml: ""
  kubernetes.yaml: |
    mode: cluster
  services.yaml: |
    - Media:
        - Jellyfin:
            icon: jellyfin.svg
            href: https://jellyfin.wibrow.dev
            description: Media server
            widget:
              type: jellyfin
              url: http://jellyfin.media.svc.cluster.local:8096
              key: "{{HOMEPAGE_VAR_JELLYFIN_TOKEN}}"
              enableNowPlaying: true
        - Sonarr:
            icon: sonarr.svg
            href: https://sonarr.wibrow.dev
            description: TV shows
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local:8989
              key: "{{HOMEPAGE_VAR_SONARR_TOKEN}}"
        - Radarr:
            icon: radarr.svg
            href: https://radarr.wibrow.dev
            description: Movies
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local:7878
              key: "{{HOMEPAGE_VAR_RADARR_TOKEN}}"
        - Prowlarr:
            icon: prowlarr.svg
            href: https://prowlarr.wibrow.dev
            description: Indexer manager
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local:9696
              key: "{{HOMEPAGE_VAR_PROWLARR_TOKEN}}"
        - Autobrr:
            icon: autobrr.svg
            href: https://autobrr.wibrow.dev
            description: Torrent automation
        - qBittorrent:
            icon: qbittorrent.svg
            href: https://qbittorrent.wibrow.dev
            description: Torrent client
            widget:
              type: qbittorrent
              url: http://qbittorrent.media.svc.cluster.local:8080
        - SABnzbd:
            icon: sabnzbd.svg
            href: https://sabnzbd.wibrow.dev
            description: Usenet client
            widget:
              type: sabnzbd
              url: http://sabnzbd.media.svc.cluster.local:8080
              key: "{{HOMEPAGE_VAR_SABNZBD_TOKEN}}"
    - Home Automation:
        - Home Assistant:
            icon: home-assistant.svg
            href: https://ha.wibrow.dev
            description: Home automation
            widget:
              type: homeassistant
              url: https://ha.pitower.link
              key: "{{HOMEPAGE_VAR_HASS_TOKEN}}"
        - go2rtc:
            icon: mdi-video
            href: https://go2rtc.wibrow.dev
            description: Video streaming proxy
    - Banking:
        - Firefly III:
            icon: firefly.svg
            href: https://money.wibrow.dev
            description: Financial manager
        - Firefly Importer:
            icon: firefly.svg
            href: https://money-import.wibrow.dev
            description: Transaction importer
        - Ghostfolio:
            icon: ghostfolio.svg
            href: https://portfolio.wibrow.dev
            description: Portfolio tracker
        - Paperless:
            icon: paperless-ngx.svg
            href: https://paperless.wibrow.dev
            description: Document management
        - Paperless AI:
            icon: paperless-ngx.svg
            href: https://paperless-ai.wibrow.dev
            description: AI document processing
    - Selfhosted:
        - n8n:
            icon: n8n.svg
            href: https://n8n.wibrow.dev
            description: Workflow automation
        - Miniflux:
            icon: miniflux.svg
            href: https://miniflux.wibrow.dev
            description: RSS reader
        - Glance:
            icon: glance.svg
            href: https://glance.wibrow.dev
            description: Dashboard
        - Excalidraw:
            icon: excalidraw.svg
            href: https://draw.wibrow.dev
            description: Whiteboard
        - Cryptgeon:
            icon: mdi-lock-outline
            href: https://secrets.wibrow.dev
            description: Secret sharing
        - Sharkord:
            icon: mdi-music-note
            href: https://sharkord.wibrow.dev
            description: Music server
        - House Hunter:
            icon: mdi-home-search
            href: https://house-hunter.wibrow.dev
            description: Property tracker
        - RRDA:
            icon: mdi-dns
            href: https://rrda.wibrow.dev
            description: DNS lookup
        - Mealie:
            icon: mealie.svg
            href: https://recipes.wibrow.dev
            description: Recipe management
        - Nextcloud:
            icon: nextcloud.svg
            href: https://nextcloud.wibrow.dev
            description: Personal cloud
    - AI:
        - ZeroClaw:
            icon: mdi-robot
            href: https://zeroclaw.wibrow.dev
            description: AI assistant gateway
        - OpenClaw:
            icon: mdi-robot-outline
            href: https://openclaw.wibrow.dev
            description: AI agent
        - Browser Use:
            icon: mdi-web
            href: https://browser-use.wibrow.dev
            description: AI browser automation
    - Second Brain:
        - Obsidian:
            icon: obsidian.svg
            href: https://obsidian.wibrow.dev
            description: Notes sync
    - Security:
        - Authelia:
            icon: authelia.svg
            href: https://auth.wibrow.dev
            description: Authentication
        - LLDAP:
            icon: mdi-account-group
            href: https://lldap.wibrow.dev
            description: LDAP directory
    - Monitoring:
        - Gatus:
            icon: gatus.svg
            href: https://status.wibrow.dev
            description: Status monitoring
        - Grafana:
            icon: grafana.svg
            href: https://grafana.wibrow.dev
            description: Dashboards
            widget:
              type: grafana
              url: http://grafana.monitoring.svc.cluster.local:3000
              username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"
        - Prometheus:
            icon: prometheus.svg
            href: https://prometheus.wibrow.dev
            description: Metrics
            widget:
              type: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        - Victoria Metrics:
            icon: victoriametrics.svg
            href: https://vm.wibrow.dev
            description: Long-term TSDB
    - Networking:
        - OpenSpeedTest:
            icon: mdi-speedometer
            href: https://openspeedtest.wibrow.dev
            description: Speed test
    - Infrastructure:
        - Rook Ceph:
            icon: ceph.svg
            href: https://rook.wibrow.dev
            description: Distributed storage
        - JetKVM 01:
            icon: mdi-monitor-eye
            href: http://jetkvm-01/
            description: Remote KVM
        - JetKVM 02:
            icon: mdi-monitor-eye
            href: http://jetkvm-02/
            description: Remote KVM
  settings.yaml: |
    title: Home
    favicon: https://raw.githubusercontent.com/gethomepage/homepage/main/public/homepage.png
    theme: dark
    color: slate
    headerStyle: boxed
    statusStyle: dot
    hideVersion: true
    layout:
      Media:
        style: row
        columns: 4
      Home Automation:
        style: row
        columns: 2
      Banking:
        style: row
        columns: 3
      Selfhosted:
        style: row
        columns: 4
      AI:
        style: row
        columns: 3
      Second Brain:
        style: row
      Security:
        style: row
      Monitoring:
        style: row
        columns: 4
      Networking:
        style: row
      Infrastructure:
        style: row
        columns: 3
  widgets.yaml: |
    - kubernetes:
        cluster:
          cpu: true
          memory: true
          show: true
          showLabel: true
        nodes:
          cpu: true
          memory: true
          show: true
          showLabel: true
    - search:
        provider: [google]
        focus: false
        target: _blank
    - openmeteo:
        label: Home
        units: metric
        cache: 5
    - datetime:
        text_size: l
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23
