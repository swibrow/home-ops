controllers:
  miniflux:
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000

    containers:
      app:
        image:
          repository: ghcr.io/miniflux/miniflux
          tag: 2.2.19-distroless
        env:
          BASE_URL: https://miniflux.pitower.link
          CREATE_ADMIN: "1"
          DEBUG: "1"
          LOG_DATE_TIME: "1"
          POLLING_SCHEDULER: "entry_frequency"
          POLLING_FREQUENCY: "15"
          RUN_MIGRATIONS: "1"
          OAUTH2_PROVIDER: oidc
          OAUTH2_CLIENT_ID: miniflux
          OAUTH2_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: miniflux-secret
                key: OAUTH2_CLIENT_SECRET
          OAUTH2_REDIRECT_URL: https://miniflux.pitower.link/oauth2/oidc/callback
          OAUTH2_OIDC_DISCOVERY_ENDPOINT: https://auth.pitower.link/.well-known/openid-configuration
          OAUTH2_USER_CREATION: "1"
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: miniflux-db-secret
                key: DB_URL
        envFrom:
          - secretRef:
              name: miniflux-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
              httpGet:
                path: /healthcheck
                port: 8080
        resources:
          requests:
            cpu: 12m
            memory: 64M
          limits:
            memory: 256M

service:
  app:
    controller: miniflux
    ports:
      http:
        port: 8080

route:
  app:
    enabled: true
    hostnames:
      - miniflux.pitower.link
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https

