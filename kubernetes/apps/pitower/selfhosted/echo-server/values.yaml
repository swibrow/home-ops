controllers:
  echo-server:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/mendhak/http-https-echo
          tag: 40
        env:
          HTTP_PORT: 8080
          LOG_WITHOUT_NEWLINE: "true"
          LOG_IGNORE_PATH: /healthz
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 64Mi
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
service:
  app:
    ports:
      http:
        port: 8080
route:
  app:
    enabled: true
    hostnames:
      - echo.wibrow.dev
    parentRefs:
      - name: envoy-external
        namespace: networking
        sectionName: https
    # Route through the KEDA HTTP add-on interceptor (system ns) instead of
    # straight to the echo-server Service. The interceptor catches requests for
    # this host, scales the Deployment 0->1 on the first hit (holding the
    # request until ready), then forwards to echo-server:8080. Cross-namespace
    # backendRef → needs the ReferenceGrant in the system namespace.
    rules:
      - backendRefs:
          - name: keda-add-ons-http-interceptor-proxy
            namespace: system
            port: 8080
