---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: forgejo-dragonfly
  namespace: git
spec:
  replicas: 1
  # Dragonfly reserves ~256Mi per io thread; without this it spawns one thread
  # per core (16) and demands 4Gi. Pin threads low for a small cache workload.
  args:
    - "--proactor_threads=2"
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
