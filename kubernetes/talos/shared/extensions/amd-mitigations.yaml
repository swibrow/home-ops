# curl -X POST --data-binary @amd-mitigations.yaml https://factory.talos.dev/schematics
# Ryzen 5700U fabric sync mitigations + panic capture (worker-01)
customization:
  extraKernelArgs:
    - processor.max_cstate=1
    - amd_pstate=disable
    - printk.always_kmsg_dump=1
    - nmi_watchdog=1
    - hardlockup_panic=1
  systemExtensions:
    officialExtensions:
      - siderolabs/util-linux-tools
      - siderolabs/amd-ucode
      - siderolabs/amdgpu-firmware
