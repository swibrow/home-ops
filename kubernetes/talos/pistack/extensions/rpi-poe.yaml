# f73ac434130797d995211c3ea9717493a5a57c7237d255ed6de97c851dd7c7e3
# curl -X POST --data-binary @rpi-poe.yaml https://factory.talos.dev/schematics
overlay:
  image: siderolabs/sbc-raspberrypi
  name: rpi_generic
  options:
    configTxtAppend: |-
      # PoE Hat Fan Speeds
      dtoverlay=rpi-poe
      dtparam=poe_fan_temp0=50000
      dtparam=poe_fan_temp1=60000
      dtparam=poe_fan_temp2=70000
      dtparam=poe_fan_temp3=80000
customization:
  extraKernelArgs:
    - initcall_blacklist=sensors_nct6683_init
  systemExtensions:
    officialExtensions:
      - siderolabs/util-linux-tools
