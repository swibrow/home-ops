clusterName: pistack
clusterEndpoint: https://10.20.20.0:6443
# Talos v1.12 supports Kubernetes up to 1.35. The old `talosctl gen config`
# recipe never pinned this and silently drifted with the locally installed
# talosctl version — verify against the running cluster before the first apply.
kubernetesVersion: 1.35.5
talosVersion: 1.12.6

# Resolved to a factory schematic ID locally (f73ac434…).
schematicId: "@extensions/rpi-poe.yaml"

# topf decrypts this transparently via sops; the age key is wired up through
# SOPS_AGE_KEY_FILE in the justfile.
secretsPath: secrets.sops.yaml

nodes:
  - host: pistack-01
    ip: 10.20.20.1
    role: control-plane
  - host: pistack-02
    ip: 10.20.20.2
    role: control-plane
  - host: pistack-03
    ip: 10.20.20.3
    role: control-plane
