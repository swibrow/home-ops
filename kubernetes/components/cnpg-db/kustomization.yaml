---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - externalsecret.yaml
replacements:
  # CNPG secret key (e.g., "miniflux-app", "firefly-superuser")
  - source:
      kind: ConfigMap
      name: cnpg-db-config
      fieldPath: data.CNPG_SECRET_KEY
    targets:
      - select:
          kind: ExternalSecret
          name: app-db
        fieldPaths:
          - spec.dataFrom.0.extract.key
  # Target secret name
  - source:
      kind: ConfigMap
      name: cnpg-db-config
      fieldPath: data.SECRET_NAME
    targets:
      - select:
          kind: ExternalSecret
          name: app-db
        fieldPaths:
          - spec.target.name
  # ExternalSecret name (last — changes select identity)
  - source:
      kind: ConfigMap
      name: cnpg-db-config
      fieldPath: data.APP_NAME
    targets:
      - select:
          kind: ExternalSecret
          name: app-db
        fieldPaths:
          - metadata.name
        options:
          delimiter: "-"
          index: 0
  # ConfigMap name (must be last — makes name unique per app)
  - source:
      kind: ConfigMap
      name: cnpg-db-config
      fieldPath: data.APP_NAME
    targets:
      - select:
          kind: ConfigMap
          name: cnpg-db-config
        fieldPaths:
          - metadata.name
        options:
          delimiter: "-"
          index: 0
