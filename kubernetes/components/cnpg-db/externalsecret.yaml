---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-db
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: cnpg-secrets
    kind: ClusterSecretStore
  target:
    name: app-db-secret
    template:
      type: Opaque
      data:
        DB_HOST: '{{ index . "host" }}.cloudnative-pg.svc.cluster.local'
        DB_PORT: '{{ index . "port" }}'
        DB_USER: '{{ index . "user" }}'
        DB_PASS: '{{ index . "password" }}'
        DB_NAME: '{{ index . "dbname" }}'
        DB_URL: 'postgresql://{{ index . "user" }}:{{ index . "password" }}@{{ index . "host" }}.cloudnative-pg.svc.cluster.local:{{ index . "port" }}/{{ index . "dbname" }}?sslmode=disable'
  dataFrom:
    - extract:
        key: app-superuser
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
