---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - externalsecret.yaml
  - pvc.yaml
  - replicationsource.yaml
replacements:
  # PVC storage size (must be before name replacement)
  - source:
      kind: ConfigMap
      name: volsync-config
      fieldPath: data.STORAGE_SIZE
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: app
        fieldPaths:
          - spec.resources.requests.storage
  # sourcePVC (must be before name replacement)
  - source:
      kind: ConfigMap
      name: volsync-config
      fieldPath: data.CLAIM_NAME
    targets:
      - select:
          kind: ReplicationSource
          name: app
        fieldPaths:
          - spec.sourcePVC
  # Restic repository reference (must be before name replacement)
  - source:
      kind: ConfigMap
      name: volsync-config
      fieldPath: data.SECRET_NAME
    targets:
      - select:
          kind: ReplicationSource
          name: app
        fieldPaths:
          - spec.restic.repository
  # RESTIC_REPOSITORY URL (must be before name replacement)
  - source:
      kind: ConfigMap
      name: volsync-config
      fieldPath: data.RESTIC_REPO
    targets:
      - select:
          kind: ExternalSecret
          name: app-volsync
        fieldPaths:
          - spec.target.template.data.RESTIC_REPOSITORY
  # PVC name (last - changes select identity)
  - source:
      kind: ConfigMap
      name: volsync-config
      fieldPath: data.CLAIM_NAME
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: app
        fieldPaths:
          - metadata.name
  # ExternalSecret name and target name (last - changes select identity)
  - source:
      kind: ConfigMap
      name: volsync-config
      fieldPath: data.SECRET_NAME
    targets:
      - select:
          kind: ExternalSecret
          name: app-volsync
        fieldPaths:
          - metadata.name
          - spec.target.name
  # ReplicationSource name (changes select identity)
  - source:
      kind: ConfigMap
      name: volsync-config
      fieldPath: data.APP_NAME
    targets:
      - select:
          kind: ReplicationSource
          name: app
        fieldPaths:
          - metadata.name
  # ConfigMap name (must be last - makes name unique per app to avoid namespace conflicts)
  - source:
      kind: ConfigMap
      name: volsync-config
      fieldPath: data.APP_NAME
    targets:
      - select:
          kind: ConfigMap
          name: volsync-config
        fieldPaths:
          - metadata.name
