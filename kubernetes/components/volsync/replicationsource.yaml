---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: app
spec:
  sourcePVC: app
  trigger:
    schedule: "0 * * * *"
  restic:
    pruneIntervalDays: 7
    repository: app-volsync
    retain:
      hourly: 24
      daily: 7
    copyMethod: Snapshot
    storageClassName: ceph-block
    cacheStorageClassName: ceph-block
    cacheCapacity: 5Gi
    cacheAccessModes:
      - ReadWriteOnce
    volumeSnapshotClassName: csi-ceph-blockpool
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 2000
      fsGroupChangePolicy: Always
      supplementalGroups:
        - 82
        - 568
        - 2000
