kind: Secret
metadata:
  name: pikeep-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: pikeep
  server: https://<PIKEEP_API_SERVER>:6443
  config: |
    {
      "tlsClientConfig": {
        "insecure": false,
        "caData": "",
        "certData": "",
        "keyData": ""
      }
    }
