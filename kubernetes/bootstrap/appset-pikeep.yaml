---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pikeep
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          # cert-manager
          - path: kubernetes/apps/cert-manager/cert-manager
            namespace: cert-manager
          - path: kubernetes/apps/cert-manager/issuers
            namespace: cert-manager
          # kube-system
          - path: kubernetes/apps/kube-system/coredns
            namespace: kube-system
          - path: kubernetes/apps/kube-system/metrics-server
            namespace: kube-system
          # monitoring
          - path: kubernetes/apps/monitoring/fluent-bit
            namespace: monitoring
          # security
          - path: kubernetes/apps/security/aws-identity-webhook
            namespace: security
          # system
          - path: kubernetes/apps/system/kubelet-csr-approver
            namespace: system
          - path: kubernetes/apps/system/reloader
            namespace: system
          - path: kubernetes/apps/system/snapshot-controller
            namespace: system
          - path: kubernetes/apps/system/volsync
            namespace: system
  syncPolicy:
    preserveResourcesOnDeletion: true
  template:
    metadata:
      name: 'pikeep-{{ regexReplaceAll "kubernetes/apps/" .path "" | replace "/" "-" }}'
      namespace: argocd
      labels:
        app.kubernetes.io/cluster: pikeep
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: apps
      source:
        repoURL: https://github.com/swibrow/home-ops
        targetRevision: main
        path: "{{.path}}"
      destination:
        name: pikeep
        namespace: "{{.namespace}}"
      syncPolicy:
        managedNamespaceMetadata:
          labels:
            pod-security.kubernetes.io/enforce: privileged
            pod-security.kubernetes.io/audit: privileged
            pod-security.kubernetes.io/warn: privileged
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3
