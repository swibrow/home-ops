controllers:
  browser-use:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        fsGroup: 1000
    containers:
      app:
        image:
          repository: ghcr.io/swibrow/browser-use
          tag: v3.0.0
        env:
          ANONYMIZED_TELEMETRY: "false"
          BROWSER_USE_LOGGING_LEVEL: info
          KEEP_BROWSER_OPEN: "true"
          RESOLUTION: 1920x1080x24
          RESOLUTION_WIDTH: "1920"
          RESOLUTION_HEIGHT: "1080"
          CHROME_ARGS: "--no-sandbox"
        envFrom:
          - secretRef:
              name: browser-use-secret
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi

service:
  app:
    controller: browser-use
    ports:
      http:
        port: 7788
      vnc:
        port: 6080

route:
  app:
    hostnames:
      - browser-use.pitower.link
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 7788
  vnc:
    hostnames:
      - browser-vnc.pitower.link
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 6080

persistence:
  shm:
    type: emptyDir
    medium: Memory
    sizeLimit: 2Gi
    globalMounts:
      - path: /dev/shm
