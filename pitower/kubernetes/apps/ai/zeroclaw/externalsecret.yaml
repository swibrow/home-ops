---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zeroclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: zeroclaw-secret
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: /ai/zeroclaw/api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: ZEROCLAW_PAIRED_TOKEN
      remoteRef:
        key: /ai/zeroclaw/paired-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
