prometheus:
  enable: true
master:
  resources:
    requests:
      cpu: 21m
      memory: 51Mi
worker:
  tolerations:
    - key: dedicated
      operator: Equal
      value: media-home
      effect: NoSchedule
  config:
    core:
      sources:
        - pci
        - system
        - usb
  resources:
    requests:
      cpu: 5m
      memory: 48Mi
