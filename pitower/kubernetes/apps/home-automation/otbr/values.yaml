controllers:
  otbr:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: worker-04
      tolerations:
        - key: dedicated
          operator: Equal
          value: media-home
          effect: NoSchedule
    containers:
      app:
        image:
          repository: openthread/otbr
          tag: latest
        envFrom:
          - secretRef:
              name: otbr-thread-dataset
        env:
          TZ: Europe/Zurich
          # Sonoff dongle Thread RCP device
          RADIO_URL: spinel+hdlc+uart:///dev/serial/by-id/usb-ITEAD_SONOFF_Zigbee_3.0_USB_Dongle_Plus_V2_20220811090018-if00?uart-baudrate=460800
          BACKBONE_INTERFACE: enp2s0
          # Bind to all interfaces
          REST_HOST: 0.0.0.0
          # Disable iptables-based features (not available on Talos/nftables)
          NAT64: "0"
          NAT44: "0"
          DOCKER: "0"
        lifecycle:
          postStart:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  # Wait for otbr-agent to be ready (up to 30s)
                  for i in $(seq 1 30); do
                    ot-ctl state >/dev/null 2>&1 && break
                    sleep 1
                  done
                  # Apply Thread dataset and start network
                  if [ -n "$THREAD_DATASET_TLV" ]; then
                    ot-ctl dataset set active "$THREAD_DATASET_TLV"
                    ot-ctl ifconfig up
                    ot-ctl thread start
                  fi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          privileged: true
          capabilities:
            add:
              - NET_ADMIN
              - SYS_ADMIN

service:
  app:
    controller: otbr
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/ips: 192.168.0.230
    ports:
      web:
        port: 80
      rest:
        port: 8081

route:
  app:
    hostnames:
      - otbr.pitower.link
    parentRefs:
      - name: envoy-internal
        namespace: networking
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: 80

persistence:
  dev:
    type: hostPath
    hostPath: /dev
    globalMounts:
      - path: /dev
