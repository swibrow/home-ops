---
apiVersion: v1
kind: Secret
metadata:
  name: pikeep-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    apps/cert-manager: "true"
    apps/kube-system: "true"
    apps/monitoring: "true"
    apps/networking: "true"
    apps/security: "true"
    apps/system: "true"
type: Opaque
stringData:
  name: pikeep
  server: https://<PIKEEP_API_SERVER>:6443
  config: |
    {
      "tlsClientConfig": {
        "insecure": false,
        "caData": "",
        "certData": "",
        "keyData": ""
      }
    }
