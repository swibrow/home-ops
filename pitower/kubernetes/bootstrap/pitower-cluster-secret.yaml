---
apiVersion: v1
kind: Secret
metadata:
  name: pitower-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    apps/ai: "true"
    apps/banking: "true"
    apps/cert-manager: "true"
    apps/cloudnative-pg: "true"
    apps/home-automation: "true"
    apps/kguardian: "true"
    apps/kube-system: "true"
    apps/media: "true"
    apps/monitoring: "true"
    apps/networking: "true"
    apps/openebs: "true"
    apps/rook-ceph: "true"
    apps/security: "true"
    apps/selfhosted: "true"
    apps/system: "true"
type: Opaque
stringData:
  name: pitower
  server: https://kubernetes.default.svc
  config: |
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
