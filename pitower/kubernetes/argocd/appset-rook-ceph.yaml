apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: rook-ceph
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  apps/rook-ceph: "true"
          - git:
              repoURL: https://github.com/swibrow/home-ops
              revision: main
              directories:
                - path: kubernetes/apps/rook-ceph/*
  syncPolicy:
    preserveResourcesOnDeletion: true
  template:
    metadata:
      name: "{{.name}}-{{index .path.segments 2}}-{{.path.basename}}"
      namespace: argocd
      labels:
        app.kubernetes.io/cluster: "{{.name}}"
        app.kubernetes.io/category: "{{index .path.segments 2}}"
        app.kubernetes.io/name: "{{index .path.segments 3}}"
        app.kubernetes.io/instance: "{{index .path.segments 3}}"
      # finalizers:
      #   - resources-finalizer.argocd.argoproj.io
    spec:
      project: apps
      source:
        repoURL: https://github.com/swibrow/home-ops
        targetRevision: main
        path: "{{.path.path}}"
      destination:
        server: "{{.server}}"
        namespace: "{{index .path.segments 2}}"
      syncPolicy:
        # automated:
        #   prune: true
        #   selfHeal: false
        #   allowEmpty: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3
