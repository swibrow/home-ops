---
all:
  children:
    nut:
      hosts:
        nut:
          # On VLAN 20 only (no native-LAN IP). This is the DHCP-assigned VLAN-20
          # address — set a UniFi reservation to pin it, or use nut.servers.local
          # from a host that can resolve the VLAN-20 (10.20.0.1) DNS.
          ansible_host: 10.20.85.197
          ansible_user: nut
    ovh_vps:
      hosts:
        ovh-vps:
          # OVH VPS, public internet.
          # Key-only auth (PasswordAuthentication no); debian user has passwordless sudo.
          # ansible_host is SOPS-encrypted in inventory/host_vars/ovh-vps.sops.yaml
          # (public IP kept out of plaintext git history).
          ansible_user: debian
    garage:
      hosts:
        garage-01:
          # Garage S3 LXC on proxmox-01 (vmid 210), on VLAN 20 only. DHCP-assigned
          # under servers.local - set a UniFi reservation to pin it (use
          # `terraform output garage_mac_address`). Debian LXC has no non-root sudo
          # user, so ansible_user is root (SSH key injected by terraform/proxmox).
          ansible_host: garage-01.servers.local
          ansible_user: root
    proxmox_01:
      hosts:
        proxmox-01:
          # New Proxmox VE hypervisor host, on VLAN 20 (10.20.0.0/16) via a
          # tagged nic1.20 -> vmbr0 (see the proxmox role's network.yaml task).
          # DHCP-assigned - set a UniFi reservation to pin it, same as `nut`.
          # ansible_user is root: Proxmox VE ships no non-root sudo user by default,
          # so add your SSH pubkey to root's authorized_keys before running this.
          ansible_host: proxmox-01.servers.local
          ansible_user: root
