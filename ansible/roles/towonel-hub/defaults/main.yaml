---
towonel_hub_version: "1.2.0"
towonel_hub_image: codeberg.org/towonel/towonel-hub-caddy
towonel_hub_container_name: towonel
towonel_hub_volume: towonel-data

towonel_hub_domain: tunnel.wibrow.dev
# No port: Caddy fronts :443 and SNI-routes towonel_hub_domain to the hub's
# internal listener, so the agent's hub API calls are a normal HTTPS request
# on :443 -- see the "towonel-hub runbook" in README.md for why this replaced
# the old ":8443" public URL.
towonel_hub_public_url: "https://{{ towonel_hub_domain }}"
towonel_hub_edge_advertised_addresses: "{{ towonel_hub_domain }}:443"
# Caddy's ACME account email (its own automatic HTTPS, not towonel's).
towonel_hub_acme_email: sam.wibrow@gmail.com

# Loopback-only, inside the container netns. The hub speaks plain HTTP on
# towonel_hub_internal_port -- Caddy terminates the real TLS cert for
# towonel_hub_domain on towonel_hub_caddy_tls_port and reverse-proxies to it.
towonel_hub_internal_port: 8443
towonel_hub_caddy_tls_port: 18443

towonel_hub_data_dir: "/var/lib/docker/volumes/{{ towonel_hub_volume }}/_data"
towonel_hub_caddyfile_path: /etc/towonel/Caddyfile
towonel_hub_uid: 10001
towonel_hub_gid: 10001
