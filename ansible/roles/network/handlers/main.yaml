---
# Handlers run in definition order: bring the VLAN (with its default route) up
# first, THEN reapply eth0 (dropping its IP) so a default route always exists.
- name: Reactivate VLAN connections
  ansible.builtin.command: "nmcli connection up {{ item.name }}"
  loop: "{{ host_vlans }}"
  changed_when: true

- name: Reapply primary link
  ansible.builtin.command: "nmcli device reapply {{ host_primary_link.ifname }}"
  changed_when: true
