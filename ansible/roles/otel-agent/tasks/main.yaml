---
- name: Load SOPS-encrypted otel-agent key material
  community.sops.load_vars:
    file: "{{ role_path }}/vars/secrets.sops.yaml"

- name: Determine otel-agent release arch
  ansible.builtin.set_fact:
    otel_agent_release_arch: "{{ otel_agent_arch_map[ansible_facts['architecture']] }}"

- name: Create otel-agent group
  ansible.builtin.group:
    name: "{{ otel_agent_group }}"
    system: true

- name: Create otel-agent user
  ansible.builtin.user:
    name: "{{ otel_agent_user }}"
    group: "{{ otel_agent_group }}"
    # Journal read access only -- no shell, no home directory, nothing else.
    groups: systemd-journal
    append: true
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Download otelcol-contrib {{ otel_agent_version }}
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_agent_version }}/otelcol-contrib_{{ otel_agent_version }}_linux_{{ otel_agent_release_arch }}.tar.gz"
    dest: "/tmp/otelcol-contrib_{{ otel_agent_version }}_linux_{{ otel_agent_release_arch }}.tar.gz"
    checksum: "{{ otel_agent_checksums[otel_agent_release_arch] }}"
    mode: "0644"

- name: Install otelcol-contrib binary
  ansible.builtin.unarchive:
    src: "/tmp/otelcol-contrib_{{ otel_agent_version }}_linux_{{ otel_agent_release_arch }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include: otelcol-contrib
    owner: root
    group: root
    mode: "0755"
  notify: Restart otel-agent

- name: Ensure otel-agent config directory exists
  ansible.builtin.file:
    path: "{{ otel_agent_config_dir }}"
    state: directory
    owner: root
    group: "{{ otel_agent_group }}"
    mode: "0750"

- name: Install otel-agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ otel_agent_config_path }}"
    owner: root
    group: "{{ otel_agent_group }}"
    mode: "0640"
  notify: Restart otel-agent

- name: Install otel-agent OTLP API key env file
  ansible.builtin.copy:
    content: "OTLP_API_KEY={{ otel_agent_otlp_api_key }}\n"
    dest: "{{ otel_agent_env_path }}"
    owner: root
    group: "{{ otel_agent_group }}"
    mode: "0640"
  no_log: true
  notify: Restart otel-agent

- name: Install otel-agent systemd unit
  ansible.builtin.template:
    src: otel-agent.service.j2
    dest: /etc/systemd/system/otel-agent.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart otel-agent

- name: Ensure otel-agent is enabled and running
  ansible.builtin.systemd_service:
    name: otel-agent
    daemon_reload: true
    enabled: true
    state: started
