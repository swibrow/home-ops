---
- name: Install caddy and certbot
  ansible.builtin.apt:
    name:
      - caddy
      - certbot
      - python3-certbot-dns-cloudflare
    state: present
    update_cache: true

- name: Install Cloudflare credentials for the DNS-01 challenge
  ansible.builtin.copy:
    content: "dns_cloudflare_api_token = {{ cloudflare_api_token }}\n"
    dest: "{{ garage_tls_cloudflare_credentials }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Check whether a certificate already exists
  ansible.builtin.stat:
    path: "{{ garage_tls_cert_dir }}/fullchain.pem"
  register: garage_tls_cert

# certbot installs its own renewal timer, so this only ever runs for the
# initial issuance.
- name: Issue the certificate via DNS-01
  ansible.builtin.command:
    argv:
      - certbot
      - certonly
      - --non-interactive
      - --agree-tos
      - --email
      - "{{ garage_tls_acme_email }}"
      - --dns-cloudflare
      - --dns-cloudflare-credentials
      - "{{ garage_tls_cloudflare_credentials }}"
      # Cloudflare needs a moment to publish the TXT record before the ACME
      # server checks for it.
      - --dns-cloudflare-propagation-seconds
      - "30"
      - -d
      - "{{ garage_tls_hostname }}"
  when: not garage_tls_cert.stat.exists
  changed_when: true
  notify: Reload caddy

# Caddy runs as the `caddy` user, but certbot writes the private key as
# 0600 root:root. Give the `caddy` group read across both trees. `g+rX` adds
# read to files and search to directories only, so it never makes a key
# world- or group-executable.
- name: Allow caddy to read the certificate material
  ansible.builtin.command:
    argv:
      - chgrp
      - -R
      - caddy
      - /etc/letsencrypt/live
      - /etc/letsencrypt/archive
  changed_when: false

- name: Grant the caddy group read on the certificate material
  ansible.builtin.command:
    argv:
      - chmod
      - -R
      - g+rX
      - /etc/letsencrypt/live
      - /etc/letsencrypt/archive
  changed_when: false
  notify: Reload caddy

# certbot writes a fresh 0600 root:root key on every renewal, so the deploy
# hook must re-grant group read before reloading Caddy.
- name: Re-grant perms and reload caddy after each renewal
  ansible.builtin.copy:
    content: |
      #!/bin/sh
      chgrp -R caddy /etc/letsencrypt/live /etc/letsencrypt/archive
      chmod -R g+rX /etc/letsencrypt/live /etc/letsencrypt/archive
      systemctl reload caddy
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-caddy
    owner: root
    group: root
    mode: "0755"

- name: Install Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: "caddy validate --adapter caddyfile --config %s"
  notify: Reload caddy

- name: Enable and start caddy
  ansible.builtin.systemd_service:
    name: caddy
    enabled: true
    state: started
